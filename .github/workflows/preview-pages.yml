name: Deploy preview to GitHub Pages

# Builds the static Astro catalog preview and publishes it to GitHub Pages.
# Enable once under Settings → Pages → "Build and deployment" → Source: GitHub Actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generate dist/ (variants + catalog.json) so the preview has data to render.
      - run: pnpm build
      # enablement: true turns Pages on via the API on the first run, so no manual
      # Settings → Pages toggle is needed (the pages: write permission below covers it).
      - uses: actions/configure-pages@v5
        id: pages
        with:
          enablement: true
      # Build the preview with the base path Pages serves the project site from
      # (e.g. https://<owner>.github.io/<repo>/). configure-pages exposes both.
      - name: Build preview
        run: pnpm --filter preview build
        env:
          SITE: ${{ steps.pages.outputs.origin }}
          BASE: ${{ steps.pages.outputs.base_path }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: preview/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
