<div class="thumbs-feedback group/tf inline-flex items-center gap-3" data-value="{{ value }}">
  <span class="thumbs-feedback__question text-sm text-on-surface-muted">{{ question }}</span>
  <div class="inline-flex gap-1">
    <button type="button" class="thumbs-feedback__yes inline-flex items-center gap-1.5 rounded-control border border-border px-2.5 py-1 text-sm text-on-surface-muted transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface group-data-[value=yes]/tf:border-success group-data-[value=yes]/tf:bg-success/10 group-data-[value=yes]/tf:text-success" aria-pressed="false">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M6 9v8H3V9h3zm0 0l3-6a2 2 0 012 2v2h4a2 2 0 012 2l-1.4 5A2 2 0 0114.6 17H6"/></svg>
      Yes
    </button>
    <button type="button" class="thumbs-feedback__no inline-flex items-center gap-1.5 rounded-control border border-border px-2.5 py-1 text-sm text-on-surface-muted transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface group-data-[value=no]/tf:border-danger group-data-[value=no]/tf:bg-danger/10 group-data-[value=no]/tf:text-danger" aria-pressed="false">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M14 11V3h3v8h-3zm0 0l-3 6a2 2 0 01-2-2v-2H5a2 2 0 01-2-2l1.4-5A2 2 0 015.4 3H14"/></svg>
      No
    </button>
  </div>
</div>
