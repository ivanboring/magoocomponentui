name: poll-inline
props:
  question:
    type: string
    required: true
    title: Question
    description: The poll question shown above the options.
    example: "Which feature should we build next?"
  options:
    type: array
    items: object
    required: true
    title: Options
    description: >
      The poll choices. Each item: { label, votes, pct, leading }. label is the choice text; votes
      (optional) is a raw count shown in the result view; pct (optional) is the precomputed
      percentage share (0-100) used for the result bar width — the directive language cannot divide,
      so pass it already computed; leading (optional boolean) highlights the winning option.
    example:
      - { label: "Dark mode", votes: 128, pct: 52, leading: true }
      - { label: "Offline support", votes: 74, pct: 30, leading: false }
      - { label: "Keyboard shortcuts", votes: 44, pct: 18, leading: false }
  total_votes:
    type: integer
    title: Total votes
    description: Total number of votes cast, shown as a footnote in the result view.
    example: 246
  voted:
    type: boolean
    default: false
    title: Voted
    description: >
      When false the options render as clickable vote buttons; when true they render as read-only
      result rows with a share bar and percentage.
