<div class="survey-progress w-full">
  <div class="mb-1.5 flex items-center justify-between text-xs text-on-surface-muted">
    <span class="survey-progress__label">
      <span data-if="label">{{ label }}</span>
      <span data-if="!label">Question {{ current }} of {{ total }}</span>
    </span>
    <span class="survey-progress__value tabular-nums">{{ pct }}%</span>
  </div>
  <div class="h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Survey progress">
    <div class="survey-progress__fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ pct }}%"></div>
  </div>
</div>
