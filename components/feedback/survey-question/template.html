<fieldset class="survey-question rounded-card border border-border bg-surface p-(--space-card) shadow-card" data-kind="{{ kind }}">
  <legend class="survey-question__question font-heading text-on-surface">{{ question }}</legend>
  <div class="survey-question__options mt-4 flex flex-col gap-2">
    <button data-for="option in options" type="button" aria-pressed="false" class="survey-question__option group/opt flex w-full items-center gap-3 rounded-control border border-border bg-surface px-4 py-3 text-left text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring data-[selected=true]:border-primary data-[selected=true]:bg-primary/10" data-value="{{ option.value }}" data-selected="false">
      <span class="survey-question__marker flex size-5 shrink-0 items-center justify-center rounded-pill border border-border text-primary-contrast transition-colors duration-(--duration-token) group-data-[selected=true]/opt:border-primary group-data-[selected=true]/opt:bg-primary" aria-hidden="true">
        <svg class="size-3 opacity-0 transition-opacity duration-(--duration-token) group-data-[selected=true]/opt:opacity-100" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 10l4 4 8-8"/></svg>
      </span>
      <span class="flex-1">{{ option.label }}</span>
    </button>
  </div>
</fieldset>
