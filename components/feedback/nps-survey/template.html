<section class="nps-survey group/nps rounded-card border border-border bg-surface p-(--space-card) shadow-card" data-value="{{ value }}">
  <h3 class="nps-survey__question font-heading text-on-surface">{{ question }}</h3>
  <div class="nps-survey__scale mt-4 flex flex-wrap gap-1.5" role="radiogroup" aria-label="{{ question }}">
    <button type="button" role="radio" aria-checked="false" data-value="0" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=0]/nps:border-primary group-data-[value=0]/nps:bg-primary group-data-[value=0]/nps:text-primary-contrast">0</button>
    <button type="button" role="radio" aria-checked="false" data-value="1" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=1]/nps:border-primary group-data-[value=1]/nps:bg-primary group-data-[value=1]/nps:text-primary-contrast">1</button>
    <button type="button" role="radio" aria-checked="false" data-value="2" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=2]/nps:border-primary group-data-[value=2]/nps:bg-primary group-data-[value=2]/nps:text-primary-contrast">2</button>
    <button type="button" role="radio" aria-checked="false" data-value="3" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=3]/nps:border-primary group-data-[value=3]/nps:bg-primary group-data-[value=3]/nps:text-primary-contrast">3</button>
    <button type="button" role="radio" aria-checked="false" data-value="4" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=4]/nps:border-primary group-data-[value=4]/nps:bg-primary group-data-[value=4]/nps:text-primary-contrast">4</button>
    <button type="button" role="radio" aria-checked="false" data-value="5" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=5]/nps:border-primary group-data-[value=5]/nps:bg-primary group-data-[value=5]/nps:text-primary-contrast">5</button>
    <button type="button" role="radio" aria-checked="false" data-value="6" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=6]/nps:border-primary group-data-[value=6]/nps:bg-primary group-data-[value=6]/nps:text-primary-contrast">6</button>
    <button type="button" role="radio" aria-checked="false" data-value="7" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=7]/nps:border-primary group-data-[value=7]/nps:bg-primary group-data-[value=7]/nps:text-primary-contrast">7</button>
    <button type="button" role="radio" aria-checked="false" data-value="8" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=8]/nps:border-primary group-data-[value=8]/nps:bg-primary group-data-[value=8]/nps:text-primary-contrast">8</button>
    <button type="button" role="radio" aria-checked="false" data-value="9" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=9]/nps:border-primary group-data-[value=9]/nps:bg-primary group-data-[value=9]/nps:text-primary-contrast">9</button>
    <button type="button" role="radio" aria-checked="false" data-value="10" class="nps-survey__btn flex h-10 min-w-9 flex-1 items-center justify-center rounded-control border border-border bg-surface text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring group-data-[value=10]/nps:border-primary group-data-[value=10]/nps:bg-primary group-data-[value=10]/nps:text-primary-contrast">10</button>
  </div>
  <div class="nps-survey__labels mt-2 flex justify-between text-xs text-on-surface-muted">
    <span>Not likely</span>
    <span>Very likely</span>
  </div>
  <div data-if="follow_up" class="nps-survey__followup mt-4">
    <label class="mb-1 block text-sm font-medium text-on-surface" for="nps-survey-reason">What is the main reason for your score?</label>
    <textarea id="nps-survey-reason" class="nps-survey__reason w-full rounded-control border border-border bg-surface p-3 text-sm text-on-surface placeholder:text-on-surface-muted focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring" rows="3" placeholder="Tell us more (optional)"></textarea>
  </div>
</section>
