<div class="token-price-card flex flex-col gap-3 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-2">
    <div class="min-w-0">
      <p class="font-heading text-on-surface">{{ symbol }}</p>
      <p class="truncate text-xs text-on-surface-muted">{{ name }}</p>
    </div>
    <span class="token-price-card__change group/chg inline-flex shrink-0 items-center gap-1 rounded-pill px-2 py-0.5 text-xs font-medium data-[dir=up]:bg-success/10 data-[dir=up]:text-success data-[dir=down]:bg-danger/10 data-[dir=down]:text-danger" data-dir="{{ change_dir }}">
      <svg class="size-3 group-data-[dir=down]/chg:hidden" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 15V5M5 10l5-5 5 5"/></svg>
      <svg class="size-3 group-data-[dir=up]/chg:hidden" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 5v10M5 10l5 5 5-5"/></svg>
      <span>{{ change_pct }}</span>
    </span>
  </div>
  <p class="font-heading text-2xl text-on-surface">{{ price }}</p>
  <svg class="token-price-card__spark h-10 w-full" viewBox="0 0 100 30" preserveAspectRatio="none" aria-hidden="true">
    <path d="{{ spark_path }}" data-dir="{{ change_dir }}" class="fill-none stroke-success [stroke-width:2] data-[dir=down]:stroke-danger" vector-effect="non-scaling-stroke"/>
  </svg>
</div>
