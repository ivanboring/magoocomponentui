name: swap-widget
props:
  from:
    type: object
    required: true
    title: From token
    description: "The sell side: { symbol, amount, balance }. balance is optional."
    example: { symbol: "ETH", amount: "1.5", balance: "2.14 ETH" }
  to:
    type: object
    required: true
    title: To token
    description: "The buy side: { symbol, amount, balance }. balance is optional."
    example: { symbol: "USDC", amount: "4725.60", balance: "0 USDC" }
  rate:
    type: string
    title: Rate
    description: Optional exchange rate line, preformatted in the caller (e.g. 1 ETH = 3,150.42 USDC).
    example: "1 ETH = 3,150.42 USDC"
  slippage:
    type: string
    title: Slippage
    description: Optional slippage tolerance shown in the details (e.g. 0.5%).
    example: "0.5%"
variants: {}
