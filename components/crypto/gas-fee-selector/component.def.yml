name: gas-fee-selector
props:
  options:
    type: array
    items: object
    required: true
    title: Fee options
    description: >
      The three fee tiers, in order (typically Slow, Normal, Fast). Each item:
      { label, tier, fee, time, selected }. label is the display name; tier is a short caption
      (e.g. a gwei figure); fee is the formatted cost; time is the estimated wait; selected marks
      the chosen option.
    example:
      - { label: "Slow", tier: "18 gwei", fee: "$0.42", time: "~3 min", selected: false }
      - { label: "Normal", tier: "24 gwei", fee: "$0.58", time: "~45 sec", selected: true }
      - { label: "Fast", tier: "32 gwei", fee: "$0.79", time: "~15 sec", selected: false }
variants: {}
