<article class="nft-card group relative flex flex-col overflow-hidden rounded-card border border-border bg-surface shadow-card">
  <div class="nft-card__media relative aspect-square overflow-hidden bg-surface-raised">
    <img class="size-full object-cover transition-transform duration-(--duration-token) group-hover:scale-105" src="{{ image }}" alt="{{ name }}">
    <span data-if="badge" class="nft-card__badge absolute left-3 top-3 rounded-pill bg-primary px-2.5 py-1 text-xs font-medium text-primary-contrast shadow-card">{{ badge }}</span>
  </div>
  <div class="flex flex-col gap-1 p-4">
    <h3 class="nft-card__name truncate font-heading text-on-surface">{{ name }}</h3>
    <p data-if="collection" class="truncate text-sm text-on-surface-muted">{{ collection }}</p>
    <div class="nft-card__price mt-2 flex items-center gap-1.5 border-t border-border pt-3">
      <svg class="size-4 shrink-0 fill-primary" viewBox="0 0 20 20" aria-hidden="true"><path d="M10 1.5l4.7 6.5L10 10.9 5.3 8 10 1.5zm0 10.6l4.7-2.9L10 16.5 5.3 9.2 10 12.1z"></path></svg>
      <span class="font-mono text-on-surface tabular-nums">{{ price }}</span>
      <span class="text-sm text-on-surface-muted">{{ currency }}</span>
    </div>
  </div>
</article>
