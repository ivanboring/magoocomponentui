name: wallet-connect
props:
  connected:
    type: boolean
    default: false
    title: Connected
    description: >
      When true, renders the connected account pill (blockie dot, masked address and balance)
      instead of the Connect wallet button and wallet picker.
  address:
    type: string
    title: Masked address
    description: The masked wallet address shown when connected (e.g. 0x1a2...9f4c). Shorten it in the caller.
    example: "0x1a2...9f4c"
  balance:
    type: string
    title: Balance
    description: Optional formatted balance shown beside the address when connected (e.g. 2.14 ETH).
    example: "2.14 ETH"
  wallets:
    type: array
    items: object
    required: true
    title: Wallets
    description: >
      The wallets offered in the picker (shown when not connected). Each item: { name, icon }.
      icon is a raw inline SVG string rendered as-is.
    example:
      - { name: "MetaMask", icon: "<svg viewBox='0 0 20 20' fill='currentColor' aria-hidden='true'><path d='M3 4l6 4-1-5zM17 4l-6 4 1-5zM6 13l-1 3 4-1zM14 13l1 3-4-1z'/></svg>" }
  start_open:
    type: boolean
    default: false
    title: Start open
    description: When true, the wallet picker renders already open (disconnected state only).
variants: {}
