<div class="wallet-connect group relative inline-block" data-open="{{ start_open }}">
  <div data-if="connected" class="wallet-connect__account inline-flex items-center gap-2 rounded-pill border border-border bg-surface px-3 py-1.5 shadow-card">
    <span class="size-6 shrink-0 rounded-full bg-gradient-to-br from-primary to-accent" aria-hidden="true"></span>
    <span class="font-mono text-sm text-on-surface">{{ address }}</span>
    <span data-if="balance" class="border-l border-border pl-2 text-sm text-on-surface-muted">{{ balance }}</span>
  </div>

  <div data-if="!connected" class="wallet-connect__picker">
    <button type="button" class="wallet-connect__trigger inline-flex items-center gap-2 rounded-button bg-primary px-4 py-2 font-heading text-sm text-primary-contrast shadow-card transition-opacity duration-(--duration-token) hover:opacity-90" aria-haspopup="menu" aria-expanded="{{ start_open }}">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M3 6.5A1.5 1.5 0 0 1 4.5 5H15a1 1 0 0 1 1 1v1H4.5A1.5 1.5 0 0 1 3 6.5z"/><path d="M3 6.5V14a1.5 1.5 0 0 0 1.5 1.5H16A1 1 0 0 0 17 14.5v-6A1 1 0 0 0 16 7.5H4.5"/><circle cx="13.5" cy="11" r="1"/></svg>
      <span>Connect wallet</span>
    </button>
    <div class="wallet-connect__menu invisible absolute left-0 z-30 mt-1 flex min-w-56 flex-col rounded-card border border-border bg-surface p-1 opacity-0 shadow-raised pointer-events-none transition-opacity duration-(--duration-token) group-data-[open=true]:visible group-data-[open=true]:opacity-100 group-data-[open=true]:pointer-events-auto" role="menu">
      <p class="px-3 py-2 text-xs font-medium uppercase tracking-wide text-on-surface-muted">Connect a wallet</p>
      <button data-for="wallet in wallets" type="button" class="wallet-connect__wallet flex items-center gap-3 rounded-control px-3 py-2 text-left text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" role="menuitem" data-wallet="{{ wallet.name }}">
        <span class="flex size-6 shrink-0 items-center justify-center text-on-surface" aria-hidden="true">{{{ wallet.icon }}}</span>
        <span class="font-medium">{{ wallet.name }}</span>
      </button>
    </div>
  </div>
</div>
