<div class="network-switcher group relative inline-block" data-open="{{ start_open }}">
  <button type="button" class="network-switcher__trigger inline-flex items-center gap-2 rounded-button border border-border bg-surface px-3 py-1.5 text-sm font-medium text-on-surface shadow-card transition-colors duration-(--duration-token) hover:bg-surface-raised" aria-haspopup="listbox" aria-expanded="{{ start_open }}">
    <span class="size-2 shrink-0 rounded-full bg-success" aria-hidden="true"></span>
    <span class="network-switcher__current-label">{{ current }}</span>
    <svg class="size-4 text-on-surface-muted transition-transform duration-(--duration-token) group-data-[open=true]:rotate-180" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M6 8l4 4 4-4"/></svg>
  </button>
  <div class="network-switcher__menu invisible absolute left-0 z-30 mt-1 flex min-w-52 flex-col rounded-card border border-border bg-surface p-1 opacity-0 shadow-raised pointer-events-none transition-opacity duration-(--duration-token) group-data-[open=true]:visible group-data-[open=true]:opacity-100 group-data-[open=true]:pointer-events-auto" role="listbox" aria-label="Select network">
    <button data-for="network in networks" type="button" class="network-switcher__option flex items-center gap-2 rounded-control px-3 py-2 text-left text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised data-[current=true]:bg-surface-raised" role="option" data-network="{{ network.name }}" data-current="{{ network.current }}" aria-selected="{{ network.current }}">
      <span class="flex size-5 shrink-0 items-center justify-center text-on-surface" aria-hidden="true">{{{ network.icon }}}</span>
      <span class="flex-1">{{ network.name }}</span>
      <svg class="size-4 shrink-0 text-primary data-[current=false]:hidden" data-current="{{ network.current }}" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
    </button>
  </div>
</div>
