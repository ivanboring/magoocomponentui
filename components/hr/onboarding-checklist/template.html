<div class="onboarding-checklist rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <h3 class="onboarding-checklist__title font-heading text-on-surface">Onboarding checklist</h3>
      <p data-if="employee" class="truncate text-sm text-on-surface-muted">{{ employee }}</p>
    </div>
    <span data-if="pct" class="shrink-0 rounded-pill bg-primary/10 px-3 py-1 text-sm font-medium text-primary tabular-nums">{{ pct }}%</span>
  </div>
  <div data-if="pct" class="mt-3 h-2 w-full overflow-hidden rounded-pill bg-surface-raised">
    <div class="h-full rounded-pill bg-primary" style="width: {{ pct }}%"></div>
  </div>
  <div class="mt-5 flex flex-col gap-5">
    <div data-for="group in groups" class="onboarding-checklist__group">
      <p class="text-sm font-medium text-on-surface">{{ group.label }}</p>
      <ul class="mt-2 flex flex-col gap-2">
        <li data-for="item in group.items" class="onboarding-checklist__item flex items-center gap-2 text-sm">
          <span data-if="item.done" class="flex size-5 shrink-0 items-center justify-center rounded-pill bg-success/10 text-success">
            <svg class="size-3.5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
          </span>
          <span data-if="!item.done" class="size-5 shrink-0 rounded-pill border border-border" aria-hidden="true"></span>
          <span class="text-on-surface data-[done=true]:text-on-surface-muted data-[done=true]:line-through" data-done="{{ item.done }}">{{ item.label }}</span>
        </li>
      </ul>
    </div>
  </div>
</div>
