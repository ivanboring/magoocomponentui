<div class="anniversary-card flex flex-col items-center gap-2 rounded-card border border-border bg-surface p-(--space-card) text-center shadow-card">
  <span class="anniversary-card__icon flex size-10 items-center justify-center rounded-pill bg-primary/10 text-primary" aria-hidden="true">
    <svg class="size-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 3v3M8 5v1M16 5v1"/>
      <path d="M5 10a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v3H5v-3z"/>
      <path d="M4 21v-6a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v6z"/>
      <path d="M4 17c1.5 0 1.5 1 3 1s1.5-1 3-1 1.5 1 3 1 1.5-1 3-1 1.5 1 3 1"/>
    </svg>
  </span>
  <div class="flex items-center gap-2">
    <img data-if="avatar" class="anniversary-card__avatar size-8 rounded-pill object-cover" src="{{ avatar }}" alt="">
    <span data-if="!avatar" class="anniversary-card__avatar flex size-8 items-center justify-center rounded-pill bg-surface-raised font-heading text-xs text-on-surface-muted" aria-hidden="true">{{ initials }}</span>
    <p class="font-heading text-on-surface">{{ name }}</p>
  </div>
  <p class="font-heading text-2xl text-primary tabular-nums">{{ years }} years</p>
  <p data-if="date" class="text-xs text-on-surface-muted">{{ date }}</p>
</div>
