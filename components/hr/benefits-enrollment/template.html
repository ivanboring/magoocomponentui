<div class="benefits-enrollment rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="benefits-enrollment__group flex flex-col gap-3" role="radiogroup" aria-label="{{ label }}">
    <button data-for="plan in plans" type="button" role="radio" aria-checked="{{ plan.selected }}" data-selected="{{ plan.selected }}" data-plan="{{ plan.name }}" class="benefits-enrollment__plan group flex w-full flex-col gap-3 rounded-card border border-border bg-surface p-4 text-left transition-colors duration-(--duration-token) hover:border-primary data-[selected=true]:border-primary data-[selected=true]:bg-primary/10">
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <p class="font-heading text-on-surface">{{ plan.name }}</p>
          <p data-if="plan.tier" class="text-xs font-medium uppercase tracking-wide text-on-surface-muted">{{ plan.tier }}</p>
        </div>
        <div class="flex shrink-0 items-center gap-3">
          <span class="font-heading text-lg tabular-nums text-on-surface">{{ plan.premium }}</span>
          <span class="benefits-enrollment__check flex size-5 items-center justify-center rounded-pill border border-border text-primary-contrast group-data-[selected=true]:border-primary group-data-[selected=true]:bg-primary" aria-hidden="true">
            <svg class="size-3 opacity-0 group-data-[selected=true]:opacity-100" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="3"><path d="M4 10l4 4 8-8"/></svg>
          </span>
        </div>
      </div>
      <ul data-if="plan.features" class="flex flex-col gap-1">
        <li data-for="feature in plan.features" class="flex items-center gap-2 text-sm text-on-surface-muted">
          <svg class="size-4 shrink-0 text-success" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
          <span>{{ feature }}</span>
        </li>
      </ul>
    </button>
  </div>
</div>
