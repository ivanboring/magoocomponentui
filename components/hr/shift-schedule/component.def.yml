name: shift-schedule
props:
  days:
    type: array
    items: string
    required: true
    title: Day headers
    description: The column headers, in order (e.g. the week's days). One header per day column.
    example: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
  staff:
    type: array
    items: object
    required: true
    title: Staff
    description: >
      One row per staff member. Each item: { name, initials, cells }. cells is an array aligned to
      the days header (one entry per column, in the same order); each cell is
      { label, color_class } where an empty/absent label leaves the day blank and color_class is an
      optional tokenized tint chosen from a fixed set - one of "bg-primary/10 text-primary",
      "bg-success/10 text-success", "bg-warning/10 text-warning", "bg-danger/10 text-danger",
      "bg-info/10 text-info", or "bg-surface-raised text-on-surface" (all safelisted in the
      template). Omit color_class for the default surface tint.
    example:
      - name: "Dana Okafor"
        initials: "DO"
        cells:
          - { label: "9-5", color_class: "bg-primary/10 text-primary" }
          - { label: "9-5", color_class: "bg-primary/10 text-primary" }
          - {}
          - { label: "12-8", color_class: "bg-info/10 text-info" }
          - { label: "9-5", color_class: "bg-primary/10 text-primary" }
          - {}
          - {}
