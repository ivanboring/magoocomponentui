<div class="shift-schedule overflow-x-auto rounded-card border border-border bg-surface shadow-card">
  <div class="shift-schedule__grid min-w-[640px]">
    <div class="flex border-b border-border bg-surface-raised">
      <div class="w-36 shrink-0 p-3 text-xs font-medium uppercase tracking-wide text-on-surface-muted">Staff</div>
      <div data-for="day in days" class="flex-1 border-l border-border p-3 text-center text-xs font-medium uppercase tracking-wide text-on-surface-muted">{{ day }}</div>
    </div>
    <div data-for="member in staff" class="shift-schedule__row flex border-b border-border last:border-b-0">
      <div class="flex w-36 shrink-0 items-center gap-2 p-3">
        <span class="flex size-8 shrink-0 items-center justify-center rounded-pill bg-surface-raised font-heading text-xs text-on-surface-muted" aria-hidden="true">{{ member.initials }}</span>
        <span class="min-w-0 truncate text-sm text-on-surface">{{ member.name }}</span>
      </div>
      <div data-for="cell in member.cells" class="flex flex-1 items-center justify-center border-l border-border p-2">
        <span data-if="cell.label" class="shift-schedule__chip w-full rounded-control border border-border px-2 py-1 text-center text-xs font-medium {{ cell.color_class }}">{{ cell.label }}</span>
      </div>
    </div>
  </div>
  <span class="hidden bg-primary/10 text-primary bg-success/10 text-success bg-warning/10 text-warning bg-danger/10 text-danger bg-info/10 text-info bg-surface-raised text-on-surface" aria-hidden="true"></span>
</div>
