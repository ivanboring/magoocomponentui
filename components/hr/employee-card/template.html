<div class="employee-card flex items-center gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex size-14 shrink-0 items-center justify-center overflow-hidden rounded-pill bg-surface-raised">
    <img data-if="avatar" class="size-full object-cover" src="{{ avatar }}" alt="">
    <span data-if="!avatar" class="font-heading text-lg text-on-surface-muted">{{ initials }}</span>
  </div>
  <div class="min-w-0 flex-1">
    <div class="flex items-center gap-2">
      <p class="employee-card__name truncate font-heading text-on-surface">{{ name }}</p>
      <span data-if="status" class="shrink-0 rounded-pill px-2 py-0.5 text-xs font-medium capitalize {{ status@class }}">{{ status }}</span>
    </div>
    <p class="truncate text-sm text-on-surface-muted">{{ title }}</p>
    <p data-if="department" class="truncate text-sm text-on-surface-muted">{{ department }}</p>
    <p data-if="location" class="mt-1 flex items-center gap-1 text-xs text-on-surface-muted">
      <svg class="size-3.5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M10 2a5 5 0 00-5 5c0 3.5 5 9 5 9s5-5.5 5-9a5 5 0 00-5-5z"/><circle cx="10" cy="7" r="1.6"/></svg>
      <span class="truncate">{{ location }}</span>
    </p>
  </div>
</div>
