<section class="kitchen-display flex gap-4 overflow-x-auto p-1 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden" aria-label="{{ label }}">
  <article data-for="ticket in tickets" class="kitchen-display__ticket flex w-64 shrink-0 flex-col overflow-hidden rounded-card border border-l-4 border-border bg-surface shadow-card data-[status=new]:border-info data-[status=cooking]:border-warning data-[status=ready]:border-success" data-status="{{ ticket.status }}">
    <header class="flex items-start justify-between gap-2 border-b border-border px-4 py-2.5">
      <div class="min-w-0">
        <p class="kitchen-display__number font-heading text-on-surface">{{ ticket.ticket_number }}</p>
        <p data-if="ticket.table" class="text-xs text-on-surface-muted">{{ ticket.table }}</p>
      </div>
      <div class="shrink-0 text-right">
        <p data-if="ticket.elapsed" class="kitchen-display__elapsed font-mono text-sm tabular-nums text-on-surface">{{ ticket.elapsed }}</p>
        <p data-if="ticket.time" class="font-mono text-xs text-on-surface-muted">{{ ticket.time }}</p>
      </div>
    </header>
    <ul class="flex flex-1 flex-col gap-1.5 px-4 py-3">
      <li data-for="line in ticket.items" class="kitchen-display__line flex gap-2 text-sm text-on-surface">
        <span class="font-mono tabular-nums text-on-surface-muted">{{ line.qty }}x</span>
        <span class="min-w-0 flex-1">{{ line.name }}</span>
      </li>
    </ul>
    <footer class="px-4 py-2.5">
      <span class="kitchen-display__status inline-flex items-center rounded-pill px-2.5 py-0.5 text-xs font-medium capitalize data-[status=new]:bg-info/10 data-[status=new]:text-info data-[status=cooking]:bg-warning/10 data-[status=cooking]:text-warning data-[status=ready]:bg-success/10 data-[status=ready]:text-success" data-status="{{ ticket.status }}">{{ ticket.status }}</span>
    </footer>
  </article>
</section>
