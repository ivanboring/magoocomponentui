name: shift-report
props:
  shift:
    type: string
    title: Shift
    description: The shift name or label (e.g. "Dinner shift"). Falls back to a generic heading when omitted.
    example: "Dinner shift"
  date:
    type: string
    title: Date
    description: Pre-formatted date shown in the header.
    example: "Fri, Jul 18"
  stats:
    type: array
    items: object
    required: true
    title: Stats
    description: >
      The headline summary figures shown in the stat grid. Each item: { label, value } where both
      are pre-formatted strings (e.g. { label: "Net sales", value: "$8,420" }).
    example:
      - { label: "Net sales", value: "$8,420" }
      - { label: "Covers", value: "142" }
      - { label: "Avg check", value: "$59.30" }
  payment_breakdown:
    type: array
    items: object
    title: Payment breakdown
    description: >
      Optional split of takings by payment method, rendered as a single stacked bar plus a legend.
      Each item: { method, amount, pct, color_class } where amount is a pre-formatted total, pct is
      the precomputed share of the bar from 0-100, and color_class is a tokenised fill utility such
      as bg-primary or bg-success. Order items so the bar segments read left to right.
    example:
      - { method: "Card", amount: "$5,900", pct: 70, color_class: "bg-primary" }
      - { method: "Cash", amount: "$1,680", pct: 20, color_class: "bg-success" }
      - { method: "Gift card", amount: "$840", pct: 10, color_class: "bg-warning" }
