<div class="tip-out-row flex items-center gap-3 rounded-card border border-border bg-surface p-3 shadow-card">
  <span class="tip-out-row__avatar flex size-10 shrink-0 items-center justify-center rounded-pill bg-surface-raised font-heading text-sm text-on-surface-muted" aria-hidden="true">{{ initials }}</span>
  <div class="min-w-0 flex-1">
    <p class="tip-out-row__name truncate font-heading text-on-surface">{{ name }}</p>
    <p data-if="role" class="text-xs text-on-surface-muted">{{ role }}</p>
  </div>
  <div data-if="sales" class="shrink-0 text-right">
    <span class="block text-xs text-on-surface-muted">Sales</span>
    <span class="font-mono text-sm tabular-nums text-on-surface">{{ sales }}</span>
  </div>
  <div data-if="tip_pct" class="shrink-0 text-right">
    <span class="block text-xs text-on-surface-muted">Rate</span>
    <span class="font-mono text-sm tabular-nums text-on-surface">{{ tip_pct }}</span>
  </div>
  <div class="shrink-0 text-right">
    <span class="block text-xs text-on-surface-muted">Tip out</span>
    <span class="tip-out-row__amount font-heading tabular-nums text-on-surface">{{ tip_amount }}</span>
  </div>
</div>
