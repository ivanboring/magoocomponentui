name: order-status-rail
props:
  stages:
    type: array
    items: object
    required: true
    title: Stages
    description: >
      The ordered pipeline stages shown left to right (e.g. New, Preparing, Ready, Served). Each
      item: { label, count, active } where label is the stage name, count is the number of orders
      at that stage, and active (optional boolean) highlights the current stage.
    example:
      - { label: "New", count: 4, active: false }
      - { label: "Preparing", count: 6, active: true }
      - { label: "Ready", count: 2, active: false }
      - { label: "Served", count: 11, active: false }
  label:
    type: string
    default: "Order status"
    title: Accessible label
    description: Accessible name announced for the status rail.
