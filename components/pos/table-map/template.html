<section class="table-map rounded-card border border-border bg-surface p-(--space-card) shadow-card" role="group" aria-label="{{ label }}">
  <div class="table-map__floor relative grid grid-cols-3 gap-3 sm:grid-cols-4 lg:grid-cols-6">
    <div data-for="table in tables" data-status="{{ table.status }}" data-shape="{{ table.shape }}" class="table-map__tile flex aspect-square flex-col items-center justify-center gap-0.5 rounded-card border p-2 text-center data-[shape=round]:rounded-pill data-[status=open]:border-success/40 data-[status=open]:bg-success/10 data-[status=open]:text-success data-[status=seated]:border-primary/40 data-[status=seated]:bg-primary/10 data-[status=seated]:text-primary data-[status=reserved]:border-warning/40 data-[status=reserved]:bg-warning/10 data-[status=reserved]:text-warning data-[status=dirty]:border-danger/40 data-[status=dirty]:bg-danger/10 data-[status=dirty]:text-danger">
      <span class="font-heading text-lg leading-none">{{ table.label }}</span>
      <span data-if="table.seats" class="text-xs opacity-80">{{ table.seats }} seats</span>
      <span class="text-[10px] font-medium uppercase tracking-wide opacity-70">{{ table.status }}</span>
    </div>
  </div>
  <div class="table-map__legend mt-4 flex flex-wrap gap-x-4 gap-y-2 border-t border-border pt-3 text-xs text-on-surface-muted">
    <span class="flex items-center gap-1.5"><span class="size-2.5 rounded-pill bg-success" aria-hidden="true"></span>Open</span>
    <span class="flex items-center gap-1.5"><span class="size-2.5 rounded-pill bg-primary" aria-hidden="true"></span>Seated</span>
    <span class="flex items-center gap-1.5"><span class="size-2.5 rounded-pill bg-warning" aria-hidden="true"></span>Reserved</span>
    <span class="flex items-center gap-1.5"><span class="size-2.5 rounded-pill bg-danger" aria-hidden="true"></span>Dirty</span>
  </div>
</section>
