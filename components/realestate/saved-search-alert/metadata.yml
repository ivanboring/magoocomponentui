name: "Saved Search Alert"
short_description: A saved-search row with its criteria, new-match count, and a notify toggle.
long_visual_description: >
  A row with a search icon, the saved search criteria and alert frequency (with a new-match
  count), and a switch to enable or disable notifications.

use_cases:
  - Saved search with alerts.
  - Notify-me on new matches.
  - Search subscription row.
  - Alert preferences entry.
  - Saved-searches list item.

recommended_for:
  - A saved search with a notification toggle and new-match count.
avoid_for:
  - A generic filter chip (use filter-bar).

markets:
  - Global

example_usage: >
  Show the criteria and frequency; the switch toggles alerts and the new-match count nudges
  engagement.

props:
  criteria: The saved search criteria.
  frequency: The alert frequency.
  enabled: Whether alerts are on.
  new_count: The new-match count.

example_prompts:
  - "Add a saved search alert with a notify toggle."
  - "Add a saved search row showing new matches."

lifecycle: experimental
content_model: A saved search with alert frequency and a notify toggle.

theming:
  tokens_used:
    - --color-surface
    - --color-surface-raised
    - --color-on-surface
    - --color-on-surface-muted
    - --color-primary
    - --color-border
    - --shadow-card
    - --radius-card
    - --radius-control
    - --radius-pill
    - --duration-token

editorial_guidance: >
  Summarize the criteria concisely; the new-match count motivates keeping alerts on.

categorization:
  category: Real Estate
  subcategory: Search
  atomic_type: molecule
  usage_type: [list-item, form]
  maturity: ai-generated
  wcag:
    level: AA
    notes: The toggle uses role="switch" with aria-checked and a label; criteria and counts are real text.
  keyboard_support: The toggle is focusable and switches on Enter/Space.
  seo_score: 25
  text_direction: both
