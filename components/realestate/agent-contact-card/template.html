<article class="agent-contact-card rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="agent-contact-card__head flex items-center gap-3">
    <span class="agent-contact-card__avatar relative inline-flex size-14 shrink-0 items-center justify-center overflow-hidden rounded-full bg-surface-raised font-heading text-lg uppercase text-on-surface" role="img" aria-label="{{ name }}">
      <img data-if="image" class="size-full object-cover" src="{{ image }}" alt="">
      <span data-if="!image" aria-hidden="true">{{ initials }}</span>
    </span>
    <div class="min-w-0">
      <p class="agent-contact-card__name font-heading text-on-surface">{{ name }}</p>
      <p data-if="title" class="agent-contact-card__title text-sm text-on-surface-muted">{{ title }}</p>
      <p data-if="rating" class="agent-contact-card__rating mt-0.5 flex items-center gap-1 text-xs text-on-surface"><svg class="size-3.5 text-warning" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.5l2.6 5.3 5.9.9-4.3 4.1 1 5.9L10 14.9l-5.2 2.8 1-5.9-4.3-4.1 5.9-.9L10 1.5z"/></svg>{{ rating }}</p>
    </div>
  </div>
  <div class="agent-contact-card__actions mt-4 flex gap-2">
    <a data-if="phone" class="flex flex-1 items-center justify-center gap-2 rounded-button border border-border py-2 text-sm font-heading text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" href="tel:{{ phone }}">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M4 4h3l1 4-2 1a8 8 0 004 4l1-2 4 1v3a1 1 0 01-1 1A13 13 0 013 5a1 1 0 011-1z"/></svg>
      Call
    </a>
    <button type="button" class="flex flex-1 items-center justify-center gap-2 rounded-button bg-primary py-2 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M3 5h14v10H3z"/><path d="M3 6l7 5 7-5"/></svg>
      Message
    </button>
  </div>
</article>
