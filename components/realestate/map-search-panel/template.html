<div class="map-search-panel grid grid-cols-1 gap-4 lg:grid-cols-2">
  <div class="map-search-panel__map relative overflow-hidden rounded-card border border-border bg-surface-raised shadow-card" style="min-height: 20rem">
    <svg class="absolute inset-0 size-full opacity-30 text-on-surface-muted" viewBox="0 0 320 240" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true"><path d="M0 80h320M0 160h320M120 0v240M220 0v240"/><path d="M20 40l80 60 90-30 110 70" stroke-width="2"/></svg>
    <button data-for="pin in pins" type="button" class="map-search-panel__pin absolute -translate-x-1/2 -translate-y-full rounded-pill bg-primary px-2 py-0.5 text-xs font-semibold text-primary-contrast shadow-card transition-transform duration-(--duration-token) hover:scale-110" style="left: {{ pin.x }}%; top: {{ pin.y }}%" aria-label="Home {{ pin.price }}">{{ pin.price }}</button>
  </div>
  <div class="map-search-panel__list">
    <p class="map-search-panel__count mb-3 text-sm font-medium text-on-surface">{{ result_count }}</p>
    <ul class="flex flex-col gap-3">
      <li data-for="result in results" class="map-search-panel__result flex gap-3 rounded-card border border-border bg-surface p-3 shadow-card">
        <span class="size-20 shrink-0 overflow-hidden rounded-control bg-surface-raised">
          <img data-if="result.image" class="size-full object-cover" src="{{ result.image }}" alt="{{ result.address }}">
        </span>
        <div class="min-w-0 flex-1">
          <p class="font-heading text-on-surface">{{ result.price }}</p>
          <p class="text-sm text-on-surface-muted">{{ result.beds_baths }}</p>
          <p class="truncate text-sm text-on-surface-muted">{{ result.address }}</p>
        </div>
      </li>
    </ul>
  </div>
</div>
