name: accordion
props:
  single:
    type: boolean
    default: false
    title: Single-open
    description: When true, opening one panel automatically closes the others (only one open at a time).
slots:
  items:
    title: Items
    description: >
      Place accordion-item components here. The accordion frames them, adds the dividers, and wires
      click + keyboard toggling (and the single-open behavior) across all of them.
