name: accordion
props:
  single:
    type: boolean
    default: false
    title: Single-open
    description: When true, opening one panel closes the others.
  items:
    type: array
    items: object
    required: true
    title: Items
    description: "Each item: { title, body, open }."
    example:
      - { title: "What is it?", body: "A skeleton component library.", open: true }
      - { title: "How does it work?", body: "Author once, generate every target.", open: false }
