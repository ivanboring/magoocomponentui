name: masonry-grid
props:
  gap:
    type: enum
    values: [default, none, sm, md, lg, xl]
    default: default
    title: Gap
    description: >
      Space between grid cells, from a fixed set of choices. "default" keeps the component's
      designed spacing; none/sm/md/lg/xl are explicit fixed overrides.
  columns:
    type: integer
    default: 3
    title: Columns
    description: Number of masonry columns on desktop (safelisted 1-6).
slots:
  items:
    title: Items
    description: The cards to flow into the masonry columns.
variants:
  gap:
    default: "gap-(--space-card)"
    none: "gap-0"
    sm: "gap-3"
    md: "gap-6"
    lg: "gap-10"
    xl: "gap-16"
