<section class="carousel-coverflow relative" role="group" aria-roledescription="carousel" aria-label="{{ label }}">
  <div class="carousel-coverflow__track flex snap-x snap-mandatory items-center gap-4 overflow-x-auto scroll-smooth px-[35%] py-6 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
    <div data-for="item in items" class="carousel-coverflow__slide w-64 shrink-0 snap-center origin-center transition-all duration-(--duration-token) scale-100 opacity-100 data-[active=false]:scale-90 data-[active=false]:opacity-50 data-[active=false]:blur-[1px]">
      <article class="group relative overflow-hidden rounded-card border border-border bg-surface shadow-card">
        <div data-if="item.image" class="carousel-coverflow__media aspect-[3/4] overflow-hidden bg-surface-raised">
          <img class="size-full object-cover" src="{{ item.image }}" alt="">
        </div>
        <div data-if="!item.image" class="carousel-coverflow__media aspect-[3/4] bg-surface-raised"></div>
        <div class="flex flex-col gap-1 p-4">
          <h3 class="font-heading text-on-surface">
            <a data-if="item.href" class="outline-none after:absolute after:inset-0 hover:underline focus-visible:underline" href="{{ item.href }}">{{ item.title }}</a>
            <span data-if="!item.href">{{ item.title }}</span>
          </h3>
          <p data-if="item.subtitle" class="text-sm text-on-surface-muted">{{ item.subtitle }}</p>
        </div>
      </article>
    </div>
  </div>

  <button data-if="show_arrows" type="button" class="carousel-coverflow__prev absolute -left-3 top-[42%] flex size-9 -translate-y-1/2 items-center justify-center rounded-full border border-border bg-surface text-on-surface shadow-card transition-colors duration-(--duration-token) hover:bg-surface-raised disabled:pointer-events-none disabled:opacity-40" aria-label="Previous">
    <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 4l-6 6 6 6"/></svg>
  </button>
  <button data-if="show_arrows" type="button" class="carousel-coverflow__next absolute -right-3 top-[42%] flex size-9 -translate-y-1/2 items-center justify-center rounded-full border border-border bg-surface text-on-surface shadow-card transition-colors duration-(--duration-token) hover:bg-surface-raised disabled:pointer-events-none disabled:opacity-40" aria-label="Next">
    <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M8 4l6 6-6 6"/></svg>
  </button>
</section>
