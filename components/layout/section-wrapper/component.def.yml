name: section-wrapper
props:
  eyebrow:
    type: string
    title: Eyebrow
    example: "Features"
  title:
    type: string
    title: Title
    description: Section heading. Omit (empty) to use the section purely for padding around its content.
    example: "Everything you need to ship faster"
  description:
    type: string
    title: Description
    example: "A focused set of building blocks that work across every target."
  align:
    type: enum
    values: [left, center]
    default: center
    title: Heading alignment
  padding:
    type: enum
    values: [default, compact, none]
    default: default
    title: Vertical padding
    description: Section top/bottom padding — default (space-section token), compact, or none.
slots:
  content:
    title: Content
    description: The section body content.
variants:
  align:
    left: "text-left"
    center: "text-center mx-auto"
  padding:
    default: "py-(--space-section)"
    compact: "py-8"
    none: "py-0"
