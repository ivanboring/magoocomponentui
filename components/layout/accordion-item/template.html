<div class="accordion__item">
  <h3>
    <button type="button" class="accordion__trigger group flex w-full items-center justify-between gap-4 px-(--space-card) py-3.5 text-left font-heading text-on-surface" aria-expanded="{{ open }}">
      {{ title }}
      <svg class="accordion__icon size-5 shrink-0 text-on-surface-muted transition-transform duration-(--duration-token) group-aria-expanded:rotate-180" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 8l4 4 4-4"/></svg>
    </button>
  </h3>
  <div class="accordion__panel px-(--space-card) pb-4 text-sm text-on-surface-muted data-[open=false]:hidden" data-open="{{ open }}">
    <slot name="content">Panel content.</slot>
  </div>
</div>
