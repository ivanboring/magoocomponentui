name: card-rail
props:
  gap:
    type: enum
    values: [default, none, sm, md, lg, xl]
    default: default
    title: Gap
    description: >
      Space between grid cells, from a fixed set of choices. "default" keeps the component's
      designed spacing; none/sm/md/lg/xl are explicit fixed overrides.
  label:
    type: string
    default: "Rail"
    title: Accessible label
slots:
  items:
    title: Items
    description: The cards to place in the horizontal rail.
variants:
  gap:
    default: "gap-4"
    none: "gap-0"
    sm: "gap-3"
    md: "gap-6"
    lg: "gap-10"
    xl: "gap-16"
