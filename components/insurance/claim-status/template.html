<article class="claim-status rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <header class="flex flex-wrap items-start justify-between gap-3 border-b border-border pb-4">
    <div class="min-w-0">
      <p class="text-xs uppercase tracking-wide text-on-surface-muted">Claim</p>
      <p class="claim-status__number font-mono text-on-surface">{{ claim_number }}</p>
      <p data-if="type" class="text-sm text-on-surface-muted">{{ type }}</p>
    </div>
    <div class="flex shrink-0 flex-col items-end gap-1">
      <span data-if="status" class="claim-status__pill rounded-pill bg-surface-raised px-2.5 py-0.5 text-xs font-medium capitalize text-on-surface">{{ status }}</span>
      <span data-if="amount" class="font-heading text-lg text-on-surface">{{ amount }}</span>
    </div>
  </header>
  <ol class="claim-status__timeline mt-4 flex flex-col">
    <li data-for="step in steps" class="claim-status__step group relative flex gap-3" data-done="{{ step.done }}" data-current="{{ step.current }}">
      <div class="flex flex-col items-center">
        <span class="claim-status__dot z-10 flex size-6 shrink-0 items-center justify-center rounded-full border-2 border-border bg-surface text-on-surface-muted group-data-[done=true]:border-primary group-data-[done=true]:bg-primary group-data-[done=true]:text-primary-contrast group-data-[current=true]:border-primary group-data-[current=true]:text-primary">
          <svg class="hidden size-3.5 group-data-[done=true]:block" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
          <span class="size-2 rounded-full bg-current group-data-[done=true]:hidden"></span>
        </span>
        <span class="claim-status__line w-0.5 grow bg-border group-last:hidden group-data-[done=true]:bg-primary" aria-hidden="true"></span>
      </div>
      <span class="claim-status__label pb-6 pt-0.5 text-sm font-medium text-on-surface-muted group-last:pb-0 group-data-[done=true]:text-on-surface group-data-[current=true]:text-on-surface">{{ step.label }}</span>
    </li>
  </ol>
</article>
