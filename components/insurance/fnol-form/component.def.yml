name: fnol-form
props:
  incident_types:
    type: array
    items: object
    title: Incident types
    description: >
      The options for the incident type select. Each item is { label, value }. When omitted the
      select shows only its placeholder option.
    example:
      - { label: "Auto collision", value: "auto_collision" }
      - { label: "Theft", value: "theft" }
      - { label: "Property damage", value: "property_damage" }
      - { label: "Water or weather", value: "weather" }
  placeholder:
    type: string
    default: "Describe what happened, when and where..."
    title: Description placeholder
    description: Placeholder text for the description textarea.
