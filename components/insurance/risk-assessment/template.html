<div class="risk-assessment rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <div>
      <p class="text-sm text-on-surface-muted">Risk level</p>
      <span class="risk-assessment__level mt-1 inline-block rounded-pill px-3 py-1 text-sm font-medium capitalize {{ level@class }}">{{ level }}</span>
    </div>
    <div data-if="score" class="text-right">
      <p class="font-heading text-3xl text-on-surface tabular-nums">{{ score }}</p>
      <p class="text-xs text-on-surface-muted">Risk score</p>
    </div>
  </div>
  <ul class="mt-4 flex flex-col gap-2 border-t border-border pt-4">
    <li data-for="factor in factors" class="flex items-center justify-between gap-4 text-sm">
      <span class="text-on-surface">{{ factor.label }}</span>
      <span data-impact="{{ factor.impact }}" class="shrink-0 rounded-pill px-2.5 py-1 text-xs font-medium capitalize data-[impact=low]:bg-success/10 data-[impact=low]:text-success data-[impact=medium]:bg-warning/10 data-[impact=medium]:text-warning data-[impact=high]:bg-danger/10 data-[impact=high]:text-danger">{{ factor.impact }}</span>
    </li>
  </ul>
</div>
