<article class="incident-report rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <header class="flex flex-wrap items-start justify-between gap-3 border-b border-border pb-4">
    <div class="min-w-0">
      <p data-if="incident_number" class="font-heading text-lg text-on-surface">Incident {{ incident_number }}</p>
      <p data-if="date" class="text-sm text-on-surface-muted">{{ date }}</p>
    </div>
    <span data-if="type" class="shrink-0 rounded-pill bg-surface-raised px-3 py-1 text-xs font-medium text-on-surface-muted">{{ type }}</span>
  </header>

  <p data-if="location" class="mt-4 flex items-center gap-2 text-sm text-on-surface">
    <span class="shrink-0 text-on-surface-muted" aria-hidden="true">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 18s6-5.3 6-10a6 6 0 10-12 0c0 4.7 6 10 6 10z"/><circle cx="10" cy="8" r="2"/></svg>
    </span>
    {{ location }}
  </p>

  <div data-if="description_html" class="incident-report__description mt-4 text-sm text-on-surface-muted">{{{ description_html }}}</div>

  <div data-if="parties" class="mt-4 border-t border-border pt-4">
    <p class="text-xs font-medium uppercase tracking-wide text-on-surface-muted">Involved parties</p>
    <ul class="mt-2 flex flex-col gap-2">
      <li data-for="party in parties" class="flex items-center justify-between gap-4 text-sm">
        <span class="text-on-surface">{{ party.name }}</span>
        <span class="text-on-surface-muted">{{ party.role }}</span>
      </li>
    </ul>
  </div>

  <div data-if="photos" class="mt-4 flex flex-wrap gap-2">
    <img data-for="photo in photos" class="size-20 rounded-control border border-border object-cover" src="{{ photo }}" alt="">
  </div>
</article>
