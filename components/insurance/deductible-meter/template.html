<div class="deductible-meter rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-baseline justify-between gap-3">
    <h3 class="deductible-meter__title font-heading text-on-surface">Deductible</h3>
    <p class="text-sm text-on-surface-muted"><span class="font-medium text-on-surface">{{ met }}</span> of {{ deductible }} met</p>
  </div>
  <div class="mt-3 h-2.5 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Deductible met">
    <div class="deductible-meter__fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ pct }}%"></div>
  </div>
  <div data-if="out_of_pocket_max" class="deductible-meter__oop mt-5">
    <div class="flex items-baseline justify-between gap-3">
      <span class="text-sm text-on-surface-muted">Out-of-pocket max</span>
      <span class="text-sm text-on-surface">{{ out_of_pocket_max }}</span>
    </div>
    <div data-if="oop_pct" class="mt-2 h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ oop_pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Spend toward out-of-pocket maximum">
      <div class="deductible-meter__oop-fill h-full rounded-pill bg-accent transition-all duration-(--duration-token)" style="width: {{ oop_pct }}%"></div>
    </div>
  </div>
</div>
