<div class="share-menu group/sm relative inline-block text-sm" data-open="{{ start_open }}" data-url="{{ url }}">
  <button type="button" class="share-menu__trigger inline-flex items-center gap-2 rounded-button bg-primary px-4 py-2 text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90" aria-haspopup="true" aria-expanded="{{ start_open }}"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>{{ trigger_label }}</button>
  <div class="share-menu__menu invisible pointer-events-none absolute right-0 top-full z-20 mt-1 w-56 rounded-card border border-border bg-surface p-1 opacity-0 shadow-raised transition-opacity duration-(--duration-token) group-data-[open=true]/sm:visible group-data-[open=true]/sm:opacity-100 group-data-[open=true]/sm:pointer-events-auto" role="menu" aria-label="{{ label }}">
    <a data-for="item in items" role="menuitem" class="flex items-center gap-3 rounded-control px-3 py-2 text-on-surface transition-colors hover:bg-surface-raised" href="{{ item.href }}" target="_blank" rel="noopener"><span class="size-5 shrink-0">{{{ item.icon }}}</span>{{ item.label }}</a>
    <hr class="my-1 border-t border-border">
    <button type="button" class="share-menu__copy flex w-full items-center gap-3 rounded-control px-3 py-2 text-on-surface transition-colors hover:bg-surface-raised" role="menuitem"><span class="size-5 shrink-0"><svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007 0l2-2a5 5 0 00-7-7l-1 1"/><path d="M14 11a5 5 0 00-7 0l-2 2a5 5 0 007 7l1-1"/></svg></span><span class="share-menu__copy-label">{{ copy_label }}</span></button>
  </div>
</div>
