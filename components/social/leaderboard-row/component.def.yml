name: leaderboard-row
props:
  rank:
    type: string
    required: true
    title: Rank
    example: "1"
  name:
    type: string
    required: true
    title: Name
    example: "Jane Doe"
  initials:
    type: string
    required: true
    title: Initials
    example: "JD"
  image:
    type: image
    title: Avatar
  score:
    type: string
    required: true
    title: Score
    example: "12,480"
  change:
    type: enum
    values: [up, down, same]
    default: same
    title: Rank change
variants:
  change:
    up: "text-success"
    down: "text-danger"
    same: "text-on-surface-muted"
