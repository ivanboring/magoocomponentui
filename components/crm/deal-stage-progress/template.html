<ol class="deal-stage-progress flex items-start" aria-label="Deal stage progress">
  <li data-for="stage in stages" class="group flex flex-1 flex-col gap-2 last:flex-none" data-done="{{ stage.done }}" data-current="{{ stage.current }}">
    <div class="flex w-full items-center">
      <span class="deal-stage-progress__marker flex size-8 shrink-0 items-center justify-center rounded-pill border-2 border-border bg-surface text-on-surface-muted transition duration-(--duration-token) group-data-[done=true]:border-primary group-data-[done=true]:bg-primary group-data-[done=true]:text-primary-contrast group-data-[current=true]:border-primary group-data-[current=true]:text-primary group-data-[current=true]:ring-4 group-data-[current=true]:ring-primary/20">
        <svg class="size-4 opacity-0 transition-opacity duration-(--duration-token) group-data-[done=true]:opacity-100" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
      </span>
      <span class="deal-stage-progress__line mx-2 h-0.5 flex-1 rounded-pill bg-border group-data-[done=true]:bg-primary"></span>
    </div>
    <span class="text-xs text-on-surface-muted group-data-[done=true]:text-on-surface group-data-[current=true]:font-semibold group-data-[current=true]:text-on-surface">{{ stage.label }}</span>
  </li>
</ol>
