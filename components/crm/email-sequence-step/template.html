<div class="email-sequence-step flex items-center gap-3 rounded-card border border-border bg-surface p-3 shadow-card">
  <span class="email-sequence-step__badge flex size-8 shrink-0 items-center justify-center rounded-full bg-surface-raised font-heading text-sm tabular-nums text-on-surface" aria-hidden="true">{{ step_number }}</span>
  <div class="min-w-0 flex-1">
    <p class="truncate font-heading text-on-surface">{{ subject }}</p>
    <p data-if="delay" class="truncate text-sm text-on-surface-muted">{{ delay }}</p>
  </div>
  <span class="email-sequence-step__status inline-flex shrink-0 items-center gap-1.5 rounded-pill bg-surface-raised px-2 py-0.5 text-xs font-medium capitalize {{ status@class }}">
    <span class="size-1.5 rounded-full bg-current" aria-hidden="true"></span>
    {{ status }}
  </span>
</div>
