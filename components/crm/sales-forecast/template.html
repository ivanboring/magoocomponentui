<div class="sales-forecast rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-baseline justify-between gap-3">
    <div class="min-w-0">
      <p class="text-sm text-on-surface-muted">Quota</p>
      <p class="font-heading text-3xl text-on-surface tabular-nums">{{ quota }}</p>
    </div>
    <div class="shrink-0 text-right">
      <p class="text-sm text-on-surface-muted">Committed</p>
      <p class="font-heading text-xl text-on-surface tabular-nums">{{ committed }}</p>
    </div>
  </div>
  <p data-if="best_case" class="mt-1 text-sm text-on-surface-muted">Best case <span class="font-medium tabular-nums text-on-surface">{{ best_case }}</span></p>

  <div class="sales-forecast__bars mt-4 flex flex-col gap-3">
    <div data-for="bar in bars">
      <div class="mb-1 flex items-center justify-between gap-2 text-xs">
        <span class="text-on-surface">{{ bar.label }}</span>
        <span class="tabular-nums text-on-surface-muted">{{ bar.value }}</span>
      </div>
      <div class="h-2.5 w-full overflow-hidden rounded-pill bg-surface-raised">
        <div class="h-full rounded-pill {{ bar.color_class }}" style="width: {{ bar.pct }}%"></div>
      </div>
    </div>
  </div>

  <ul class="sales-forecast__legend mt-4 flex flex-wrap gap-x-4 gap-y-1.5 text-xs text-on-surface-muted">
    <li data-for="bar in bars" class="flex items-center gap-1.5">
      <span class="size-2.5 shrink-0 rounded-pill {{ bar.color_class }}"></span>
      <span>{{ bar.label }}</span>
    </li>
  </ul>

  <span class="hidden bg-primary bg-secondary bg-accent bg-info bg-success bg-warning bg-danger" aria-hidden="true"></span>
</div>
