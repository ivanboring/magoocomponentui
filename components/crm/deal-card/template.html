<div class="deal-card rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <h3 class="font-heading text-on-surface">{{ name }}</h3>
      <p data-if="stage" class="mt-1">
        <span class="inline-flex rounded-pill bg-primary/10 px-2 py-0.5 text-xs font-medium text-primary">{{ stage }}</span>
      </p>
    </div>
    <span data-if="initials" class="flex size-9 shrink-0 items-center justify-center rounded-pill bg-surface-raised text-sm font-semibold text-on-surface" title="{{ owner }}">{{ initials }}</span>
  </div>

  <p class="mt-3 font-heading text-3xl text-on-surface tabular-nums">{{ value }}</p>

  <dl class="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-sm text-on-surface-muted">
    <div data-if="owner" class="flex items-center gap-1.5">
      <dt class="sr-only">Owner</dt>
      <svg class="size-4 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="10" cy="6.5" r="3"/><path d="M4 16c0-2.8 2.7-5 6-5s6 2.2 6 5"/></svg>
      <dd>{{ owner }}</dd>
    </div>
    <div data-if="close_date" class="flex items-center gap-1.5">
      <dt class="sr-only">Close date</dt>
      <svg class="size-4 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M3 8h14M7 2v3M13 2v3"/></svg>
      <dd class="tabular-nums">{{ close_date }}</dd>
    </div>
  </dl>

  <div data-if="probability" class="deal-card__probability mt-3">
    <div class="mb-1 flex items-center justify-between text-xs text-on-surface-muted">
      <span>Probability</span>
      <span class="tabular-nums">{{ probability }}%</span>
    </div>
    <div class="h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ probability }}" aria-valuemin="0" aria-valuemax="100" aria-label="Win probability">
      <div class="deal-card__probability-fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ probability }}%"></div>
    </div>
  </div>
</div>
