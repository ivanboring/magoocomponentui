name: gauge
props:
  value:
    type: string
    required: true
    title: Value
    example: "72"
  label:
    type: string
    title: Label
    example: "Health score"
  dash:
    type: string
    required: true
    title: Arc dash
    description: Precomputed stroke-dasharray for a semicircle (circumference ~126, r=40), e.g. "91 126".
    example: "91 126"
  tone:
    type: enum
    values: [primary, success, warning, danger]
    default: primary
    title: Tone
variants:
  tone:
    primary: "text-primary"
    success: "text-success"
    warning: "text-warning"
    danger: "text-danger"
