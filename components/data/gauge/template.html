<div class="gauge inline-flex flex-col items-center">
  <div class="gauge__dial relative">
    <svg class="w-40" viewBox="0 0 100 56" fill="none">
      <path class="text-surface-raised" d="M10 50 A40 40 0 0 1 90 50" stroke="currentColor" stroke-width="8" stroke-linecap="round"></path>
      <path class="gauge__arc {{ tone@class }}" d="M10 50 A40 40 0 0 1 90 50" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-dasharray="{{ dash }}"></path>
    </svg>
    <span class="gauge__value absolute inset-x-0 bottom-0 text-center font-heading text-2xl text-on-surface tabular-nums">{{ value }}</span>
  </div>
  <span data-if="label" class="gauge__label mt-1 text-sm text-on-surface-muted">{{ label }}</span>
</div>
