<div class="calendar-agenda flex flex-col gap-4">
  <section data-for="group in groups" class="calendar-agenda__day flex gap-4">
    <div class="calendar-agenda__date flex w-12 shrink-0 flex-col items-center">
      <span class="font-heading text-xl text-on-surface tabular-nums">{{ group.day }}</span>
      <span class="text-xs uppercase text-on-surface-muted">{{ group.weekday }}</span>
    </div>
    <ul class="calendar-agenda__events flex-1 divide-y divide-border rounded-card border border-border bg-surface">
      <li data-for="event in group.events" class="flex items-center gap-3 px-(--space-card) py-2.5">
        <span class="calendar-agenda__time w-14 shrink-0 rounded-control px-2 py-0.5 text-center text-xs font-medium tabular-nums data-[tone=primary]:bg-primary/10 data-[tone=primary]:text-primary data-[tone=success]:bg-success/10 data-[tone=success]:text-success data-[tone=warning]:bg-warning/10 data-[tone=warning]:text-warning" data-tone="{{ event.tone }}">{{ event.time }}</span>
        <span class="calendar-agenda__title text-sm text-on-surface">{{ event.title }}</span>
      </li>
    </ul>
  </section>
</div>
