<dl class="definition-list divide-y divide-border rounded-card border border-border bg-surface">
  <div data-for="item in items" class="definition-list__row flex items-baseline justify-between gap-4 px-(--space-card) py-2.5">
    <dt class="definition-list__term text-sm text-on-surface-muted">{{ item.term }}</dt>
    <dd class="definition-list__desc text-right text-sm font-medium text-on-surface">{{ item.description }}</dd>
  </div>
</dl>
