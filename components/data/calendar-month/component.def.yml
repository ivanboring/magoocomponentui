name: calendar-month
props:
  month:
    type: string
    required: true
    title: Month label
    example: "July 2026"
  weekdays:
    type: array
    items: object
    required: true
    title: Weekday headers
    description: "Each: { label }."
    example:
      - { label: "Mo" }
      - { label: "Tu" }
  days:
    type: array
    items: object
    required: true
    title: Days
    description: "Each day cell: { number, muted, today, event }. muted for other-month days, event dots a day with an entry."
    example:
      - { number: "1", muted: false, today: false, event: false }
