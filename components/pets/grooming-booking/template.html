<article class="grooming-booking rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <h3 data-if="service" class="grooming-booking__service truncate font-heading text-lg text-on-surface">{{ service }}</h3>
      <p data-if="groomer" class="text-sm text-on-surface-muted">with {{ groomer }}</p>
    </div>
    <p data-if="price" class="grooming-booking__price shrink-0 font-heading text-lg tabular-nums text-on-surface">{{ price }}</p>
  </div>
  <p data-if="pet" class="mt-3 flex items-center gap-1.5 text-sm text-on-surface-muted">
    <svg class="size-4 shrink-0" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 13.5c2.2 0 4 1.9 4 3.6 0 1.1-.9 1.9-2 1.9-.8 0-1.4-.4-2-.4s-1.2.4-2 .4c-1.1 0-2-.8-2-1.9 0-1.7 1.8-3.6 4-3.6Z"/><circle cx="6.5" cy="11" r="1.8"/><circle cx="17.5" cy="11" r="1.8"/><circle cx="9.5" cy="7" r="1.8"/><circle cx="14.5" cy="7" r="1.8"/></svg>
    {{ pet }}
  </p>
  <div data-if="date" class="mt-2 flex items-center gap-2 text-sm text-on-surface">
    <svg class="size-4 shrink-0 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="3" y="4" width="14" height="13" rx="2"/><path d="M3 8h14M7 2v4M13 2v4"/></svg>
    <span class="font-heading">{{ date }}</span>
    <span data-if="time" class="text-on-surface-muted" aria-hidden="true">·</span>
    <span data-if="time">{{ time }}</span>
  </div>
  <div data-if="addons" class="grooming-booking__addons mt-4">
    <p class="text-xs uppercase tracking-wide text-on-surface-muted">Add-ons</p>
    <div class="mt-2 flex flex-wrap gap-2">
      <span data-for="addon in addons" class="rounded-pill bg-primary/10 px-2.5 py-1 text-xs font-medium text-primary">{{ addon }}</span>
    </div>
  </div>
  <button type="button" class="grooming-booking__cta mt-5 w-full rounded-button bg-primary py-2.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">Book</button>
</article>
