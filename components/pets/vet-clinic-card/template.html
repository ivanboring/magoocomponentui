<div class="vet-clinic-card rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <h3 class="font-heading text-lg text-on-surface">{{ name }}</h3>
    <span data-if="open_now" class="shrink-0 rounded-pill bg-success/10 px-2.5 py-1 text-xs font-medium text-success">Open now</span>
    <span data-if="!open_now" class="shrink-0 rounded-pill bg-surface-raised px-2.5 py-1 text-xs font-medium text-on-surface-muted">Closed</span>
  </div>

  <div data-if="rating" class="mt-1 flex items-center gap-1 text-sm text-on-surface">
    <svg class="size-4 text-warning" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.5l2.6 5.3 5.9.9-4.2 4.1 1 5.8L10 15l-5.3 2.6 1-5.8L1.5 7.7l5.9-.9z"/></svg>
    <span class="font-medium tabular-nums">{{ rating }}</span>
  </div>

  <p data-if="address" class="mt-2 flex items-start gap-2 text-sm text-on-surface-muted">
    <svg class="mt-0.5 size-4 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 18s6-5.3 6-10a6 6 0 10-12 0c0 4.7 6 10 6 10z"/><circle cx="10" cy="8" r="2"/></svg>
    <span>{{ address }}</span>
  </p>
  <p data-if="hours" class="mt-1 text-sm text-on-surface-muted">{{ hours }}</p>

  <ul data-if="services" class="mt-3 flex flex-wrap gap-2">
    <li data-for="service in services" class="rounded-pill bg-surface-raised px-3 py-1 text-xs text-on-surface">{{ service }}</li>
  </ul>

  <div class="mt-4 flex flex-wrap gap-2">
    <a data-if="phone" class="vet-clinic-card__call inline-flex items-center gap-2 rounded-button bg-primary px-4 py-2 text-sm font-medium text-primary-contrast transition-colors duration-(--duration-token) hover:opacity-90" href="tel:{{ phone }}">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 3h3l1.5 4-2 1.5a11 11 0 005 5l1.5-2 4 1.5v3a1.5 1.5 0 01-1.6 1.5A15 15 0 013 4.6 1.5 1.5 0 014.5 3z"/></svg>
      Call
    </a>
    <a class="vet-clinic-card__directions inline-flex items-center gap-2 rounded-button border border-border bg-surface px-4 py-2 text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" href="#">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 18s6-5.3 6-10a6 6 0 10-12 0c0 4.7 6 10 6 10z"/><circle cx="10" cy="8" r="2"/></svg>
      Directions
    </a>
  </div>
</div>
