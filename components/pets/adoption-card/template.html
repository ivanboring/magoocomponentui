<article class="adoption-card overflow-hidden rounded-card border border-border bg-surface shadow-card">
  <div class="adoption-card__media relative aspect-[4/3] bg-surface-raised">
    <img data-if="photo" class="size-full object-cover" src="{{ photo }}" alt="{{ name }}">
    <span data-if="!photo" class="flex size-full items-center justify-center text-on-surface-muted" aria-hidden="true">
      <svg class="size-12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 13.5c2.2 0 4 1.9 4 3.6 0 1.1-.9 1.9-2 1.9-.8 0-1.4-.4-2-.4s-1.2.4-2 .4c-1.1 0-2-.8-2-1.9 0-1.7 1.8-3.6 4-3.6Z"/><circle cx="6.5" cy="11" r="1.8"/><circle cx="17.5" cy="11" r="1.8"/><circle cx="9.5" cy="7" r="1.8"/><circle cx="14.5" cy="7" r="1.8"/></svg>
    </span>
    <span class="adoption-card__status absolute right-3 top-3 rounded-pill px-2.5 py-1 text-xs font-medium capitalize shadow-card {{ status@class }}">{{ status }}</span>
  </div>
  <div class="p-(--space-card)">
    <h3 class="adoption-card__name font-heading text-lg text-on-surface">{{ name }}</h3>
    <p class="text-sm text-on-surface-muted"><span data-if="breed">{{ breed }}</span><span data-if="species"> · {{ species }}</span><span data-if="age"> · {{ age }}</span></p>
    <p data-if="shelter" class="mt-2 flex items-center gap-1.5 text-xs text-on-surface-muted">
      <svg class="size-3.5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M10 18s6-5.2 6-10a6 6 0 10-12 0c0 4.8 6 10 6 10Z"/><circle cx="10" cy="8" r="2"/></svg>
      {{ shelter }}
    </p>
    <button type="button" class="adoption-card__cta mt-4 w-full rounded-button bg-primary py-2.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">{{ cta_label }}</button>
  </div>
</article>
