<section class="vaccination-record rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <header class="mb-2 flex items-center gap-2">
    <span class="text-on-surface-muted" aria-hidden="true">
      <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M11 3l6 6-7 7-3 1 1-3 7-7"/><path d="M8 6l6 6"/></svg>
    </span>
    <h3 class="font-heading text-on-surface">Vaccination record<span data-if="pet" class="font-normal text-on-surface-muted"> · {{ pet }}</span></h3>
  </header>
  <ul class="vaccination-record__list">
    <li data-for="vaccine in vaccines" class="vaccination-record__row flex items-center justify-between gap-3 border-t border-border py-3 first:border-t-0">
      <div class="min-w-0">
        <p class="vaccination-record__name truncate font-heading text-sm text-on-surface">{{ vaccine.name }}</p>
        <p class="text-xs text-on-surface-muted">Given {{ vaccine.date }}<span data-if="vaccine.next_due"> · Next due {{ vaccine.next_due }}</span></p>
      </div>
      <span class="vaccination-record__status shrink-0 rounded-pill px-2.5 py-1 text-xs font-medium capitalize data-[status=current]:bg-success/10 data-[status=current]:text-success data-[status=due]:bg-warning/10 data-[status=due]:text-warning data-[status=overdue]:bg-danger/10 data-[status=overdue]:text-danger" data-status="{{ vaccine.status }}">{{ vaccine.status }}</span>
    </li>
  </ul>
</section>
