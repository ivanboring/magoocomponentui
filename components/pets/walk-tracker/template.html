<div class="walk-tracker rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <div class="flex items-center gap-2 text-on-surface-muted">
      <svg class="size-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="6" cy="10" r="2"/><circle cx="10" cy="6" r="2"/><circle cx="14" cy="6" r="2"/><circle cx="18" cy="10" r="2"/><path d="M12 12c-2.5 0-4.5 2-4.5 4.2 0 1.6 1.3 2.3 2.6 2.3.9 0 1.3-.4 1.9-.4s1 .4 1.9.4c1.3 0 2.6-.7 2.6-2.3C16.5 14 14.5 12 12 12z"/></svg>
      <span class="text-sm font-medium text-on-surface">Walk</span>
    </div>
    <time data-if="date" class="shrink-0 text-xs text-on-surface-muted">{{ date }}</time>
  </div>

  <div class="mt-3 flex gap-8">
    <div data-if="distance">
      <p class="font-heading text-2xl text-on-surface tabular-nums">{{ distance }}</p>
      <p class="text-xs text-on-surface-muted">Distance</p>
    </div>
    <div data-if="duration">
      <p class="font-heading text-2xl text-on-surface tabular-nums">{{ duration }}</p>
      <p class="text-xs text-on-surface-muted">Duration</p>
    </div>
  </div>

  <div data-if="route_points" class="walk-tracker__route mt-3 overflow-hidden rounded-control bg-surface-raised">
    <svg class="h-24 w-full text-primary" viewBox="0 0 100 48" fill="none" preserveAspectRatio="none" aria-hidden="true">
      <polyline points="{{ route_points }}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>
    </svg>
  </div>

  <div data-if="goal_pct" class="walk-tracker__goal mt-4">
    <div class="mb-1 flex items-center justify-between text-xs text-on-surface-muted">
      <span>Daily goal</span>
      <span class="tabular-nums">{{ goal_pct }}%</span>
    </div>
    <div class="h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ goal_pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Daily walk goal">
      <div class="walk-tracker__goal-fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ goal_pct }}%"></div>
    </div>
  </div>
</div>
