name: pet-insurance-card
props:
  pet:
    type: string
    title: Pet name
    description: The insured pet, shown as an eyebrow.
    example: "Biscuit"
  plan:
    type: string
    title: Plan name
    example: "Complete Care"
  policy_number:
    type: string
    title: Policy number
    description: The policy identifier, shown in a monospace face.
    example: "PC-4821-0093"
  coverage_pct:
    type: integer
    title: Coverage percentage
    description: Reimbursement percentage from 0-100, shown as a value and a thin bar.
    example: 90
  deductible:
    type: string
    title: Deductible
    description: Annual deductible, formatted for display.
    example: "$250 / year"
  status:
    type: enum
    values: [active, pending]
    default: active
    title: Status
    description: Policy status; active is green, pending is amber.
    example: active
variants:
  status:
    active: "bg-success/10 text-success"
    pending: "bg-warning/10 text-warning"
