<div class="form-field-toggle flex items-start justify-between gap-4">
  <div class="min-w-0">
    <label class="form-field-toggle__label text-sm font-medium text-on-surface" id="toggle-{{ name }}-label">{{ label }}</label>
    <p data-if="help" class="form-field-toggle__help text-xs text-on-surface-muted">{{ help }}</p>
  </div>
  <button type="button" class="form-field-toggle__switch relative inline-flex h-6 w-11 shrink-0 items-center rounded-pill bg-surface-raised transition-colors duration-(--duration-token) data-[on=true]:bg-primary" data-on="{{ on }}" role="switch" aria-checked="{{ on }}" aria-labelledby="toggle-{{ name }}-label" data-name="{{ name }}">
    <span class="form-field-toggle__knob ml-0.5 inline-block size-5 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[on=true]:translate-x-5" data-on="{{ on }}"></span>
  </button>
</div>
