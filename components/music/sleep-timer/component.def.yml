name: sleep-timer
props:
  label:
    type: string
    default: "Sleep timer"
    title: Label
  presets:
    type: array
    items: object
    required: true
    title: Presets
    description: "Each: { label, minutes, active }."
    example:
      - { label: "15 min", minutes: "15", active: false }
  remaining:
    type: string
    title: Remaining
    example: "24:18 remaining"
