name: now-playing-bar
props:
  title:
    type: string
    required: true
    title: Title
    example: "Midnight Drive"
  artist:
    type: string
    title: Artist
    example: "The Meridians"
  cover:
    type: image
    title: Cover
    example: "/stock/product-sneaker.jpg"
  playing:
    type: boolean
    default: true
    title: Playing
  elapsed:
    type: string
    default: "1:34"
    title: Elapsed
  total:
    type: string
    default: "3:42"
    title: Total
  progress_pct:
    type: integer
    default: 0
    title: Progress
