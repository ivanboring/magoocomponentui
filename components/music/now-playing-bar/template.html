<div class="now-playing-bar flex items-center gap-4 rounded-card border border-border bg-surface p-3 shadow-raised" data-playing="{{ playing }}">
  <div class="now-playing-bar__track flex min-w-0 flex-1 items-center gap-3">
    <img data-if="cover" class="now-playing-bar__cover size-12 shrink-0 rounded-control object-cover" src="{{ cover }}" alt="">
    <div class="min-w-0">
      <p class="now-playing-bar__title truncate text-sm font-medium text-on-surface">{{ title }}</p>
      <p data-if="artist" class="now-playing-bar__artist truncate text-xs text-on-surface-muted">{{ artist }}</p>
    </div>
    <button type="button" class="now-playing-bar__like ml-1 hidden text-on-surface-muted hover:text-danger sm:block" aria-label="Like">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M10 17s-6-4-6-9a3 3 0 016-1 3 3 0 016 1c0 5-6 9-6 9z"/></svg>
    </button>
  </div>
  <div class="now-playing-bar__center flex flex-[2] flex-col items-center gap-1.5">
    <div class="now-playing-bar__controls flex items-center gap-4">
      <button type="button" class="text-on-surface-muted hover:text-on-surface" aria-label="Previous"><svg class="size-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M6 4h2v12H6zM16 4v12l-8-6z"/></svg></button>
      <button type="button" class="now-playing-bar__toggle flex size-10 items-center justify-center rounded-full bg-on-surface text-surface transition-transform duration-(--duration-token) hover:scale-105" aria-label="Play/pause" aria-pressed="{{ playing }}">
        <svg class="now-playing-bar__play size-5 data-[playing=false]:block hidden" data-playing="{{ playing }}" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M6 4l10 6-10 6z"/></svg>
        <svg class="now-playing-bar__pause size-5 data-[playing=true]:block hidden" data-playing="{{ playing }}" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M6 4h3v12H6zM11 4h3v12h-3z"/></svg>
      </button>
      <button type="button" class="text-on-surface-muted hover:text-on-surface" aria-label="Next"><svg class="size-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M12 4h2v12h-2zM4 4l8 6-8 6z"/></svg></button>
    </div>
    <div class="now-playing-bar__scrub flex w-full items-center gap-2">
      <span class="now-playing-bar__elapsed w-9 text-right text-[11px] text-on-surface-muted tabular-nums">{{ elapsed }}</span>
      <div class="h-1 flex-1 overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ progress_pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Seek"><div class="h-full rounded-pill bg-on-surface" style="width: {{ progress_pct }}%"></div></div>
      <span class="now-playing-bar__total w-9 text-[11px] text-on-surface-muted tabular-nums">{{ total }}</span>
    </div>
  </div>
  <div class="now-playing-bar__right hidden flex-1 items-center justify-end gap-2 md:flex">
    <button type="button" class="text-on-surface-muted hover:text-on-surface" aria-label="Queue"><svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M4 6h9M4 10h9M4 14h6M15 9v7M15 16a1.5 1.5 0 100-3 1.5 1.5 0 000 3z"/></svg></button>
  </div>
</div>
