<button type="button" class="chip inline-flex items-center gap-1.5 rounded-pill border border-border bg-surface px-3 py-1.5 text-sm text-on-surface transition-colors duration-(--duration-token) data-[selected=true]:bg-primary data-[selected=true]:text-primary-contrast" data-selected="{{ selected }}" aria-pressed="{{ selected }}">
  <span class="chip__avatar shrink-0"><slot name="avatar"></slot></span>
  {{ label }}
</button>
