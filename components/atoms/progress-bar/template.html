<div class="progress-bar w-full">
  <div class="mb-1 flex items-center justify-between text-xs text-on-surface-muted">
    <span data-if="label" class="progress-bar__label">{{ label }}</span>
    <span data-if="show_value" class="progress-bar__value tabular-nums">{{ value }}%</span>
  </div>
  <div class="h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ value }}" aria-valuemin="0" aria-valuemax="100" aria-label="{{ label }}">
    <div class="progress-bar__fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ value }}%"></div>
  </div>
</div>
