<span class="progress-circle relative inline-flex size-24 items-center justify-center" role="img" aria-label="{{ label }}">
  <svg class="size-full -rotate-90" viewBox="0 0 100 100">
    <circle class="text-surface-raised" cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="8"></circle>
    <circle class="progress-circle__fill text-primary transition-all duration-(--duration-token)" cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-dasharray="251" style="stroke-dashoffset: {{ dash_offset }}"></circle>
  </svg>
  <span class="progress-circle__value absolute font-heading text-on-surface tabular-nums">{{ value }}%</span>
</span>
