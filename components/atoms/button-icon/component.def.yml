name: button-icon
props:
  label:
    type: string
    required: true
    title: Accessible label
    description: Not visible; announced to screen readers since there is no text.
    example: "Close"
  variant:
    type: enum
    values: [primary, secondary, ghost, danger]
    default: ghost
    title: Variant
  size:
    type: enum
    values: [sm, md, lg]
    default: md
    title: Size
  disabled:
    type: boolean
    default: false
    title: Disabled
slots:
  icon:
    title: Icon
    description: The icon shown; the component provides no default glyph.
variants:
  variant:
    primary: "bg-primary text-primary-contrast hover:opacity-90"
    secondary: "bg-secondary text-on-surface hover:opacity-90"
    ghost: "bg-transparent text-on-surface hover:bg-surface-raised"
    danger: "bg-danger text-danger-contrast hover:opacity-90"
  size:
    sm: "size-8"
    md: "size-10"
    lg: "size-12"
