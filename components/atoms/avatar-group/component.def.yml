name: avatar-group
props:
  items:
    type: array
    items: object
    required: true
    title: People
    description: >
      Each item: { name, initials, image }. initials is the 1-2 character fallback
      (e.g. "JD"), precomputed by the caller since the template can't slice strings.
    example:
      - { name: "Jane Doe", initials: "JD", image: "" }
      - { name: "Sam Lee", initials: "SL", image: "" }
  max_visible:
    type: integer
    default: 4
    title: Max visible
  overflow_count:
    type: integer
    default: 0
    title: Overflow count
    description: Precomputed "+N" count; set by the caller since the template has no math.
