<button type="button" class="button inline-flex items-center justify-center gap-2 rounded-button font-heading transition-colors duration-(--duration-token) {{ variant@class }} {{ size@class }}" data-href="{{ href }}" data-disabled="{{ disabled }}">
  <span class="button__icon-leading shrink-0"><slot name="icon-leading"></slot></span>
  {{ label }}
  <span class="button__icon-trailing shrink-0"><slot name="icon-trailing"></slot></span>
</button>
