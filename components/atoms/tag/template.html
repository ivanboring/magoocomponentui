<span class="tag inline-flex items-center gap-1 rounded-control border border-border bg-surface px-2 py-1 text-xs text-on-surface" data-removable="{{ removable }}">
  {{ label }}
  <button data-if="removable" type="button" class="tag__remove -mr-0.5 flex size-3.5 items-center justify-center rounded-control text-on-surface-muted hover:text-on-surface" aria-label="Remove {{ label }}">
    <svg class="size-3" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5l10 10M15 5L5 15"/></svg>
  </button>
</span>
