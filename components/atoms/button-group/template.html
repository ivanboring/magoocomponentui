<div class="button-group inline-flex items-center gap-0.5 rounded-control border border-border bg-surface p-0.5" role="group" data-active-class="{{ active_class }}">
  <button type="button" data-for="item in items" class="button-group__item rounded-control px-3 py-1.5 text-sm font-heading text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" data-value="{{ item.value }}" aria-pressed="{{ item.active }}">{{ item.label }}</button>
</div>
