<span class="avatar relative inline-flex shrink-0 items-center justify-center overflow-hidden bg-surface-raised font-heading text-on-surface {{ size@class }} {{ shape@class }}" role="img" aria-label="{{ name }}">
  <img data-if="image" class="avatar__image size-full object-cover" src="{{ image }}" alt="">
  <span data-if="!image" class="avatar__initials" aria-hidden="true">{{ name }}</span>
</span>
