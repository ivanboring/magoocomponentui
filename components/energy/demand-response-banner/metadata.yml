    - --space-card
    - --font-heading
    - --duration-token

editorial_guidance: >
  Match the level to the real grid condition so urgent stays rare and credible. Lead the
  message with what is happening, then the ask, and keep the reward concrete. Word the
  buttons as a clear opt in versus opt out choice.

categorization:
  category: Energy
  subcategory: Grid Events
  atomic_type: molecule
  usage_type: [banner, highlight]
  maturity: ai-generated
  wcag:
    level: AA
    notes: The banner uses role="status" and an aria-live confirmation region; urgency is carried by the message text, not colour alone, and both buttons are labelled.
  keyboard_support: The Opt in and Opt out buttons are focusable and activate on Enter or Space.
  seo_score: 40
  text_direction: both
