<div class="outage-map rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <h3 class="font-heading text-on-surface">Service status</h3>
      <p data-if="total_affected" class="mt-0.5 text-sm text-on-surface-muted">{{ total_affected }}</p>
    </div>
    <span class="shrink-0 text-on-surface-muted" aria-hidden="true">
      <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 5l5-2 6 2 5-2v12l-5 2-6-2-5 2zM7 3v14M13 5v14"/></svg>
    </span>
  </div>

  <div class="outage-map__facade mt-4 rounded-control border border-dashed border-border bg-surface-raised p-3" role="img" aria-label="Schematic map of affected areas">
    <div class="grid grid-cols-2 gap-2 sm:grid-cols-3">
      <div data-for="o in outages" data-status="{{ o.status }}" class="flex min-h-16 flex-col justify-between rounded-control border p-2 text-xs data-[status=investigating]:border-danger/30 data-[status=investigating]:bg-danger/10 data-[status=investigating]:text-danger data-[status=restoring]:border-warning/30 data-[status=restoring]:bg-warning/10 data-[status=restoring]:text-warning data-[status=resolved]:border-success/30 data-[status=resolved]:bg-success/10 data-[status=resolved]:text-success">
        <span class="truncate font-medium text-on-surface">{{ o.area }}</span>
        <span class="mt-2 h-1 w-6 rounded-pill bg-current opacity-60" aria-hidden="true"></span>
      </div>
    </div>
  </div>
  <p class="mt-2 text-xs text-on-surface-muted">Schematic view, not to scale.</p>

  <ul class="outage-map__list mt-4 flex flex-col divide-y divide-border">
    <li data-for="o in outages" class="flex items-center gap-3 py-2.5 first:pt-0 last:pb-0">
      <span class="min-w-0 flex-1">
        <span class="block truncate font-medium text-on-surface">{{ o.area }}</span>
        <span class="text-sm text-on-surface-muted">{{ o.customers_affected }}</span>
      </span>
      <span data-status="{{ o.status }}" class="inline-flex shrink-0 items-center gap-1.5 rounded-pill px-2.5 py-1 text-xs font-medium capitalize data-[status=investigating]:bg-danger/10 data-[status=investigating]:text-danger data-[status=restoring]:bg-warning/10 data-[status=restoring]:text-warning data-[status=resolved]:bg-success/10 data-[status=resolved]:text-success">
        <span class="size-1.5 rounded-full bg-current" aria-hidden="true"></span>
        {{ o.status }}
      </span>
    </li>
  </ul>
</div>
