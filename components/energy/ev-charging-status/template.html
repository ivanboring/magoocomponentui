<div class="ev-charging-status rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-center justify-between gap-3">
    <p data-if="vehicle" class="truncate text-sm text-on-surface-muted">{{ vehicle }}</p>
    <span class="ev-charging-status__status inline-flex shrink-0 items-center gap-1.5 text-xs font-medium {{ status@class }}">
      <span class="size-1.5 rounded-pill bg-current" aria-hidden="true"></span>
      <span class="capitalize">{{ status }}</span>
    </span>
  </div>

  <div class="mt-3 flex items-center gap-4">
    <div class="ev-charging-status__battery flex h-10 w-20 shrink-0 items-center rounded-control border-2 border-border p-1" role="img" aria-label="Battery {{ charge_pct }} percent">
      <div class="ev-charging-status__fill h-full rounded-[2px] bg-primary transition-all duration-(--duration-token)" style="width: {{ charge_pct }}%"></div>
    </div>
    <span class="ev-charging-status__terminal -ml-3 h-4 w-1 rounded-r-pill bg-border" aria-hidden="true"></span>
    <p class="font-heading text-4xl text-on-surface tabular-nums">{{ charge_pct }}<span class="ml-0.5 text-lg text-on-surface-muted">%</span></p>
  </div>

  <dl class="mt-4 grid grid-cols-3 gap-3 text-sm">
    <div data-if="power_kw">
      <dt class="text-xs text-on-surface-muted">Power</dt>
      <dd class="mt-0.5 font-heading text-on-surface tabular-nums">{{ power_kw }}<span class="ml-1 text-xs text-on-surface-muted">kW</span></dd>
    </div>
    <div data-if="time_remaining">
      <dt class="text-xs text-on-surface-muted">Remaining</dt>
      <dd class="mt-0.5 font-heading text-on-surface tabular-nums">{{ time_remaining }}</dd>
    </div>
    <div data-if="range_added">
      <dt class="text-xs text-on-surface-muted">Range added</dt>
      <dd class="mt-0.5 font-heading text-on-surface tabular-nums">{{ range_added }}</dd>
    </div>
  </dl>
</div>
