<figure class="energy-mix-donut rounded-card border border-border bg-surface p-4 shadow-card" role="group" aria-label="{{ title }}">
  <figcaption data-if="title" class="mb-3 font-heading text-on-surface">{{ title }}</figcaption>
  <div class="relative mx-auto w-40">
    <svg class="energy-mix-donut__svg block size-40" viewBox="0 0 36 36" role="img" aria-label="{{ title }}">
      <circle cx="18" cy="18" r="15.9155" fill="none" class="stroke-surface-raised [stroke-width:4]"></circle>
      <circle data-for="s in sources" cx="18" cy="18" r="15.9155" fill="none" stroke-linecap="butt" class="[stroke-width:4] {{ s.color_class }}" stroke-dasharray="{{ s.dash }}" stroke-dashoffset="{{ s.offset }}" transform="rotate(-90 18 18)"></circle>
    </svg>
    <div data-if="renewable_pct" class="pointer-events-none absolute inset-0 flex flex-col items-center justify-center">
      <span class="font-heading text-2xl leading-none tabular-nums text-on-surface">{{ renewable_pct }}%</span>
      <span class="mt-1 text-xs uppercase tracking-wide text-on-surface-muted">renewable</span>
    </div>
  </div>
  <ul class="energy-mix-donut__legend mt-4 flex flex-col gap-2">
    <li data-for="s in sources" class="flex items-center gap-2 text-sm">
      <svg class="h-2.5 w-4 shrink-0" viewBox="0 0 20 6" aria-hidden="true"><path d="M3 3h14" fill="none" stroke-linecap="round" class="[stroke-width:6] {{ s.color_class }}"></path></svg>
      <span class="text-on-surface">{{ s.label }}</span>
      <span data-if="s.kwh" class="tabular-nums text-on-surface-muted">{{ s.kwh }}</span>
      <span class="ml-auto tabular-nums font-medium text-on-surface">{{ s.pct }}</span>
    </li>
    <li class="hidden stroke-primary stroke-secondary stroke-accent stroke-success stroke-warning stroke-danger stroke-info" aria-hidden="true"></li>
  </ul>
</figure>
