<div class="bill-estimate rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <p class="text-xs font-medium uppercase tracking-wide text-on-surface-muted">Projected bill</p>
  <p class="mt-1 font-heading text-4xl leading-none tabular-nums text-on-surface">{{ estimated_total }}</p>
  <p data-if="period" class="mt-1 text-sm text-on-surface-muted">{{ period }}</p>

  <div class="mt-4 flex flex-wrap items-center gap-x-6 gap-y-2 border-t border-border pt-4">
    <div data-if="usage_kwh" class="flex flex-col">
      <span class="text-xs uppercase tracking-wide text-on-surface-muted">Used so far</span>
      <span class="tabular-nums font-medium text-on-surface">{{ usage_kwh }}</span>
    </div>
    <div data-if="trend" data-dir="{{ trend }}" class="group flex items-center gap-1.5 text-sm font-medium data-[dir=up]:text-danger data-[dir=down]:text-success">
      <svg class="size-4 shrink-0 group-data-[dir=down]:hidden" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 16V4M5 9l5-5 5 5"/></svg>
      <svg class="size-4 shrink-0 group-data-[dir=up]:hidden" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 4v12M15 11l-5 5-5-5"/></svg>
      <span data-if="vs_last">{{ vs_last }}</span>
    </div>
  </div>

  <p data-if="days_left" class="mt-3 text-sm text-on-surface-muted">
    <span class="tabular-nums font-medium text-on-surface">{{ days_left }}</span> days left in this cycle
  </p>
</div>
