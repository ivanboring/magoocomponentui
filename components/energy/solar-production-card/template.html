<div class="solar-production-card rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <div class="flex items-center gap-2">
      <span class="solar-production-card__icon text-warning" aria-hidden="true">
        <svg class="size-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
        </svg>
      </span>
      <p class="text-sm text-on-surface-muted">Solar production</p>
    </div>
    <span class="solar-production-card__status inline-flex items-center gap-1.5 rounded-pill bg-surface-raised px-2 py-1 text-xs font-medium {{ status@class }}">
      <span class="size-1.5 rounded-pill bg-current" aria-hidden="true"></span>
      <span class="capitalize">{{ status }}</span>
    </span>
  </div>

  <p class="mt-3 font-heading text-4xl text-on-surface tabular-nums">{{ current_kw }}<span class="ml-1 text-lg text-on-surface-muted">kW</span></p>

  <dl class="mt-4 grid grid-cols-2 gap-3 text-sm">
    <div data-if="today_kwh" class="rounded-control bg-surface-raised p-3">
      <dt class="text-xs text-on-surface-muted">Today</dt>
      <dd class="mt-0.5 font-heading text-on-surface tabular-nums">{{ today_kwh }}<span class="ml-1 text-xs text-on-surface-muted">kWh</span></dd>
    </div>
    <div data-if="peak_kw" class="rounded-control bg-surface-raised p-3">
      <dt class="text-xs text-on-surface-muted">Peak</dt>
      <dd class="mt-0.5 font-heading text-on-surface tabular-nums">{{ peak_kw }}<span class="ml-1 text-xs text-on-surface-muted">kW</span></dd>
    </div>
  </dl>

  <div data-if="self_consumption_pct" class="solar-production-card__self mt-4">
    <div class="mb-1 flex items-center justify-between text-xs text-on-surface-muted">
      <span>Self-consumption</span>
      <span class="tabular-nums">{{ self_consumption_pct }}%</span>
    </div>
    <div class="h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ self_consumption_pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Self-consumption">
      <div class="solar-production-card__self-fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ self_consumption_pct }}%"></div>
    </div>
  </div>
</div>
