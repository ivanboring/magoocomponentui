<div class="battery-storage-tile flex items-center gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="battery-storage-tile__visual flex shrink-0 flex-col items-center">
    <span class="mb-0.5 h-1.5 w-4 rounded-t-sm bg-border" aria-hidden="true"></span>
    <div class="flex h-24 w-12 flex-col justify-end overflow-hidden rounded-control border-2 border-border bg-surface-raised" role="img" aria-label="Battery {{ charge_pct }}% charged">
      <div class="battery-storage-tile__fill w-full transition-all duration-(--duration-token) {{ status@class }}" style="height: {{ charge_pct }}%"></div>
    </div>
  </div>
  <div class="min-w-0 flex-1">
    <p class="font-heading text-3xl leading-none tabular-nums text-on-surface">{{ charge_pct }}%</p>
    <p class="mt-2 inline-flex items-center gap-1.5 rounded-pill bg-surface-raised px-2 py-0.5 text-xs font-medium capitalize text-on-surface">
      <span class="size-1.5 shrink-0 rounded-full {{ status@class }}" aria-hidden="true"></span>
      {{ status }}
    </p>
    <dl class="mt-3 flex flex-col gap-1 text-sm">
      <div data-if="capacity_kwh" class="flex items-center justify-between gap-4">
        <dt class="text-on-surface-muted">Capacity</dt>
        <dd class="tabular-nums font-medium text-on-surface">{{ capacity_kwh }}</dd>
      </div>
      <div data-if="power_kw" class="flex items-center justify-between gap-4">
        <dt class="text-on-surface-muted">Power</dt>
        <dd class="tabular-nums font-medium text-on-surface">{{ power_kw }}</dd>
      </div>
      <div data-if="backup_hours" class="flex items-center justify-between gap-4">
        <dt class="text-on-surface-muted">Backup</dt>
        <dd class="tabular-nums font-medium text-on-surface">{{ backup_hours }}</dd>
      </div>
    </dl>
  </div>
</div>
