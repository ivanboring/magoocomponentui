<article class="campaign-card flex flex-col overflow-hidden rounded-card border border-border bg-surface shadow-card">
  <div class="campaign-card__media aspect-[3/2] shrink-0 overflow-hidden bg-surface-raised">
    <img data-if="image" class="size-full object-cover" src="{{ image }}" alt="">
  </div>
  <div class="flex flex-1 flex-col gap-3 p-(--space-card)">
    <h3 class="font-heading text-lg text-on-surface">{{ title }}</h3>
    <div class="h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Campaign progress">
      <div class="campaign-card__fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ pct }}%"></div>
    </div>
    <div class="flex items-baseline justify-between gap-2 text-sm">
      <p class="text-on-surface"><span class="font-heading tabular-nums">{{ raised }}</span> <span class="text-on-surface-muted">of {{ goal }}</span></p>
      <p data-if="days_left" class="shrink-0 text-on-surface-muted tabular-nums">{{ days_left }} days left</p>
    </div>
    <button type="button" class="campaign-card__donate mt-1 rounded-button bg-primary px-4 py-2.5 text-center font-heading text-primary-contrast shadow-card transition-colors duration-(--duration-token) hover:bg-primary/90">Donate</button>
  </div>
</article>
