name: cause-hero
props:
  heading:
    type: string
    required: true
    title: Heading
    example: "Clean water for every village"
  subheading:
    type: string
    title: Subheading
    example: "Help us reach the last communities without a safe well."
  image:
    type: image
    title: Background image
    description: Optional background photo. Falls back to a solid primary panel when omitted.
    example: "/stock/property-house.jpg"
  raised:
    type: string
    title: Amount raised
    description: The amount raised so far, as a display string (currency formatting is the caller's).
    example: "$48,200"
  goal:
    type: string
    title: Goal
    description: The fundraising goal, as a display string. When set, the progress bar is shown.
    example: "$75,000"
  pct:
    type: integer
    title: Progress percent
    description: >
      Precomputed progress toward the goal, 0-100 (raised / goal). Sets the progress
      bar fill width and aria-valuenow; the directive language does no arithmetic, so
      pass the computed value.
    example: 64
  cta:
    type: object
    required: true
    title: Donate CTA
    description: "The donate call to action: { label, href }."
    example: { label: "Donate now", href: "#" }
