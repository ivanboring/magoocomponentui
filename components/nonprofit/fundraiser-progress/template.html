<div class="fundraiser-progress rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-baseline justify-between gap-3">
    <p class="font-heading text-2xl text-on-surface tabular-nums">{{ raised }}</p>
    <p class="fundraiser-progress__pct shrink-0 text-sm font-medium text-primary tabular-nums">{{ pct }}%</p>
  </div>
  <p class="mt-1 text-sm text-on-surface-muted">raised of {{ goal }} goal</p>
  <div class="mt-3 h-3 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Fundraising progress">
    <div class="fundraiser-progress__fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ pct }}%"></div>
  </div>
  <p data-if="donors" class="mt-2 text-sm text-on-surface-muted"><span class="font-medium text-on-surface tabular-nums">{{ donors }}</span> donors</p>
</div>
