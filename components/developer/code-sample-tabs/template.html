<div class="code-sample-tabs overflow-hidden rounded-card border border-border bg-surface">
  <div class="code-sample-tabs__list flex items-center gap-1 border-b border-border px-2" role="tablist" aria-label="{{ label }}">
    <button data-for="sample in samples" type="button" class="code-sample-tabs__tab -mb-px border-b-2 border-transparent px-3 py-2 font-mono text-xs font-medium text-on-surface-muted transition-colors duration-(--duration-token) hover:text-on-surface data-[active=true]:border-primary data-[active=true]:text-on-surface" role="tab" id="codetab-{{ sample.language }}" aria-controls="codepanel-{{ sample.language }}" aria-selected="{{ sample.active }}" data-active="{{ sample.active }}">{{ sample.language }}</button>
  </div>
  <div class="relative">
    <button type="button" class="code-sample-tabs__copy absolute right-2 top-2 z-10 inline-flex items-center gap-1 rounded-control border border-border bg-surface px-2 py-1 text-xs font-medium text-on-surface-muted transition-colors duration-(--duration-token) hover:text-on-surface" aria-label="Copy code">
      <svg class="size-3.5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect x="7" y="7" width="9" height="9" rx="1.5"/><path d="M4 13V4.5A1.5 1.5 0 0 1 5.5 3H13"/></svg>
      <span class="code-sample-tabs__copy-label">Copy</span>
    </button>
    <div data-for="sample in samples" class="code-sample-tabs__panel overflow-x-auto p-4 data-[active=false]:hidden" role="tabpanel" id="codepanel-{{ sample.language }}" aria-labelledby="codetab-{{ sample.language }}" data-active="{{ sample.active }}">
      <pre class="font-mono text-xs leading-relaxed text-on-surface"><code>{{ sample.code }}</code></pre>
    </div>
  </div>
</div>
