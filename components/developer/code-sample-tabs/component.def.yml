name: code-sample-tabs
props:
  label:
    type: string
    default: "Code samples"
    title: Tablist label
    description: Accessible name for the language tablist (aria-label).
  samples:
    type: array
    items: object
    required: true
    title: Samples
    description: >
      One entry per language tab. Each item: { language, code, active }. language is a short
      slug-like token used both as the visible tab label and to link the tab to its panel (keep it
      simple, e.g. curl, JavaScript, Python). code is the sample body (multi-line allowed). Mark
      exactly one item active: true - normally the first - so a panel is visible before JS runs.
    example:
      - { language: "curl", code: "curl https://api.example.com/v1/orders", active: true }
      - { language: "JavaScript", code: "await fetch('/v1/orders')", active: false }
