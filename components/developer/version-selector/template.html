<div class="version-selector group/vs relative inline-block" data-open="{{ start_open }}">
  <button type="button" class="version-selector__trigger inline-flex items-center gap-2 rounded-button border border-border bg-surface px-3 py-2 text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" aria-haspopup="listbox" aria-expanded="false">
    <span class="text-on-surface-muted">{{ label }}</span>
    <span class="version-selector__current font-mono">{{ current }}</span>
    <svg class="size-4 text-on-surface-muted transition-transform duration-(--duration-token) group-data-[open=true]/vs:rotate-180" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 8l5 5 5-5"/></svg>
  </button>
  <div class="version-selector__menu invisible pointer-events-none absolute right-0 z-30 mt-1 flex min-w-52 flex-col rounded-card border border-border bg-surface p-1 opacity-0 shadow-raised transition-opacity duration-(--duration-token) group-data-[open=true]/vs:visible group-data-[open=true]/vs:pointer-events-auto group-data-[open=true]/vs:opacity-100" role="listbox" aria-label="{{ label }}">
    <button data-for="version in versions" type="button" class="version-selector__item group/opt flex w-full items-center gap-2 rounded-control px-3 py-2 text-left text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised data-[current=true]:font-semibold" role="option" data-value="{{ version.label }}" data-current="{{ version.current }}" aria-selected="{{ version.current }}">
      <svg class="size-4 shrink-0 text-primary opacity-0 transition-opacity duration-(--duration-token) group-data-[current=true]/opt:opacity-100" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 10l3 3 7-7"/></svg>
      <span class="min-w-0 flex-1 truncate font-mono">{{ version.label }}</span>
      <span data-if="version.badge" class="shrink-0 rounded-pill bg-surface-raised px-2 py-0.5 text-xs font-medium text-on-surface-muted">{{ version.badge }}</span>
    </button>
  </div>
</div>
