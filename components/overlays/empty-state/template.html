<div class="empty-state flex flex-col items-center justify-center gap-3 rounded-card border border-dashed border-border bg-surface p-(--space-section) text-center">
  <div class="empty-state__illustration text-on-surface-muted"><slot name="illustration"></slot></div>
  <h3 class="empty-state__title font-heading text-lg text-on-surface">{{ title }}</h3>
  <p data-if="description" class="empty-state__description max-w-sm text-sm text-on-surface-muted">{{ description }}</p>
  <a data-if="cta_label" class="empty-state__cta mt-2 inline-flex items-center rounded-button bg-primary px-4 py-2 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90" href="{{ cta_href }}">{{ cta_label }}</a>
</div>
