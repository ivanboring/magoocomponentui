<div class="modal fixed inset-0 z-50 flex items-center justify-center p-4 data-[open=false]:hidden" data-open="{{ open }}">
  <div class="modal__backdrop absolute inset-0 bg-on-surface/40" data-modal-close aria-hidden="true"></div>
  <div class="modal__dialog relative z-10 flex w-full flex-col rounded-card bg-surface shadow-raised {{ size@class }}" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal__header flex items-start justify-between gap-4 border-b border-border p-(--space-card)">
      <h2 class="modal__title font-heading text-lg text-on-surface" id="modal-title">{{ title }}</h2>
      <button type="button" class="modal__close -m-1 shrink-0 rounded-control p-1 text-on-surface-muted transition-colors duration-(--duration-token) hover:text-on-surface" data-modal-close aria-label="Close">
        <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 5l10 10M15 5L5 15"/></svg>
      </button>
    </div>
    <div class="modal__body p-(--space-card) text-sm text-on-surface"><slot name="body"></slot></div>
    <div class="modal__footer flex justify-end gap-3 border-t border-border p-(--space-card)"><slot name="footer"></slot></div>
  </div>
</div>
