<div class="loading-overlay absolute inset-0 z-30 flex flex-col items-center justify-center gap-3 bg-surface/70 backdrop-blur-sm data-[visible=false]:hidden" data-visible="{{ visible }}" role="status" aria-live="polite">
  <span class="loading-overlay__spinner size-8 animate-spin rounded-full border-2 border-solid border-primary border-t-transparent" aria-hidden="true"></span>
  <span class="loading-overlay__label text-sm font-medium text-on-surface">{{ label }}</span>
</div>
