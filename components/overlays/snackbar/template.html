<div class="snackbar fixed bottom-6 left-1/2 z-40 flex -translate-x-1/2 items-center gap-4 rounded-card bg-on-surface px-4 py-3 text-sm text-surface shadow-raised" role="status" aria-live="polite">
  <span class="snackbar__message">{{ message }}</span>
  <button data-if="action_label" type="button" class="snackbar__action shrink-0 font-heading font-medium text-accent transition-opacity duration-(--duration-token) hover:opacity-80" data-snackbar-action>{{ action_label }}</button>
</div>
