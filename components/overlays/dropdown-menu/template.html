<div class="dropdown-menu relative inline-block">
  <span class="dropdown-menu__trigger" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false"><slot name="trigger"></slot></span>
  <div class="dropdown-menu__menu absolute z-30 mt-1 hidden min-w-48 flex-col rounded-card border border-border bg-surface p-1 shadow-raised {{ align@class }}" role="menu">
    <span data-for="item in items" class="dropdown-menu__row">
      <hr data-if="item.divider" class="my-1 border-border" role="none">
      <button data-if="!item.divider" type="button" class="dropdown-menu__item block w-full rounded-control px-3 py-2 text-left text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised data-[danger=true]:text-danger" role="menuitem" data-value="{{ item.value }}" data-danger="{{ item.danger }}">{{ item.label }}</button>
    </span>
  </div>
</div>
