<section class="current-weather rounded-card bg-gradient-to-br from-primary/20 to-surface p-(--space-section) shadow-card" aria-label="Current weather">
  <p class="current-weather__location font-heading text-on-surface">{{ location }}</p>
  <div class="current-weather__main mt-2 flex items-center gap-4">
    <span class="current-weather__icon text-6xl" aria-hidden="true">{{ icon }}</span>
    <div>
      <p class="current-weather__temp font-heading text-6xl leading-none text-on-surface tabular-nums">{{ temp }}</p>
      <p class="current-weather__condition mt-1 text-on-surface-muted">{{ condition }}</p>
    </div>
  </div>
  <p class="current-weather__range mt-2 text-sm text-on-surface-muted"><span data-if="high_low">{{ high_low }}</span><span data-if="feels_like"> · {{ feels_like }}</span></p>
  <dl data-if="stats" class="current-weather__stats mt-5 grid grid-cols-2 gap-3 border-t border-border pt-4 sm:grid-cols-4">
    <div data-for="stat in stats" class="flex items-center gap-2">
      <span class="text-lg" aria-hidden="true">{{ stat.icon }}</span>
      <div><dt class="text-xs text-on-surface-muted">{{ stat.label }}</dt><dd class="font-medium text-on-surface">{{ stat.value }}</dd></div>
    </div>
  </dl>
</section>
