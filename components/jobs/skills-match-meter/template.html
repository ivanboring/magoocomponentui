<section class="skills-match-meter flex items-center gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="Skills match">
  <div class="skills-match-meter__ring relative size-20 shrink-0">
    <svg class="size-full -rotate-90" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="45" class="text-surface-raised" stroke="currentColor" stroke-width="9"></circle>
      <circle cx="50" cy="50" r="45" class="text-primary" stroke="currentColor" stroke-width="9" stroke-linecap="round" stroke-dasharray="{{ dash }}"></circle>
    </svg>
    <span class="skills-match-meter__pct absolute inset-0 flex items-center justify-center font-heading text-on-surface tabular-nums">{{ pct }}</span>
  </div>
  <div class="min-w-0 flex-1">
    <p class="skills-match-meter__title font-heading text-on-surface">Skills match</p>
    <ul class="skills-match-meter__skills mt-2 flex flex-wrap gap-1.5">
      <li data-for="skill in skills" class="skills-match-meter__skill inline-flex items-center gap-1 rounded-pill px-2 py-0.5 text-xs data-[matched=true]:bg-success/15 data-[matched=true]:text-success data-[matched=false]:bg-surface-raised data-[matched=false]:text-on-surface-muted" data-matched="{{ skill.matched }}">
        <svg data-if="skill.matched" class="size-3" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
        {{ skill.label }}
      </li>
    </ul>
  </div>
</section>
