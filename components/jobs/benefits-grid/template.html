<section class="benefits-grid" aria-label="{{ title }}">
  <h3 class="benefits-grid__title font-heading text-lg text-on-surface">{{ title }}</h3>
  <ul class="benefits-grid__items mt-4 grid grid-cols-2 gap-3 sm:grid-cols-3">
    <li data-for="benefit in benefits" class="benefits-grid__item flex items-center gap-3 rounded-card border border-border bg-surface p-3 shadow-card">
      <span class="benefits-grid__icon flex size-9 shrink-0 items-center justify-center rounded-control bg-surface-raised text-lg" aria-hidden="true">{{ benefit.icon }}</span>
      <span class="text-sm text-on-surface">{{ benefit.label }}</span>
    </li>
  </ul>
</section>
