name: benefits-grid
props:
  gap:
    type: enum
    values: [default, none, sm, md, lg, xl]
    default: default
    title: Gap
    description: >
      Space between grid cells, from a fixed set of choices. "default" keeps the component's
      designed spacing; none/sm/md/lg/xl are explicit fixed overrides.
  title:
    type: string
    default: "Benefits & perks"
    title: Title
  benefits:
    type: array
    items: object
    required: true
    title: Benefits
    description: "Each: { icon, label }."
    example:
      - { icon: "🏥", label: "Health, dental & vision" }
variants:
  gap:
    default: "gap-3"
    none: "gap-0"
    sm: "gap-3"
    md: "gap-6"
    lg: "gap-10"
    xl: "gap-16"
