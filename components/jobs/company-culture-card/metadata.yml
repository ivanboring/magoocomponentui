name: "Company Culture Card"
short_description: A perks/values grid showcasing what it's like to work somewhere.
long_visual_description: >
  A card with a title and a grid of values, each an icon tile beside a label and a short
  detail.

use_cases:
  - Company culture on a careers page.
  - Perks and values grid.
  - Life-at-company section.
  - Why-work-here card.
  - Benefits/values highlight.

recommended_for:
  - Showcasing culture, perks, and values.
avoid_for:
  - A structured benefits list (use benefits-grid).

markets:
  - Global

example_usage: >
  List a handful of values with an icon, label, and one-line detail.

props:
  title: The section title.
  values: The values with icon, label, and detail.

example_prompts:
  - "Add a company culture card with perks and values."
  - "Add a life-at-company grid."

lifecycle: experimental
content_model: A grid of company values with details.

theming:
  tokens_used:
    - --color-surface
    - --color-surface-raised
    - --color-on-surface
    - --color-on-surface-muted
    - --color-border
    - --radius-card
    - --radius-control
    - --shadow-card
    - --font-heading
    - --space-card

editorial_guidance: >
  Be specific in the details (numbers, examples) rather than generic value words.

categorization:
  category: Jobs
  subcategory: Employer
  atomic_type: molecule
  usage_type: [grid, highlight]
  maturity: ai-generated
  wcag:
    level: AA
    notes: Icons are decorative; labels and details are real text; uses a real list.
  keyboard_support: "none"
  seo_score: 45
  text_direction: both
