<div class="clinic-locator grid grid-cols-1 gap-4 lg:grid-cols-2">
  <div class="clinic-locator__map relative overflow-hidden rounded-card border border-border bg-surface-raised shadow-card" style="min-height: 18rem">
    <svg class="absolute inset-0 size-full opacity-30 text-on-surface-muted" viewBox="0 0 320 240" fill="none" stroke="currentColor" stroke-width="1" aria-hidden="true"><path d="M0 80h320M0 160h320M120 0v240M220 0v240"/></svg>
    <button data-for="pin in pins" type="button" class="clinic-locator__pin absolute flex size-6 -translate-x-1/2 -translate-y-full items-center justify-center rounded-full bg-primary text-xs font-semibold text-primary-contrast shadow-card" style="left: {{ pin.x }}%; top: {{ pin.y }}%" aria-label="Clinic {{ pin.label }}">{{ pin.label }}</button>
  </div>
  <div class="clinic-locator__list">
    <p class="clinic-locator__count mb-3 text-sm font-medium text-on-surface">{{ result_count }}</p>
    <ul class="flex flex-col gap-2">
      <li data-for="clinic in clinics" class="clinic-locator__clinic rounded-card border border-border bg-surface p-3 shadow-card">
        <div class="flex items-start justify-between gap-2">
          <p class="font-heading text-on-surface">{{ clinic.name }}</p>
          <span class="clinic-locator__open shrink-0 rounded-pill px-2 py-0.5 text-xs font-medium data-[open=true]:bg-success/15 data-[open=true]:text-success data-[open=false]:bg-on-surface-muted/15 data-[open=false]:text-on-surface-muted" data-open="{{ clinic.open }}">{{ clinic.hours }}</span>
        </div>
        <p class="mt-0.5 text-sm text-on-surface-muted">{{ clinic.address }} · {{ clinic.distance }}</p>
      </li>
    </ul>
  </div>
</div>
