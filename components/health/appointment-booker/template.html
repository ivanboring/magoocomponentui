<form class="appointment-booker rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <p class="appointment-booker__provider font-heading text-on-surface">{{ provider }}</p>
  <p class="appointment-booker__label mt-4 text-sm font-medium text-on-surface">Select a day</p>
  <div class="appointment-booker__days mt-2 flex gap-2 overflow-x-auto pb-1" role="radiogroup" aria-label="Day">
    <button data-for="day in days" type="button" class="appointment-booker__day flex w-16 shrink-0 flex-col items-center rounded-control border border-border py-2 text-sm transition-colors duration-(--duration-token) data-[active=true]:border-primary data-[active=true]:bg-primary data-[active=true]:text-primary-contrast" data-active="{{ day.active }}" role="radio" aria-checked="{{ day.active }}">
      <span class="text-[10px] uppercase opacity-80">{{ day.label }}</span>
      <span class="font-heading">{{ day.date }}</span>
    </button>
  </div>
  <p class="appointment-booker__label mt-4 text-sm font-medium text-on-surface">Select a time</p>
  <div class="appointment-booker__slots mt-2 grid grid-cols-3 gap-2 sm:grid-cols-4" role="radiogroup" aria-label="Time">
    <button data-for="slot in slots_list" type="button" class="appointment-booker__slot rounded-control border px-2 py-1.5 text-sm font-medium transition-colors duration-(--duration-token) data-[available=true]:border-border data-[available=true]:text-on-surface data-[available=true]:hover:border-primary data-[available=false]:cursor-not-allowed data-[available=false]:border-border data-[available=false]:text-on-surface-muted/40 data-[available=false]:line-through" data-available="{{ slot.available }}" role="radio" aria-checked="false">{{ slot.time }}</button>
  </div>
  <button type="submit" class="appointment-booker__cta mt-5 w-full rounded-button bg-primary py-2.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">{{ cta_label }}</button>
</form>
