name: patient-header
props:
  name:
    type: string
    required: true
    title: Name
    example: "Jane Doe"
  initials:
    type: string
    required: true
    title: Initials
    example: "JD"
  image:
    type: image
    title: Photo
  meta:
    type: string
    required: true
    title: Meta
    example: "42 yrs · Female · MRN 00482215"
  facts:
    type: array
    items: object
    required: true
    title: Facts
    description: "Each fact: { label, value }."
    example:
      - { label: "Blood type", value: "O+" }
  alerts:
    type: array
    items: object
    title: Alerts
    description: "Each alert: { label } — e.g. allergy warnings."
