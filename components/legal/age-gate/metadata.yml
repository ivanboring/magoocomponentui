    - --shadow-card
    - --space-card
    - --duration-token
    - --font-heading

editorial_guidance: >
  Ask plainly and say why if it helps trust. Make the confirm action state the age so the choice is
  explicit, and keep Exit clearly secondary. Never imply the check verifies identity.

relationships:
  related:
    - legal/disclosure-accordion
    - overlays/modal

categorization:
  category: Legal & Compliance
  subcategory: Gates
  atomic_type: organism
  usage_type: [highlight, gate]
  maturity: ai-generated
  wcag:
    level: AA
    notes: Rendered as a labelled dialog; both actions are real buttons with visible focus rings and the icon is aria-hidden. Outcome is conveyed by button text, not colour.
  keyboard_support: Both buttons are focusable and activate on Enter/Space; the confirm and exit outcomes are announced by their labels.
  seo_score: 20
  text_direction: both
