<div class="age-gate mx-auto max-w-md rounded-card border border-border bg-surface p-(--space-card) text-center shadow-card" role="dialog" aria-modal="true" aria-label="{{ heading }}">
  <span class="age-gate__icon mx-auto mb-4 flex size-12 items-center justify-center rounded-pill bg-primary/10 text-primary" aria-hidden="true">
    <svg class="size-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M12 3l7 2.5v6c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9v-6L12 3z"/><path d="M9 12l2 2 4-4"/></svg>
  </span>
  <h2 class="age-gate__heading font-heading text-xl text-on-surface">{{ heading }}</h2>
  <p data-if="message" class="age-gate__message mt-2 text-sm text-on-surface-muted">{{ message }}</p>
  <div class="mt-6 flex flex-col gap-2">
    <button type="button" class="age-gate__enter inline-flex items-center justify-center rounded-button bg-primary px-4 py-2.5 font-heading text-sm text-primary-contrast transition-colors duration-(--duration-token) hover:opacity-90 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring">I am {{ min_age }} or older</button>
    <button type="button" class="age-gate__exit inline-flex items-center justify-center rounded-button border border-border bg-surface px-4 py-2.5 font-heading text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring">Exit</button>
  </div>
</div>
