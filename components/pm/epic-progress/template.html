<div class="epic-progress rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="mb-2 flex items-baseline justify-between gap-3">
    <h3 class="epic-progress__name min-w-0 truncate font-heading text-sm text-on-surface">{{ name }}</h3>
    <span class="shrink-0 text-xs text-on-surface-muted tabular-nums">{{ done }}/{{ total }} stories</span>
  </div>
  <div class="h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="{{ name }} progress">
    <div class="epic-progress__fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ pct }}%"></div>
  </div>
</div>
