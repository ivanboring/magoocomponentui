<div class="gantt-row flex items-center gap-4 py-1.5">
  <div class="gantt-row__label w-40 shrink-0">
    <p class="truncate text-sm text-on-surface">{{ label }}</p>
    <p data-if="dates" class="truncate text-xs tabular-nums text-on-surface-muted">{{ dates }}</p>
  </div>
  <div class="gantt-row__track relative h-6 min-w-0 flex-1 rounded-control bg-surface-raised">
    <div class="gantt-row__bar absolute inset-y-0 rounded-control {{ color_class }}" style="left: {{ bar_left }}%; width: {{ bar_width }}%"></div>
  </div>
  <span class="hidden bg-primary bg-secondary bg-accent bg-success bg-warning bg-danger bg-info" aria-hidden="true"></span>
</div>
