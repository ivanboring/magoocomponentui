name: project-health-card
props:
  name:
    type: string
    required: true
    title: Project name
    description: The project's title.
    example: "Mobile checkout"
  status:
    type: enum
    values: ["on-track", "at-risk", "off-track"]
    default: on-track
    title: Health status
    description: >
      The project's health. Colours the status pill — on-track is success, at-risk is warning,
      off-track is danger.
    example: at-risk
  summary:
    type: string
    title: Summary
    description: Optional one-line status note.
    example: "Slipping on QA capacity; mitigation in progress."
  metrics:
    type: array
    items: object
    title: Metrics
    description: >
      Optional small key figures shown in a row. Each item: { label, value }.
    example:
      - { label: "Progress", value: "72%" }
      - { label: "Due", value: "Aug 4" }
variants:
  status:
    "on-track": "bg-success/10 text-success"
    "at-risk": "bg-warning/10 text-warning"
    "off-track": "bg-danger/10 text-danger"
