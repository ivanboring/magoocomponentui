<div class="milestone-marker inline-flex items-center gap-2">
  <span class="milestone-marker__icon shrink-0 {{ status@class }}" aria-hidden="true">
    <svg class="size-4" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1.5l6.5 6.5L8 14.5 1.5 8z"/></svg>
  </span>
  <span class="milestone-marker__label text-sm font-medium text-on-surface">{{ label }}</span>
  <span class="milestone-marker__date text-sm tabular-nums text-on-surface-muted">{{ date }}</span>
</div>
