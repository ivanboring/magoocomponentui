<section class="kanban-board flex gap-4 overflow-x-auto py-1 [scrollbar-width:thin]" aria-label="{{ label }}">
  <div data-for="column in columns" class="kanban-board__column flex w-72 shrink-0 flex-col rounded-card border border-border bg-surface-raised p-3">
    <header class="kanban-board__col-header mb-3 flex items-center justify-between gap-2 px-1">
      <h3 class="font-heading text-sm text-on-surface">{{ column.label }}</h3>
      <span class="kanban-board__count rounded-pill bg-surface px-2 py-0.5 text-xs font-medium tabular-nums text-on-surface-muted">
        {{ column.count }}<span data-if="column.wip"> / {{ column.wip }}</span>
      </span>
    </header>
    <div class="kanban-board__list flex flex-col gap-2">
      <article data-for="task in column.tasks" class="kanban-board__card rounded-control border border-border bg-surface p-3 shadow-card">
        <span data-if="task.tag" class="kanban-board__tag mb-2 inline-block rounded-pill bg-surface-raised px-2 py-0.5 text-[11px] font-medium uppercase tracking-wide text-on-surface-muted">{{ task.tag }}</span>
        <p class="kanban-board__title text-sm text-on-surface">{{ task.title }}</p>
        <div class="kanban-board__card-footer mt-3 flex items-center justify-between gap-2">
          <span class="kanban-board__priority size-2 shrink-0 rounded-pill bg-border data-[priority=low]:bg-on-surface-muted data-[priority=medium]:bg-info data-[priority=high]:bg-warning data-[priority=urgent]:bg-danger" data-priority="{{ task.priority }}" aria-hidden="true"></span>
          <span data-if="task.assignee_initials" class="kanban-board__avatar flex size-6 items-center justify-center rounded-pill bg-surface-raised text-[11px] font-medium text-on-surface-muted">{{ task.assignee_initials }}</span>
        </div>
      </article>
    </div>
  </div>
</section>
