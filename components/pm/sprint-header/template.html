<header class="sprint-header flex flex-wrap items-center justify-between gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="sprint-header__meta min-w-0">
    <h2 class="sprint-header__name font-heading text-lg text-on-surface">{{ name }}</h2>
    <p data-if="start" class="sprint-header__dates mt-0.5 text-sm tabular-nums text-on-surface-muted">{{ start }}<span data-if="end"> - {{ end }}</span></p>
  </div>
  <div class="sprint-header__stats flex items-center gap-6">
    <div data-if="points_total" class="sprint-header__points">
      <p class="text-xs uppercase tracking-wide text-on-surface-muted">Points</p>
      <p class="font-heading text-xl tabular-nums text-on-surface"><span class="text-primary">{{ points_done }}</span> / {{ points_total }}</p>
    </div>
    <div data-if="days_left" class="sprint-header__days-left">
      <p class="text-xs uppercase tracking-wide text-on-surface-muted">Days left</p>
      <p class="font-heading text-xl tabular-nums text-on-surface">{{ days_left }}</p>
    </div>
  </div>
</header>
