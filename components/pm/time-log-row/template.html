<div class="time-log-row flex items-center gap-3 border-b border-border py-3">
  <span data-if="initials" class="time-log-row__avatar inline-flex size-8 shrink-0 items-center justify-center rounded-full bg-surface-raised font-heading text-xs uppercase text-on-surface" role="img" aria-label="{{ user }}">{{ initials }}</span>
  <div class="min-w-0 flex-1">
    <p class="time-log-row__task truncate text-sm text-on-surface">{{ task }}</p>
    <p data-if="date" class="text-xs text-on-surface-muted">{{ date }}</p>
  </div>
  <span data-if="billable" class="time-log-row__billable shrink-0 rounded-pill bg-success/10 px-2 py-0.5 text-xs font-medium text-success">Billable</span>
  <span class="time-log-row__hours shrink-0 font-mono text-sm text-on-surface tabular-nums">{{ hours }}</span>
</div>
