<div class="model-picker group/mp relative inline-block text-sm" data-open="{{ start_open }}">
  <button type="button" class="model-picker__trigger inline-flex items-center gap-2 rounded-button border border-border bg-surface px-3 py-2 text-on-surface shadow-card transition-colors duration-(--duration-token) hover:bg-surface-raised" aria-haspopup="listbox" aria-expanded="{{ start_open }}">
    <span class="text-on-surface-muted">{{ label }}</span>
    <span class="model-picker__current font-medium text-on-surface">{{ current }}</span>
    <svg class="size-4 text-on-surface-muted transition-transform duration-(--duration-token) group-data-[open=true]/mp:rotate-180" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 8l5 5 5-5"/></svg>
  </button>
  <div class="model-picker__menu invisible pointer-events-none absolute left-0 top-full z-30 mt-1 w-72 rounded-card border border-border bg-surface p-1 opacity-0 shadow-raised transition-opacity duration-(--duration-token) group-data-[open=true]/mp:visible group-data-[open=true]/mp:opacity-100 group-data-[open=true]/mp:pointer-events-auto" role="listbox" aria-label="{{ label }}">
    <button data-for="model in models" type="button" class="model-picker__option flex w-full items-start gap-3 rounded-control px-3 py-2 text-left transition-colors duration-(--duration-token) hover:bg-surface-raised" role="option" data-value="{{ model.name }}" data-selected="{{ model.selected }}" aria-selected="{{ model.selected }}">
      <span class="min-w-0 flex-1">
        <span class="flex items-center gap-2">
          <span class="font-medium text-on-surface">{{ model.name }}</span>
          <span data-if="model.badge" class="rounded-pill bg-primary/10 px-2 py-0.5 text-xs font-medium text-primary">{{ model.badge }}</span>
        </span>
        <span data-if="model.description" class="mt-0.5 block text-xs text-on-surface-muted">{{ model.description }}</span>
      </span>
      <svg data-if="model.selected" class="mt-0.5 size-4 shrink-0 text-primary" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
    </button>
  </div>
</div>
