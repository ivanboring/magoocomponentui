name: code-block-ai
props:
  language:
    type: string
    default: "javascript"
    title: Language
    description: The language label shown in the header (and a hint for syntax intent).
  code:
    type: string
    required: true
    title: Code
    description: The source code to display. Rendered verbatim in a monospace block.
    example: "console.log('hello world');"
  runnable:
    type: boolean
    default: false
    title: Runnable
    description: Show a Run button in the header that emits a code:run event.
