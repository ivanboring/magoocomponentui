<div class="feedback-thumbs group/ft inline-flex gap-1" data-value="{{ value }}">
  <button type="button" class="feedback-thumbs__up flex size-8 items-center justify-center rounded-control text-on-surface-muted transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface group-data-[value=up]/ft:bg-success/10 group-data-[value=up]/ft:text-success" aria-label="{{ up_label }}" aria-pressed="false">
    <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M6 9v8H3V9h3zm0 0l3-6a2 2 0 012 2v2h4a2 2 0 012 2l-1.4 5A2 2 0 0114.6 17H6"/></svg>
  </button>
  <button type="button" class="feedback-thumbs__down flex size-8 items-center justify-center rounded-control text-on-surface-muted transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface group-data-[value=down]/ft:bg-danger/10 group-data-[value=down]/ft:text-danger" aria-label="{{ down_label }}" aria-pressed="false">
    <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M14 11V3h3v8h-3zm0 0l-3 6a2 2 0 01-2-2v-2H5a2 2 0 01-2-2l1.4-5A2 2 0 015.4 3H14"/></svg>
  </button>
</div>
