<ol class="citation-list flex flex-col gap-2">
  <li data-for="source in sources" class="flex gap-3 rounded-card border border-border bg-surface p-3 shadow-card">
    <span class="flex size-6 shrink-0 items-center justify-center rounded-pill bg-primary/10 font-mono text-xs font-medium text-primary">{{ source.index }}</span>
    <span class="min-w-0 flex-1">
      <a class="block truncate font-medium text-on-surface transition-colors duration-(--duration-token) hover:text-primary hover:underline" href="{{ source.url }}" target="_blank" rel="noopener">{{ source.title }}</a>
      <span data-if="source.domain" class="mt-0.5 block truncate text-xs text-on-surface-muted">{{ source.domain }}</span>
      <span data-if="source.snippet" class="mt-1 block text-sm text-on-surface-muted">{{ source.snippet }}</span>
    </span>
  </li>
</ol>
