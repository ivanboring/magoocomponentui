<div class="challenge-progress rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <h3 class="font-heading text-on-surface">{{ title }}</h3>
      <p data-if="description" class="mt-0.5 text-sm text-on-surface-muted">{{ description }}</p>
    </div>
    <span data-if="reward" class="shrink-0 rounded-pill bg-primary/10 px-3 py-1 text-xs font-medium text-primary">{{ reward }}</span>
  </div>
  <div class="mt-4">
    <div class="mb-1 flex items-center justify-between text-xs text-on-surface-muted">
      <span class="tabular-nums">{{ current }}/{{ target }}</span>
      <span class="tabular-nums">{{ pct }}%</span>
    </div>
    <div class="h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="{{ title }}">
      <div class="challenge-progress__fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ pct }}%"></div>
    </div>
  </div>
</div>
