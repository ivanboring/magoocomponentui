<div class="referral-invite rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start gap-3">
    <span class="shrink-0 text-primary" aria-hidden="true">
      <svg class="size-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4v4h16V7zM12 7v14M12 7C12 5 10.5 3 8.5 3S5 4.5 5 6s2 1 3.5 1M12 7c0-2 1.5-4 3.5-4S19 4.5 19 6s-2 1-3.5 1M4 11v9a1 1 0 001 1h14a1 1 0 001-1v-9"/></svg>
    </span>
    <div class="min-w-0 flex-1">
      <h3 data-if="bonus" class="referral-invite__headline font-heading text-on-surface">{{ bonus }}</h3>
      <p data-if="placeholder" class="mt-1 text-sm text-on-surface-muted">{{ placeholder }}</p>
    </div>
  </div>
  <div class="referral-invite__field mt-4 flex items-center gap-2 rounded-control border border-border bg-surface-raised p-1.5">
    <code class="referral-invite__code min-w-0 flex-1 truncate px-2 font-mono text-sm text-on-surface">{{ code }}</code>
    <button type="button" class="referral-invite__copy shrink-0 rounded-control bg-primary px-3 py-1.5 text-sm font-medium text-primary-contrast transition-colors duration-(--duration-token) hover:bg-primary/90" data-copy="{{ code }}" data-label-default="Copy" data-label-copied="Copied!" aria-label="Copy referral code">
      <span class="referral-invite__copy-label">Copy</span>
    </button>
  </div>
  <p data-if="referred_count" class="referral-invite__count mt-3 text-sm text-on-surface-muted">
    <span class="font-medium text-on-surface tabular-nums">{{ referred_count }}</span> friends joined
  </p>
</div>
