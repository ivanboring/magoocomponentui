<div class="punch-card rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div data-if="title" class="mb-3 flex items-center justify-between gap-3">
    <h3 class="punch-card__title font-heading text-on-surface">{{ title }}</h3>
    <span data-if="total" class="punch-card__count text-sm font-medium text-on-surface-muted tabular-nums">{{ filled_count }}/{{ total }}</span>
  </div>
  <div class="punch-card__grid grid grid-cols-5 gap-2">
    <div data-for="stamp in stamps" data-filled="{{ stamp.filled }}" class="punch-card__stamp flex aspect-square items-center justify-center rounded-pill border-2 border-dashed border-border text-transparent transition-colors duration-(--duration-token) data-[filled=true]:border-solid data-[filled=true]:border-transparent data-[filled=true]:bg-primary data-[filled=true]:text-primary-contrast">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M4 10l4 4 8-9"/></svg>
    </div>
  </div>
  <p data-if="reward_label" class="punch-card__reward mt-3 text-sm text-on-surface-muted">{{ reward_label }}</p>
</div>
