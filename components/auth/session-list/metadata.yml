name: "Session List"
short_description: A list of active device sessions with revoke actions.
long_visual_description: >
  A list of active sessions, each with a device icon, device/browser, location, last-active
  time, a this-device tag, and a revoke button for others.

use_cases:
  - Active sessions/devices.
  - Where you're signed in.
  - Session management.
  - Device list.
  - Security sessions.

recommended_for:
  - A list of active sessions with revoke.
avoid_for:
  - A login history log (build a log).

markets:
  - Global

example_usage: >
  List sessions with device, location, and last active; the current device is tagged and
  others can be revoked.

props:
  title: The section title.
  sessions: The active sessions.

example_prompts:
  - "Add an active sessions list with revoke."
  - "Add a where-you're-signed-in panel."

lifecycle: experimental
content_model: A list of active sessions with revoke.

theming:
  tokens_used:
    - --color-surface
    - --color-surface-raised
    - --color-on-surface
    - --color-on-surface-muted
    - --color-success
    - --color-danger
    - --color-border
    - --radius-card
    - --radius-control
    - --radius-pill
    - --radius-button
    - --shadow-card
    - --font-heading
    - --space-card
    - --duration-token

editorial_guidance: >
  Tag the current device; show location and last active so users can spot anomalies.

categorization:
  category: Auth
  subcategory: Security
  atomic_type: organism
  usage_type: [list-item]
  maturity: ai-generated
  wcag:
    level: AA
    notes: The current device is tagged in text; revoke is a real button; device/location are real text; icons are decorative.
  keyboard_support: Revoke buttons are focusable and activate on Enter/Space.
  seo_score: 30
  text_direction: both
