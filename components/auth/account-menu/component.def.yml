name: account-menu
props:
  name:
    type: string
    required: true
    title: Name
    example: "Jane Doe"
  email:
    type: string
    title: Email
    example: "jane@example.com"
  initials:
    type: string
    required: true
    title: Initials
    example: "JD"
  image:
    type: image
    title: Avatar
  items:
    type: array
    items: object
    required: true
    title: Items
    description: "Each: { label, icon, danger }."
    example:
      - { label: "Profile", icon: "👤", danger: false }
