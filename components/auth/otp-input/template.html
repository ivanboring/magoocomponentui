<div class="otp-input">
  <p class="otp-input__label text-sm font-medium text-on-surface">{{ label }}</p>
  <p data-if="help" class="otp-input__help text-xs text-on-surface-muted">{{ help }}</p>
  <div class="otp-input__cells mt-3 flex gap-2" role="group" aria-label="{{ label }}">
    <input data-for="cell in cells" type="text" inputmode="numeric" maxlength="1" class="otp-input__cell size-12 rounded-control border border-border bg-surface text-center font-heading text-xl text-on-surface outline-none focus:border-ring focus:ring-2 focus:ring-ring/30" value="{{ cell.value }}" aria-label="Code digit">
  </div>
</div>
