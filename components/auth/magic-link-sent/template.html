<section class="magic-link-sent mx-auto max-w-sm rounded-card border border-border bg-surface p-(--space-section) text-center shadow-card">
  <span class="magic-link-sent__icon mx-auto flex size-14 items-center justify-center rounded-full bg-primary/10 text-primary" aria-hidden="true">
    <svg class="size-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
  </span>
  <h2 class="magic-link-sent__title mt-4 font-heading text-xl text-on-surface">{{ title }}</h2>
  <p class="magic-link-sent__description mt-2 text-sm text-on-surface-muted">{{ description }}</p>
  <p class="magic-link-sent__email mt-2 font-medium text-on-surface">{{ email }}</p>
  <button type="button" class="magic-link-sent__resend mt-5 text-sm font-medium text-primary hover:underline">{{ resend_label }}</button>
</section>
