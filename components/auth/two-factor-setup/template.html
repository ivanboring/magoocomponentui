<section class="two-factor-setup rounded-card border border-border bg-surface p-(--space-section) shadow-card">
  <p data-if="step_label" class="two-factor-setup__step text-xs font-semibold uppercase tracking-wide text-primary">{{ step_label }}</p>
  <h2 class="two-factor-setup__title mt-1 font-heading text-xl text-on-surface">{{ title }}</h2>
  <p class="two-factor-setup__instruction mt-2 text-sm text-on-surface-muted">{{ instruction }}</p>
  <div class="two-factor-setup__qr relative mx-auto mt-4 flex size-40 items-center justify-center rounded-card border border-border bg-white p-2" role="img" aria-label="Authenticator QR code" data-otpauth="{{ otpauth }}">
    <svg class="size-16 text-slate-300" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm10-2h2v2h-2v-2zm4 0h2v2h-2v-2zm-4 4h2v2h-2v-2zm2 2h2v2h-2v-2zm2-2h2v2h-2v-2zm0 4h2v2h-2v-2z"/></svg>
    <img class="two-factor-setup__qr-img absolute inset-2 object-contain" alt="">
  </div>
  <p data-if="secret" class="two-factor-setup__secret mt-3 text-center text-xs text-on-surface-muted">Or enter manually: <span class="two-factor-setup__secret-value font-mono text-on-surface">{{ secret }}</span></p>
  <div class="two-factor-setup__code mt-5">
    <p class="text-sm font-medium text-on-surface">Enter the 6-digit code</p>
    <div class="mt-2 flex justify-center gap-2" role="group" aria-label="Authentication code">
      <input data-for="cell in cells" type="text" inputmode="numeric" maxlength="1" class="two-factor-setup__cell size-11 rounded-control border border-border bg-surface text-center font-heading text-lg text-on-surface outline-none focus:border-ring" value="{{ cell.value }}" aria-label="Code digit">
    </div>
  </div>
  <button type="button" class="two-factor-setup__cta mt-5 w-full rounded-button bg-primary py-2.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">Verify & enable</button>
</section>
