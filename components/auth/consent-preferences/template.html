<section class="consent-preferences rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="{{ title }}">
  <h3 class="consent-preferences__title font-heading text-lg text-on-surface">{{ title }}</h3>
  <p data-if="description" class="consent-preferences__description mt-1 text-sm text-on-surface-muted">{{ description }}</p>
  <ul class="consent-preferences__categories mt-4 flex flex-col divide-y divide-border">
    <li data-for="category in categories" class="consent-preferences__category flex items-start justify-between gap-4 py-3 first:pt-0 last:pb-0">
      <div class="min-w-0">
        <p class="flex items-center gap-2 text-sm font-medium text-on-surface">{{ category.label }}<span data-if="category.required" class="rounded-pill bg-surface-raised px-1.5 py-0.5 text-[10px] font-semibold uppercase text-on-surface-muted">Always on</span></p>
        <p data-if="category.detail" class="text-xs text-on-surface-muted">{{ category.detail }}</p>
      </div>
      <button type="button" class="consent-preferences__switch relative inline-flex h-6 w-11 shrink-0 items-center rounded-pill bg-surface-raised transition-colors duration-(--duration-token) data-[on=true]:bg-primary data-[required=true]:cursor-not-allowed data-[required=true]:opacity-60" data-on="{{ category.enabled }}" data-required="{{ category.required }}" role="switch" aria-checked="{{ category.enabled }}" aria-label="Toggle {{ category.label }}">
        <span class="ml-0.5 inline-block size-5 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[on=true]:translate-x-5" data-on="{{ category.enabled }}"></span>
      </button>
    </li>
  </ul>
  <button type="button" class="consent-preferences__cta mt-5 w-full rounded-button bg-primary py-2.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">{{ cta_label }}</button>
</section>
