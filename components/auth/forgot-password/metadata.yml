name: "Forgot Password"
short_description: A password-reset request form with email and a back-to-sign-in link.
long_visual_description: >
  A card with a title, explanation, an email field, a send-reset-link button, and a
  back-to-sign-in link.

use_cases:
  - Forgot-password form.
  - Reset request.
  - Recover account.
  - Password recovery.
  - Reset link request.

recommended_for:
  - A password-reset request form.
avoid_for:
  - A set-new-password form (build a distinct form).

markets:
  - Global

example_usage: >
  Capture the email and send a reset link; offer a path back to sign in.

props:
  title: The form title.
  description: The explanation.
  placeholder: The email placeholder.
  cta_label: The submit button text.
  back_label: The back-to-sign-in link text.

example_prompts:
  - "Add a forgot-password reset request form."
  - "Add a recover-account form."

lifecycle: experimental
content_model: A password-reset request form.

theming:
  tokens_used:
    - --color-surface
    - --color-on-surface
    - --color-on-surface-muted
    - --color-primary
    - --color-primary-contrast
    - --color-border
    - --color-ring
    - --radius-card
    - --radius-control
    - --radius-button
    - --shadow-card
    - --font-heading
    - --space-section
    - --duration-token

editorial_guidance: >
  Explain what happens next; always offer a way back to sign in.

categorization:
  category: Auth
  subcategory: Password
  atomic_type: molecule
  usage_type: [form]
  maturity: ai-generated
  wcag:
    level: AA
    notes: The email field has a label and required; submit is a real button; back is a real link.
  keyboard_support: Field and submit are focusable; submit via Enter.
  seo_score: 30
  text_direction: both
