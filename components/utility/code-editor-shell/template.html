<div class="code-editor-shell overflow-hidden rounded-card border border-border bg-surface shadow-card">
  <div class="code-editor-shell__tabs flex items-stretch border-b border-border bg-surface-raised" role="tablist" aria-label="Open files">
    <button data-for="tab in tabs" type="button" class="code-editor-shell__tab group flex items-center gap-2 border-r border-border px-3 py-2 font-mono text-sm text-on-surface-muted transition-colors duration-(--duration-token) hover:text-on-surface data-[active=true]:bg-surface data-[active=true]:text-on-surface" role="tab" aria-selected="{{ tab.active }}" data-active="{{ tab.active }}" data-tab="{{ tab.name }}">
      <span>{{ tab.name }}</span>
      <span class="code-editor-shell__close -mr-1 rounded p-0.5 text-on-surface-muted transition-colors hover:bg-border hover:text-on-surface" aria-hidden="true">
        <svg class="size-3.5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 5l10 10M15 5L5 15"/></svg>
      </span>
    </button>
    <span data-if="language" class="ml-auto self-center px-3 font-mono text-xs uppercase tracking-wide text-on-surface-muted">{{ language }}</span>
  </div>
  <div class="code-editor-shell__body flex overflow-x-auto font-mono text-sm">
    <div class="code-editor-shell__gutter shrink-0 select-none border-r border-border px-3 py-3 text-right text-on-surface-muted" aria-hidden="true">
      <div data-for="line in lines" class="tabular-nums leading-6">{{ line.num }}</div>
    </div>
    <pre class="code-editor-shell__code flex-1 overflow-x-auto py-3 pl-4 pr-6 text-on-surface"><code data-for="line in lines" class="block whitespace-pre leading-6">{{ line.code }}</code></pre>
  </div>
</div>
