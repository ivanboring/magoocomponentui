<div class="infinite-scroll-sentinel flex items-center justify-center gap-2 py-4 text-sm text-on-surface-muted" data-done="{{ done }}" role="status" aria-live="polite">
  <span data-if="!done" class="flex items-center gap-2">
    <svg class="size-4 motion-safe:animate-spin" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/>
    </svg>
    <span>{{ label }}</span>
  </span>
  <span data-if="done">You have reached the end</span>
</div>
