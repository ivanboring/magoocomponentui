<div class="resizable-panel relative flex h-64 w-72 flex-col overflow-hidden rounded-card border border-border bg-surface shadow-card" data-edge="{{ edge }}">
  <p data-if="title" class="shrink-0 border-b border-border px-4 py-2 text-xs font-semibold uppercase tracking-wide text-on-surface-muted">{{ title }}</p>
  <div class="min-h-0 flex-1 overflow-auto p-4 text-sm text-on-surface">
    <slot name="content"></slot>
  </div>
  <div class="resizable-panel__handle absolute touch-none bg-border transition-colors duration-(--duration-token) hover:bg-primary {{ edge@class }}" role="separator" aria-label="Resize panel"></div>
</div>
