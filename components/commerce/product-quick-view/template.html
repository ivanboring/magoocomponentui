<div class="product-quick-view fixed inset-0 z-50 flex items-center justify-center p-4 data-[open=false]:hidden" data-open="{{ open }}">
  <div class="product-quick-view__backdrop absolute inset-0 bg-on-surface/40" data-quickview-close aria-hidden="true"></div>
  <div class="product-quick-view__panel relative z-10 grid w-full max-w-2xl grid-cols-1 overflow-hidden rounded-card bg-surface shadow-raised sm:grid-cols-2" role="dialog" aria-modal="true" aria-labelledby="quickview-name">
    <div class="product-quick-view__media aspect-square bg-surface-raised">
      <img data-if="image" class="size-full object-cover" src="{{ image }}" alt="{{ name }}">
    </div>
    <div class="product-quick-view__body relative flex flex-col p-(--space-card)">
      <button type="button" class="product-quick-view__close absolute right-3 top-3 rounded-control p-1 text-on-surface-muted hover:text-on-surface" data-quickview-close aria-label="Close">
        <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 5l10 10M15 5L5 15"/></svg>
      </button>
      <h2 class="product-quick-view__name font-heading text-lg text-on-surface" id="quickview-name">{{ name }}</h2>
      <p class="product-quick-view__price mt-1 font-heading text-xl text-on-surface">{{ price }}</p>
      <p data-if="description" class="product-quick-view__description mt-3 flex-1 text-sm text-on-surface-muted">{{ description }}</p>
      <button type="button" class="product-quick-view__add mt-4 w-full rounded-button bg-primary py-2.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">Add to cart</button>
    </div>
  </div>
</div>
