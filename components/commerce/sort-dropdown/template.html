<div class="sort-dropdown relative inline-block">
  <button type="button" class="sort-dropdown__toggle flex items-center gap-2 rounded-control border border-border bg-surface px-3 py-2 text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" aria-haspopup="true" aria-expanded="false">
    <span class="text-on-surface-muted">Sort:</span>
    <span class="font-medium">{{ current }}</span>
    <svg class="size-4 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 8l4 4 4-4"/></svg>
  </button>
  <ul class="sort-dropdown__menu absolute right-0 z-20 mt-1 hidden min-w-48 flex-col rounded-card border border-border bg-surface p-1 shadow-raised" role="menu">
    <li data-for="option in options" role="none">
      <button type="button" class="sort-dropdown__option flex w-full items-center justify-between gap-2 rounded-control px-3 py-2 text-left text-sm text-on-surface hover:bg-surface-raised data-[active=true]:font-medium" role="menuitemradio" data-value="{{ option.value }}" data-active="{{ option.active }}" aria-checked="{{ option.active }}">
        {{ option.label }}
        <svg data-if="option.active" class="size-4 text-primary" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
      </button>
    </li>
  </ul>
</div>
