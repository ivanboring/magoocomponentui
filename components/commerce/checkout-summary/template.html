<section class="checkout-summary rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="Order summary">
  <h3 class="checkout-summary__title font-heading text-on-surface">Order summary</h3>
  <dl class="checkout-summary__lines mt-4 flex flex-col gap-2 text-sm">
    <div data-for="line in lines" class="flex items-center justify-between">
      <dt class="text-on-surface-muted">{{ line.label }}</dt>
      <dd class="text-on-surface data-[muted=true]:text-on-surface-muted tabular-nums" data-muted="{{ line.muted }}">{{ line.value }}</dd>
    </div>
  </dl>
  <div class="checkout-summary__total mt-4 flex items-center justify-between border-t border-border pt-4">
    <span class="font-heading text-on-surface">{{ total_label }}</span>
    <span class="font-heading text-lg text-on-surface tabular-nums">{{ total_value }}</span>
  </div>
  <button type="button" class="checkout-summary__cta mt-4 w-full rounded-button bg-primary py-2.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">{{ cta_label }}</button>
</section>
