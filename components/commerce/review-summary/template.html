<section class="review-summary flex flex-col gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card sm:flex-row sm:items-center" aria-label="Review summary">
  <div class="review-summary__score flex shrink-0 flex-col items-center gap-1 sm:w-32">
    <span class="font-heading text-4xl text-on-surface tabular-nums">{{ average }}</span>
    <span class="flex items-center gap-0.5 text-warning" role="img" aria-label="Average rating">
      <svg data-for="star in stars" class="size-4 data-[filled=false]:opacity-25" data-filled="{{ star.filled }}" viewBox="0 0 20 20" fill="currentColor"><path d="M10 1.5l2.6 5.3 5.9.9-4.3 4.1 1 5.9L10 14.9l-5.2 2.8 1-5.9-4.3-4.1 5.9-.9L10 1.5z"/></svg>
    </span>
    <span class="text-xs text-on-surface-muted">{{ count }}</span>
  </div>
  <div class="review-summary__breakdown flex flex-1 flex-col gap-1.5">
    <div data-for="row in breakdown" class="flex items-center gap-2 text-xs text-on-surface-muted">
      <span class="w-3 text-right tabular-nums">{{ row.label }}</span>
      <svg class="size-3 text-warning" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.5l2.6 5.3 5.9.9-4.3 4.1 1 5.9L10 14.9l-5.2 2.8 1-5.9-4.3-4.1 5.9-.9L10 1.5z"/></svg>
      <div class="h-2 flex-1 overflow-hidden rounded-pill bg-surface-raised">
        <div class="h-full rounded-pill bg-warning" style="width: {{ row.pct }}%"></div>
      </div>
      <span class="w-8 text-right tabular-nums">{{ row.pct }}%</span>
    </div>
  </div>
</section>
