<div class="coupon-input">
  <div class="coupon-input__row flex items-center gap-2">
    <input type="text" class="coupon-input__field flex-1 rounded-control border border-border bg-surface px-3 py-2 text-sm text-on-surface outline-none placeholder:text-on-surface-muted focus:border-ring" placeholder="{{ placeholder }}" aria-label="{{ placeholder }}">
    <button type="button" class="coupon-input__apply shrink-0 rounded-button border border-border px-4 py-2 text-sm font-heading text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised">{{ apply_label }}</button>
  </div>
  <p class="coupon-input__message mt-1.5 text-xs {{ status@class }}" role="status">{{ message }}</p>
</div>
