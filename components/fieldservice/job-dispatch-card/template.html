<article class="job-dispatch-card flex flex-col gap-3 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <p class="font-mono text-xs uppercase tracking-wide text-on-surface-muted">{{ job_number }}</p>
      <h3 data-if="service_type" class="font-heading text-on-surface">{{ service_type }}</h3>
    </div>
    <span class="job-dispatch-card__priority inline-flex shrink-0 items-center rounded-pill px-2 py-0.5 text-xs font-medium uppercase tracking-wide {{ priority@class }}">{{ priority }}</span>
  </div>

  <div data-if="customer" class="flex items-start gap-2 text-sm text-on-surface">
    <svg class="mt-0.5 size-4 shrink-0 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M10 10a3 3 0 100-6 3 3 0 000 6z"/><path d="M4 16a6 6 0 0112 0"/></svg>
    <span class="min-w-0">{{ customer }}</span>
  </div>

  <div data-if="address" class="flex items-start gap-2 text-sm text-on-surface-muted">
    <svg class="mt-0.5 size-4 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M10 18s6-5 6-10a6 6 0 10-12 0c0 5 6 10 6 10z"/><circle cx="10" cy="8" r="2"/></svg>
    <span class="min-w-0">{{ address }}</span>
  </div>

  <div data-if="window" class="flex items-center gap-2 text-sm text-on-surface-muted">
    <svg class="size-4 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="10" cy="10" r="7"/><path d="M10 6v4l3 2"/></svg>
    <span>{{ window }}</span>
  </div>

  <div class="mt-1 flex items-center justify-between gap-3 border-t border-border pt-3">
    <div data-if="technician" class="flex min-w-0 items-center gap-2">
      <span data-if="initials" class="job-dispatch-card__avatar flex size-8 shrink-0 items-center justify-center rounded-pill bg-primary/10 font-mono text-xs font-semibold text-primary" aria-hidden="true">{{ initials }}</span>
      <span class="min-w-0 truncate text-sm font-medium text-on-surface">{{ technician }}</span>
    </div>
    <span class="job-dispatch-card__status inline-flex shrink-0 items-center rounded-pill px-2 py-0.5 text-xs font-medium uppercase tracking-wide {{ status@class }}">{{ status }}</span>
  </div>
</article>
