name: dispatch-map
props:
  title:
    type: string
    default: "Dispatch board"
    title: Title
    description: Heading shown above the map facade.
  label:
    type: string
    default: "Technician dispatch map"
    title: Accessible label
    description: Accessible name for the map region.
  technicians:
    type: array
    items: object
    required: true
    title: Technicians
    description: >
      The technician pins to place on the map facade. Each item:
      { name, initials, status, x_pct, y_pct }. status is one of "available", "en-route", "on-job"
      or "offline" and colours the pin. x_pct and y_pct are precomputed 0-100 positions (percent
      from the left and top of the facade); the map is schematic, not geographic.
    example:
      - { name: "Dana P.", initials: "DP", status: "available", x_pct: 28, y_pct: 40 }
  jobs:
    type: array
    items: object
    title: Jobs
    description: >
      Optional job markers to place on the facade. Each item: { label, x_pct, y_pct } with
      precomputed 0-100 positions, rendered as small star markers.
    example:
      - { label: "Work order 4471", x_pct: 62, y_pct: 55 }
