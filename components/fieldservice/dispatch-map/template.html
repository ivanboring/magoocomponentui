<section class="dispatch-map rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="{{ label }}">
  <div class="flex items-center justify-between gap-3">
    <h3 data-if="title" class="font-heading text-on-surface">{{ title }}</h3>
    <span class="shrink-0 rounded-pill bg-surface-raised px-2.5 py-1 text-xs font-medium text-on-surface-muted">Live dispatch</span>
  </div>
  <div class="dispatch-map__canvas relative mt-3 aspect-video overflow-hidden rounded-control border border-border bg-surface-raised" role="img" aria-label="Schematic map of technician locations">
    <div class="pointer-events-none absolute inset-0 opacity-40 [background-image:linear-gradient(to_right,var(--color-border)_1px,transparent_1px),linear-gradient(to_bottom,var(--color-border)_1px,transparent_1px)] [background-size:2rem_2rem]" aria-hidden="true"></div>
    <span data-for="job in jobs" class="dispatch-map__job absolute flex size-5 -translate-x-1/2 -translate-y-1/2 items-center justify-center rounded-control border border-border bg-surface text-on-surface-muted" style="left: {{ job.x_pct }}%; top: {{ job.y_pct }}%" title="{{ job.label }}">
      <svg class="size-3" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 2l2.4 4.9 5.4.8-3.9 3.8.9 5.4L10 14.3 5.2 16.7l.9-5.4L2.2 7.5l5.4-.8z"/></svg>
    </span>
    <span data-for="t in technicians" class="dispatch-map__pin absolute flex -translate-x-1/2 -translate-y-full flex-col items-center" style="left: {{ t.x_pct }}%; top: {{ t.y_pct }}%">
      <span class="flex size-8 items-center justify-center rounded-pill border-2 border-surface bg-on-surface-muted text-xs font-semibold text-primary-contrast shadow-card data-[status=available]:bg-success data-[status=en-route]:bg-info data-[status=on-job]:bg-warning data-[status=offline]:bg-on-surface-muted" data-status="{{ t.status }}">{{ t.initials }}</span>
      <span class="mt-1 whitespace-nowrap rounded-pill bg-surface px-1.5 py-0.5 text-[10px] font-medium text-on-surface shadow-card">{{ t.name }}</span>
    </span>
  </div>
  <ul class="dispatch-map__legend mt-3 flex flex-wrap gap-x-4 gap-y-1 text-xs text-on-surface-muted">
    <li class="flex items-center gap-1.5"><span class="size-2.5 rounded-pill bg-success" aria-hidden="true"></span>Available</li>
    <li class="flex items-center gap-1.5"><span class="size-2.5 rounded-pill bg-info" aria-hidden="true"></span>En route</li>
    <li class="flex items-center gap-1.5"><span class="size-2.5 rounded-pill bg-warning" aria-hidden="true"></span>On job</li>
    <li class="flex items-center gap-1.5"><span class="size-2.5 rounded-pill bg-on-surface-muted" aria-hidden="true"></span>Offline</li>
  </ul>
  <p class="mt-2 text-xs text-on-surface-muted">Schematic facade for layout only, not a geographic map.</p>
</section>
