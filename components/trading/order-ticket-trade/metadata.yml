    - trading/watchlist-row
    - trading/options-chain-row

categorization:
  category: Wealth & Trading
  subcategory: Trading
  atomic_type: molecule
  usage_type: [form, card]
  maturity: ai-generated
  wcag:
    level: AA
    notes: The side toggle buttons carry aria-pressed reflecting the active side, inputs have visible labels, and the place button is a real submit; side is conveyed by the button label as well as colour.
  keyboard_support: All controls are native form elements - the toggle buttons, select, inputs and submit button are focusable and operable with the keyboard.
  seo_score: 20
  text_direction: both
