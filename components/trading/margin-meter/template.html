<section class="margin-meter rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="Margin usage">
  <header class="margin-meter__header flex items-baseline justify-between gap-3">
    <h3 class="font-heading text-on-surface"><span class="text-lg tabular-nums">{{ used }}</span> <span class="text-sm font-normal text-on-surface-muted">of buying power used</span></h3>
    <span class="margin-meter__pct shrink-0 font-mono text-sm tabular-nums text-on-surface-muted">{{ used_pct }}%</span>
  </header>
  <div class="margin-meter__track mt-3 h-2.5 w-full overflow-hidden rounded-pill bg-surface-raised" role="meter" aria-valuenow="{{ used_pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Buying power used">
    <span class="margin-meter__fill block h-full rounded-pill {{ tone@class }}" style="width: {{ used_pct }}%"></span>
  </div>
  <dl class="margin-meter__details mt-4 flex flex-col gap-1.5 text-sm">
    <div class="flex items-center justify-between gap-3">
      <dt class="text-on-surface-muted">Available</dt>
      <dd class="font-mono tabular-nums text-on-surface">{{ available }}</dd>
    </div>
    <div data-if="maintenance" class="flex items-center justify-between gap-3">
      <dt class="text-on-surface-muted">Maintenance requirement</dt>
      <dd class="font-mono tabular-nums text-on-surface">{{ maintenance }}</dd>
    </div>
  </dl>
</section>
