<div class="portfolio-rebalance flex flex-col gap-5 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div data-for="h in holdings" class="portfolio-rebalance__row flex flex-col gap-1.5">
    <div class="flex items-center justify-between gap-2 text-sm">
      <span class="text-on-surface">{{ h.label }}</span>
      <span data-if="h.drift" class="shrink-0 rounded-pill bg-warning/10 px-1.5 py-0.5 text-xs font-medium text-warning">{{ h.drift }}</span>
    </div>
    <div class="relative h-2 w-full rounded-pill bg-surface-raised">
      <span class="absolute inset-y-0 left-0 rounded-pill {{ h.color_class }}" style="width: {{ h.actual_pct }}%"></span>
      <span class="absolute top-1/2 h-3.5 w-0.5 -translate-y-1/2 rounded-pill bg-on-surface" style="left: {{ h.target_pct }}%"></span>
    </div>
    <div class="flex items-center justify-between font-mono text-xs tabular-nums text-on-surface-muted">
      <span>Actual {{ h.actual_pct }}%</span>
      <span>Target {{ h.target_pct }}%</span>
    </div>
  </div>
  <span class="hidden bg-primary bg-secondary bg-accent bg-success bg-warning bg-danger bg-info" aria-hidden="true"></span>
</div>
