<article class="earnings-calendar-row flex flex-wrap items-center gap-x-6 gap-y-3 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="min-w-0 grow basis-40">
    <p class="font-mono text-base font-semibold text-on-surface">{{ symbol }}</p>
    <p data-if="name" class="truncate text-sm text-on-surface-muted">{{ name }}</p>
  </div>

  <div class="flex items-center gap-2">
    <span class="text-sm font-medium tabular-nums text-on-surface">{{ date }}</span>
    <span data-if="time" class="earnings-calendar-row__time group/t inline-flex items-center gap-1 rounded-pill bg-surface-raised px-2 py-0.5 text-xs text-on-surface-muted" data-time="{{ time }}">
      <svg class="size-3 group-data-[time=after-close]/t:hidden" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" aria-hidden="true"><circle cx="10" cy="10" r="3"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.6 4.6l1.4 1.4M14 14l1.4 1.4M15.4 4.6l-1.4 1.4M4.6 15.4l1.4-1.4"/></svg>
      <svg class="size-3 group-data-[time=before-open]/t:hidden" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M16.5 11.8A6.2 6.2 0 118.2 3.5 5.2 5.2 0 0016.5 11.8z"/></svg>
      <span class="group-data-[time=after-close]/t:hidden">Before open</span>
      <span class="group-data-[time=before-open]/t:hidden">After close</span>
    </span>
  </div>

  <div data-if="eps_estimate" class="earnings-calendar-row__eps text-right">
    <span class="block text-[11px] uppercase tracking-wide text-on-surface-muted">EPS est.</span>
    <span class="font-mono text-sm tabular-nums text-on-surface">{{ eps_estimate }}</span>
  </div>

  <span data-if="confirmed" class="earnings-calendar-row__tag inline-flex items-center gap-1 rounded-pill bg-success/10 px-2 py-0.5 text-xs font-medium text-success">
    <svg class="size-3" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10.5l4 4 8-9"/></svg>
    Confirmed
  </span>
  <span data-if="!confirmed" class="earnings-calendar-row__tag inline-flex items-center gap-1 rounded-pill bg-surface-raised px-2 py-0.5 text-xs font-medium text-on-surface-muted">Estimated</span>
</article>
