<div class="position-card flex flex-col gap-3 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-2">
    <div class="min-w-0">
      <p class="font-heading text-on-surface">{{ symbol }}</p>
      <p class="text-xs text-on-surface-muted">{{ shares }} shares</p>
    </div>
    <div class="text-right">
      <p class="text-xs text-on-surface-muted">Market value</p>
      <p class="font-mono text-on-surface tabular-nums">{{ market_value }}</p>
    </div>
  </div>
  <div class="position-card__pl flex items-baseline gap-2 data-[dir=up]:text-success data-[dir=down]:text-danger" data-dir="{{ pl_dir }}">
    <span class="font-heading text-xl tabular-nums">{{ pl }}</span>
    <span class="text-sm font-medium tabular-nums">{{ pl_pct }}</span>
  </div>
  <dl class="grid grid-cols-2 gap-x-4 gap-y-1 border-t border-border pt-3 text-sm">
    <div class="flex items-center justify-between">
      <dt class="text-on-surface-muted">Avg cost</dt>
      <dd class="font-mono text-on-surface tabular-nums">{{ avg_cost }}</dd>
    </div>
    <div class="flex items-center justify-between">
      <dt class="text-on-surface-muted">Current</dt>
      <dd class="font-mono text-on-surface tabular-nums">{{ current_price }}</dd>
    </div>
  </dl>
</div>
