name: sponsorship-card
props:
  brand:
    type: string
    required: true
    title: Brand
    description: The sponsoring brand or company name.
    example: "Northwind Coffee"
  logo:
    type: string
    format: uri-reference
    title: Brand logo
    description: Optional brand logo image; falls back to a building icon when omitted.
    example: "/stock/nike-3-logo-svgrepo-com.svg"
  campaign:
    type: string
    title: Campaign
    description: Short name of the campaign or deal.
    example: "Spring launch integration"
  amount:
    type: string
    title: Deal value
    description: Formatted deal value, including currency.
    example: "$4,500"
  status:
    type: enum
    values: ["proposed", "active", "completed"]
    default: proposed
    title: Status
    description: Deal stage, shown as a coloured pill.
  deliverables:
    type: string
    title: Deliverables count
    description: Number of deliverables, shown beside a checklist icon (pass the precomputed count).
    example: "3"
variants:
  status:
    proposed: "bg-info/10 text-info"
    active: "bg-success/10 text-success"
    completed: "bg-surface-raised text-on-surface-muted"
