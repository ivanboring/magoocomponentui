<section class="content-paywall overflow-hidden rounded-card border border-border bg-surface shadow-card">
  <div class="content-paywall__preview relative flex aspect-[16/7] items-center justify-center overflow-hidden bg-surface-raised">
    <img data-if="preview_image" class="absolute inset-0 size-full scale-105 object-cover blur-md" src="{{ preview_image }}" alt="" aria-hidden="true">
    <div data-if="preview_image" class="absolute inset-0 bg-black/40"></div>
    <span class="content-paywall__lock relative flex size-14 items-center justify-center rounded-pill bg-surface text-on-surface shadow-raised" aria-hidden="true">
      <svg class="size-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></svg>
    </span>
  </div>

  <div class="content-paywall__body flex flex-col gap-4 p-(--space-card)">
    <div class="flex flex-col items-center gap-1 text-center">
      <h3 data-if="title" class="content-paywall__title font-heading text-lg text-on-surface">{{ title }}</h3>
      <p data-if="tiers" class="text-sm text-on-surface-muted">Included with {{ tiers }}</p>
    </div>

    <ul data-if="benefits" class="content-paywall__benefits mx-auto flex max-w-sm flex-col gap-2">
      <li data-for="benefit in benefits" class="flex items-start gap-2 text-sm text-on-surface">
        <svg class="mt-0.5 size-4 shrink-0 text-success" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
        <span>{{ benefit }}</span>
      </li>
    </ul>

    <button type="button" class="content-paywall__unlock mx-auto w-full max-w-xs rounded-button bg-primary px-4 py-2.5 text-sm font-medium text-primary-contrast transition-colors duration-(--duration-token) hover:bg-primary/90">Unlock<span data-if="price"> for {{ price }}</span></button>
  </div>
</section>
