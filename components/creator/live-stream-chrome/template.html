<div class="live-stream-chrome relative aspect-video overflow-hidden rounded-card bg-surface-raised shadow-card">
  <div class="live-stream-chrome__frame absolute inset-0 flex items-center justify-center text-on-surface-muted" aria-hidden="true">
    <svg class="size-14 opacity-40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="6" width="13" height="12" rx="2"/><path d="M16 10l5-3v10l-5-3"/></svg>
  </div>

  <div class="pointer-events-none absolute inset-x-0 top-0 h-20 bg-gradient-to-b from-black/60 to-transparent"></div>
  <div class="pointer-events-none absolute inset-x-0 bottom-0 h-24 bg-gradient-to-t from-black/70 to-transparent"></div>

  <div class="live-stream-chrome__topleft absolute left-3 top-3 flex items-center gap-2">
    <span data-if="is_live" class="flex items-center gap-1.5 rounded-pill bg-danger px-2 py-1 text-xs font-semibold uppercase tracking-wide text-white">
      <span class="size-1.5 rounded-pill bg-white"></span>Live
    </span>
    <span data-if="viewers" class="flex items-center gap-1 rounded-pill bg-black/50 px-2 py-1 text-xs font-medium tabular-nums text-white">
      <svg class="size-3.5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M2 10s3-5 8-5 8 5 8 5-3 5-8 5-8-5-8-5z"/><circle cx="10" cy="10" r="2"/></svg>
      {{ viewers }}
    </span>
  </div>

  <span data-if="category" class="live-stream-chrome__category absolute right-3 top-3 rounded-pill bg-black/50 px-2.5 py-1 text-xs font-medium text-white">{{ category }}</span>

  <div class="live-stream-chrome__bottom absolute inset-x-0 bottom-0 flex items-center gap-3 p-3">
    <span class="live-stream-chrome__avatar flex size-9 shrink-0 items-center justify-center overflow-hidden rounded-pill bg-surface ring-2 ring-white/70">
      <img data-if="avatar" class="size-full object-cover" src="{{ avatar }}" alt="">
    </span>
    <div class="min-w-0 flex-1">
      <p data-if="title" class="truncate text-sm font-medium text-white">{{ title }}</p>
      <p data-if="streamer" class="truncate text-xs text-white/80">{{ streamer }}</p>
    </div>
    <div class="live-stream-chrome__controls flex shrink-0 items-center gap-1.5 text-white" aria-hidden="true">
      <span class="flex size-8 items-center justify-center rounded-pill bg-white/15">
        <svg class="size-4" viewBox="0 0 20 20" fill="currentColor"><path d="M10 17l-1.1-1c-3.7-3.4-6.1-5.5-6.1-8.2A3.3 3.3 0 016.1 4.5c1 0 2 .5 2.6 1.3l1.3 1.5 1.3-1.5A3.4 3.4 0 0113.9 4.5a3.3 3.3 0 013.3 3.3c0 2.7-2.4 4.8-6.1 8.2L10 17z"/></svg>
      </span>
      <span class="flex size-8 items-center justify-center rounded-pill bg-white/15">
        <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 7a2 2 0 100-4 2 2 0 000 4zM5 12a2 2 0 100-4 2 2 0 000 4zM15 17a2 2 0 100-4 2 2 0 000 4z"/><path d="M6.7 11l6.6 3.5M13.3 5.5L6.7 9"/></svg>
      </span>
      <span class="flex size-8 items-center justify-center rounded-pill bg-white/15">
        <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 8V4h4M16 8V4h-4M4 12v4h4M16 12v4h-4"/></svg>
      </span>
    </div>
  </div>
</div>
