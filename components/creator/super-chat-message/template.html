<div class="super-chat-message flex items-start gap-3 rounded-card border border-border p-(--space-card) {{ tier_color_class }}">
  <img data-if="avatar" class="size-9 shrink-0 rounded-full object-cover" src="{{ avatar }}" alt="">
  <span data-if="!avatar" class="flex size-9 shrink-0 items-center justify-center rounded-full bg-surface-raised text-sm font-semibold text-on-surface" aria-hidden="true">{{ initials }}</span>
  <div class="min-w-0 flex-1">
    <div class="flex flex-wrap items-center gap-2">
      <span class="super-chat-message__name font-medium text-on-surface">{{ name }}</span>
      <span class="super-chat-message__amount inline-flex items-center gap-1 rounded-pill border border-warning/40 bg-surface px-2 py-0.5 text-xs font-semibold text-on-surface tabular-nums">
        <svg class="size-3.5 text-warning" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.5l2.6 5.3 5.9.9-4.3 4.1 1 5.8L10 15l-5.2 2.7 1-5.8L1.5 7.7l5.9-.9z"/></svg>
        {{ amount }}
      </span>
    </div>
    <p class="super-chat-message__body mt-1 break-words text-sm text-on-surface">{{ message }}</p>
  </div>
  <span class="hidden bg-warning/10 bg-info/10 bg-primary/10 bg-accent/10 bg-success/10 bg-danger/10 bg-secondary/10" aria-hidden="true"></span>
</div>
