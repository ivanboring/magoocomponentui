<section class="content-scheduler rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="{{ title }}">
  <h3 class="content-scheduler__title mb-3 font-heading text-on-surface">{{ title }}</h3>
  <div class="content-scheduler__grid grid grid-cols-2 gap-2 sm:grid-cols-3 lg:grid-cols-7">
    <div data-for="day in days" class="content-scheduler__day flex min-w-0 flex-col rounded-control border border-border bg-surface-raised p-2">
      <div class="mb-2 flex items-baseline justify-between gap-1">
        <span class="text-xs font-semibold uppercase tracking-wide text-on-surface">{{ day.label }}</span>
        <span data-if="day.date" class="text-xs text-on-surface-muted">{{ day.date }}</span>
      </div>
      <ul class="flex flex-1 flex-col gap-1.5">
        <li data-for="post in day.posts" data-status="{{ post.status }}" class="content-scheduler__post rounded-control border-l-2 bg-surface px-2 py-1.5 text-xs data-[status=scheduled]:border-info data-[status=published]:border-success data-[status=draft]:border-border">
          <div class="flex items-center justify-between gap-1">
            <span data-if="post.time" class="font-medium tabular-nums text-on-surface-muted">{{ post.time }}</span>
            <span data-status="{{ post.status }}" class="rounded-pill px-1.5 py-0.5 text-[10px] font-medium capitalize data-[status=scheduled]:bg-info/10 data-[status=scheduled]:text-info data-[status=published]:bg-success/10 data-[status=published]:text-success data-[status=draft]:bg-surface-raised data-[status=draft]:text-on-surface-muted">{{ post.status }}</span>
          </div>
          <p class="mt-1 truncate font-medium text-on-surface">{{ post.title }}</p>
          <p data-if="post.platform" class="truncate text-on-surface-muted">{{ post.platform }}</p>
        </li>
      </ul>
    </div>
  </div>
</section>
