<section class="tip-jar flex flex-col gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="tip-jar__head flex items-center gap-2">
    <span class="flex size-8 shrink-0 items-center justify-center rounded-pill bg-primary/10 text-primary" aria-hidden="true">
      <svg class="size-4" viewBox="0 0 20 20" fill="currentColor"><path d="M10 17l-1.1-1c-3.7-3.4-6.1-5.5-6.1-8.2A3.3 3.3 0 016.1 4.5c1 0 2 .5 2.6 1.3l1.3 1.5 1.3-1.5A3.4 3.4 0 0113.9 4.5a3.3 3.3 0 013.3 3.3c0 2.7-2.4 4.8-6.1 8.2L10 17z"/></svg>
    </span>
    <h3 class="tip-jar__title font-heading text-lg text-on-surface">
      <span data-if="creator">Support {{ creator }}</span>
      <span data-if="!creator">Send a tip</span>
    </h3>
  </div>

  <div class="tip-jar__amounts grid grid-cols-3 gap-2">
    <button data-for="amount in amounts" type="button" class="tip-jar__amount rounded-button border border-border px-3 py-2 text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:border-primary data-[selected=true]:border-primary data-[selected=true]:bg-primary data-[selected=true]:text-primary-contrast" data-selected="{{ amount.selected }}" data-value="{{ amount.value }}">{{ amount.value }}</button>
  </div>

  <label class="tip-jar__custom flex items-center gap-2 rounded-control border border-border px-3 py-2 focus-within:border-primary">
    <span class="text-sm text-on-surface-muted">Custom</span>
    <input type="text" inputmode="decimal" class="tip-jar__input min-w-0 flex-1 bg-transparent text-sm text-on-surface outline-none placeholder:text-on-surface-muted" placeholder="Enter an amount">
  </label>

  <div data-if="goal" class="tip-jar__goal">
    <div class="flex items-center justify-between text-sm">
      <span class="text-on-surface-muted"><span class="font-medium text-on-surface tabular-nums">{{ raised }}</span> raised</span>
      <span class="text-on-surface-muted tabular-nums">Goal {{ goal }}</span>
    </div>
    <div class="mt-1.5 h-2 w-full overflow-hidden rounded-pill bg-surface-raised">
      <div class="tip-jar__bar h-full rounded-pill bg-primary transition-[width] duration-(--duration-token)" style="width: {{ pct }}%"></div>
    </div>
  </div>

  <button type="button" class="tip-jar__send w-full rounded-button bg-primary px-4 py-2.5 text-sm font-medium text-primary-contrast transition-colors duration-(--duration-token) hover:bg-primary/90">Send tip</button>
</section>
