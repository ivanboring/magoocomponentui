<article class="subscriber-tier-card relative flex h-full flex-col rounded-card border border-border bg-surface p-(--space-card) shadow-card transition-colors duration-(--duration-token) data-[popular=true]:border-primary data-[popular=true]:shadow-raised" data-popular="{{ popular }}">
  <span data-if="popular" class="subscriber-tier-card__badge absolute -top-3 left-1/2 -translate-x-1/2 rounded-pill bg-primary px-3 py-1 text-xs font-medium text-primary-contrast">Most popular</span>
  <div class="subscriber-tier-card__head flex items-center gap-2">
    <span data-if="color_class" class="size-3 shrink-0 rounded-pill {{ color_class }}" aria-hidden="true"></span>
    <h3 class="subscriber-tier-card__name font-heading text-lg text-on-surface">{{ name }}</h3>
  </div>
  <p class="subscriber-tier-card__price mt-3 font-heading text-3xl text-on-surface tabular-nums">{{ price }}<span data-if="period" class="ml-1 text-sm font-normal text-on-surface-muted">/{{ period }}</span></p>
  <p data-if="subscribers" class="subscriber-tier-card__count mt-1 text-sm text-on-surface-muted tabular-nums">{{ subscribers }} subscribers</p>
  <ul class="subscriber-tier-card__benefits mt-4 flex flex-1 flex-col gap-2.5">
    <li data-for="benefit in benefits" class="flex items-start gap-2 text-sm text-on-surface">
      <svg class="mt-0.5 size-4 shrink-0 text-success" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
      <span>{{ benefit }}</span>
    </li>
  </ul>
  <button type="button" class="subscriber-tier-card__subscribe mt-5 w-full rounded-button bg-primary px-4 py-2.5 text-sm font-medium text-primary-contrast transition-colors duration-(--duration-token) hover:bg-primary/90">Subscribe</button>
  <span class="hidden bg-primary bg-secondary bg-accent bg-success bg-warning bg-danger bg-info" aria-hidden="true"></span>
</article>
