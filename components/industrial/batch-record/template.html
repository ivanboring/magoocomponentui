<div class="batch-record rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <header class="batch-record__header flex flex-wrap items-start justify-between gap-2 border-b border-border pb-3">
    <div class="min-w-0">
      <p class="batch-record__number font-mono text-sm text-on-surface-muted">{{ batch_number }}</p>
      <p data-if="product" class="font-heading text-on-surface">{{ product }}</p>
    </div>
    <span data-if="status" class="batch-record__status shrink-0 rounded-pill bg-surface-raised px-2.5 py-0.5 text-xs font-medium capitalize text-on-surface-muted">{{ status }}</span>
  </header>
  <dl class="batch-record__meta mt-3 grid grid-cols-2 gap-x-4 gap-y-2 text-sm sm:grid-cols-3">
    <div data-if="quantity">
      <dt class="text-xs uppercase tracking-wide text-on-surface-muted">Quantity</dt>
      <dd class="text-on-surface tabular-nums">{{ quantity }}</dd>
    </div>
    <div data-if="start">
      <dt class="text-xs uppercase tracking-wide text-on-surface-muted">Start</dt>
      <dd class="text-on-surface tabular-nums">{{ start }}</dd>
    </div>
    <div data-if="end">
      <dt class="text-xs uppercase tracking-wide text-on-surface-muted">End</dt>
      <dd class="text-on-surface tabular-nums">{{ end }}</dd>
    </div>
  </dl>
  <ul data-if="params" class="batch-record__params mt-3 flex flex-col divide-y divide-border border-t border-border">
    <li data-for="param in params" data-in-spec="{{ param.in_spec }}" class="batch-record__param group flex items-center justify-between gap-3 py-2">
      <span class="text-sm text-on-surface-muted">{{ param.label }}</span>
      <span class="flex items-center gap-1.5 text-sm font-medium tabular-nums text-on-surface group-data-[in-spec=false]:text-danger">
        <span>{{ param.value }}</span>
        <svg class="hidden size-3.5 shrink-0 text-danger group-data-[in-spec=false]:block" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1L1 18h18L10 1zm1 13H9v-2h2v2zm0-5H9V6h2v3z"/></svg>
      </span>
    </li>
  </ul>
</div>
