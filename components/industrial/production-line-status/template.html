<div class="production-line-status rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <h3 data-if="line_name" class="production-line-status__name mb-4 font-heading text-on-surface">{{ line_name }}</h3>
  <ol class="production-line-status__track flex items-start overflow-x-auto py-1 [scrollbar-width:none] [&::-webkit-scrollbar]:hidden">
    <li data-for="station in stations" class="production-line-status__station flex min-w-16 flex-1 flex-col items-center gap-2 text-center">
      <div class="flex w-full items-center">
        <span class="production-line-status__rail h-0.5 flex-1 rounded-pill bg-border [.production-line-status__station:first-child_&]:invisible" aria-hidden="true"></span>
        <span data-status="{{ station.status }}" class="production-line-status__node flex size-8 shrink-0 items-center justify-center rounded-pill border-2 border-surface shadow-card data-[status=ok]:bg-success data-[status=warning]:bg-warning data-[status=down]:bg-danger data-[status=idle]:bg-surface-raised" aria-hidden="true"></span>
        <span class="production-line-status__rail h-0.5 flex-1 rounded-pill bg-border [.production-line-status__station:last-child_&]:invisible" aria-hidden="true"></span>
      </div>
      <span class="production-line-status__label max-w-full truncate text-xs font-medium text-on-surface">{{ station.name }}</span>
      <span data-if="station.throughput" class="production-line-status__throughput tabular-nums text-xs text-on-surface-muted">{{ station.throughput }}</span>
    </li>
  </ol>
</div>
