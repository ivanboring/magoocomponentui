<section class="shift-handover rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <header class="shift-handover__header mb-3 flex flex-wrap items-center justify-between gap-2 border-b border-border pb-3">
    <div class="flex items-center gap-2 font-heading text-on-surface">
      <span data-if="from_shift">{{ from_shift }}</span>
      <svg data-if="to_shift" class="size-4 shrink-0 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 10h11M11 6l4 4-4 4"/></svg>
      <span data-if="to_shift">{{ to_shift }}</span>
    </div>
    <span data-if="date" class="text-sm text-on-surface-muted tabular-nums">{{ date }}</span>
  </header>
  <ul class="shift-handover__notes flex flex-col gap-2">
    <li data-for="note in notes" data-flag="{{ note.flag }}" class="shift-handover__note rounded-control border border-transparent bg-surface-raised px-3 py-2 data-[flag=true]:border-warning/30 data-[flag=true]:bg-warning/10">
      <div class="flex items-center gap-2">
        <span class="text-xs font-medium uppercase tracking-wide text-on-surface-muted">{{ note.category }}</span>
        <svg data-if="note.flag" class="size-3.5 shrink-0 text-warning" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M4 2h11l-2 4 2 4H6v8H4z"/></svg>
      </div>
      <p class="mt-0.5 text-sm text-on-surface">{{ note.text }}</p>
    </li>
  </ul>
  <footer data-if="signed_off" class="shift-handover__footer mt-3 flex items-center gap-2 border-t border-border pt-3 text-sm font-medium text-success">
    <svg class="size-4 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
    <span>Handover signed off</span>
  </footer>
</section>
