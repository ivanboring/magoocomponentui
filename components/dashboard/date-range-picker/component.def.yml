name: date-range-picker
props:
  current:
    type: string
    required: true
    title: Current range label
    example: "Last 30 days"
  presets:
    type: array
    items: object
    required: true
    title: Presets
    description: "Each preset: { label, value, active }."
    example:
      - { label: "Last 7 days", value: "7d", active: false }
      - { label: "Last 30 days", value: "30d", active: true }
