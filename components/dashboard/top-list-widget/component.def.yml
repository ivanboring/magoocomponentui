name: top-list-widget
props:
  title:
    type: string
    required: true
    title: Title
    example: "Top pages"
  rows:
    type: array
    items: object
    required: true
    title: Rows
    description: "Each row: { label, value, pct } where pct is a subtle bar width 0-100."
    example:
      - { label: "/pricing", value: "4,120", pct: 100 }
      - { label: "/docs", value: "3,540", pct: 86 }
