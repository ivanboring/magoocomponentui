<section class="top-list-widget rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <h3 class="top-list-widget__title font-heading text-on-surface">{{ title }}</h3>
  <ol class="top-list-widget__rows mt-3 flex flex-col gap-2">
    <li data-for="row in rows" class="top-list-widget__row relative flex items-center justify-between gap-3 overflow-hidden rounded-control px-2 py-1.5 text-sm">
      <span class="top-list-widget__bar absolute inset-y-0 left-0 bg-primary/10" style="width: {{ row.pct }}%" aria-hidden="true"></span>
      <span class="relative min-w-0 flex-1 truncate text-on-surface">{{ row.label }}</span>
      <span class="relative shrink-0 font-medium text-on-surface tabular-nums">{{ row.value }}</span>
    </li>
  </ol>
</section>
