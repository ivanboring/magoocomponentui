<div class="widget-empty-state flex flex-col items-center justify-center gap-3 rounded-card border border-dashed border-border bg-surface p-(--space-section) text-center">
  <span class="widget-empty-state__icon flex size-12 items-center justify-center rounded-full bg-surface-raised text-on-surface-muted" aria-hidden="true"><slot name="icon"></slot></span>
  <div>
    <p class="widget-empty-state__title font-heading text-on-surface">{{ title }}</p>
    <p data-if="description" class="widget-empty-state__description mx-auto mt-1 max-w-xs text-sm text-on-surface-muted">{{ description }}</p>
  </div>
  <a data-if="cta_label" class="widget-empty-state__cta mt-1 inline-flex items-center rounded-button bg-primary px-4 py-2 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90" href="{{ cta_href }}">{{ cta_label }}</a>
</div>
