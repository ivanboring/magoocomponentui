<section class="donut-chart-card flex flex-col gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card sm:flex-row sm:items-center">
  <div class="donut-chart-card__chart relative mx-auto size-40 shrink-0">
    <svg class="size-full -rotate-90" viewBox="0 0 100 100" fill="none">
      <circle cx="50" cy="50" r="45" class="text-surface-raised" stroke="currentColor" stroke-width="10"></circle>
      <circle data-for="segment in segments" cx="50" cy="50" r="45" class="data-[tone=primary]:text-primary data-[tone=accent]:text-accent data-[tone=success]:text-success data-[tone=warning]:text-warning" data-tone="{{ segment.tone }}" stroke="currentColor" stroke-width="10" stroke-dasharray="{{ segment.dash }}" stroke-dashoffset="{{ segment.offset }}" stroke-linecap="butt"></circle>
    </svg>
    <div class="donut-chart-card__center absolute inset-0 flex flex-col items-center justify-center text-center">
      <span data-if="center_value" class="font-heading text-2xl text-on-surface tabular-nums">{{ center_value }}</span>
      <span data-if="center_label" class="text-xs text-on-surface-muted">{{ center_label }}</span>
    </div>
  </div>
  <div class="donut-chart-card__body min-w-0 flex-1">
    <h3 class="donut-chart-card__title font-heading text-on-surface">{{ title }}</h3>
    <ul class="donut-chart-card__legend mt-3 flex flex-col gap-2 text-sm">
      <li data-for="segment in segments" class="flex items-center gap-2">
        <span class="size-2.5 rounded-full bg-current data-[tone=primary]:text-primary data-[tone=accent]:text-accent data-[tone=success]:text-success data-[tone=warning]:text-warning" data-tone="{{ segment.tone }}" aria-hidden="true"></span>
        <span class="flex-1 text-on-surface">{{ segment.label }}</span>
        <span class="font-medium text-on-surface tabular-nums">{{ segment.value }}</span>
      </li>
    </ul>
  </div>
</section>
