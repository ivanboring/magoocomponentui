<section class="chart-card-bar flex flex-col rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <h3 class="chart-card-bar__title font-heading text-on-surface">{{ title }}</h3>
  <div class="chart-card-bar__chart mt-4 flex h-40 items-end gap-3">
    <div data-for="bar in bars" class="chart-card-bar__col group flex h-full flex-1 flex-col items-center justify-end gap-2">
      <span class="chart-card-bar__value text-xs font-medium text-on-surface-muted opacity-0 transition-opacity duration-(--duration-token) group-hover:opacity-100 tabular-nums">{{ bar.value }}</span>
      <div class="chart-card-bar__bar w-full rounded-t-control bg-primary transition-colors duration-(--duration-token) group-hover:bg-primary/80" style="height: {{ bar.height }}%"></div>
      <span class="chart-card-bar__label text-[11px] text-on-surface-muted">{{ bar.label }}</span>
    </div>
  </div>
</section>
