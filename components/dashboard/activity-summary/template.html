<section class="activity-summary rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <h3 class="activity-summary__title font-heading text-on-surface">{{ title }}</h3>
  <ol class="activity-summary__items mt-3 flex flex-col gap-3">
    <li data-for="item in items" class="activity-summary__item flex items-start gap-3 text-sm">
      <span class="activity-summary__dot mt-1.5 size-2 shrink-0 rounded-full data-[tone=primary]:bg-primary data-[tone=success]:bg-success data-[tone=warning]:bg-warning data-[tone=danger]:bg-danger" data-tone="{{ item.tone }}" aria-hidden="true"></span>
      <span class="min-w-0 flex-1 text-on-surface"><span class="font-medium">{{ item.actor }}</span> {{ item.action }} <span class="font-medium">{{ item.target }}</span></span>
      <span class="activity-summary__time shrink-0 text-xs text-on-surface-muted">{{ item.time }}</span>
    </li>
  </ol>
</section>
