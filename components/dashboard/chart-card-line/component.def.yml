name: chart-card-line
props:
  title:
    type: string
    required: true
    title: Title
    example: "Revenue"
  value:
    type: string
    title: Headline value
    example: "$84.2k"
  periods:
    type: array
    items: object
    required: true
    title: Periods
    description: "Each period: { label, active }."
    example:
      - { label: "7D", active: false }
      - { label: "30D", active: true }
  points:
    type: string
    required: true
    title: Line points
    description: Precomputed SVG polyline points on a 300×120 viewBox.
    example: "0,90 50,70 100,80 150,45 200,55 250,25 300,30"
  x_labels:
    type: array
    items: object
    title: X-axis labels
    description: "Each: { label }."
