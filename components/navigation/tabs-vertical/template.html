<div class="tabs-vertical flex gap-6">
  <div class="tabs-vertical__list flex shrink-0 flex-col gap-1 border-r border-border pr-2" role="tablist" aria-orientation="vertical" aria-label="{{ label }}">
    <button data-for="tab in tabs" type="button" class="tabs-vertical__tab -mr-px rounded-l-control border-r-2 border-transparent px-4 py-2 text-left text-sm font-medium text-on-surface-muted transition-colors duration-(--duration-token) hover:text-on-surface data-[active=true]:border-primary data-[active=true]:text-on-surface" role="tab" id="tab-{{ tab.id }}" aria-controls="panel-{{ tab.id }}" aria-selected="{{ tab.active }}" data-active="{{ tab.active }}" data-tab="{{ tab.id }}">{{ tab.label }}</button>
  </div>
  <div class="tabs-vertical__panels min-w-0 flex-1">
    <slot name="panels"></slot>
  </div>
</div>
