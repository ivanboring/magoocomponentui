<div class="language-switcher relative inline-block">
  <button type="button" class="language-switcher__toggle flex items-center gap-2 rounded-control border border-border bg-surface px-3 py-2 text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" aria-haspopup="true" aria-expanded="false">
    <svg class="size-4 shrink-0 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="10" cy="10" r="7.5"/><path d="M2.5 10h15M10 2.5c2 2.2 3 4.8 3 7.5s-1 5.3-3 7.5c-2-2.2-3-4.8-3-7.5s1-5.3 3-7.5z"/></svg>
    <span class="language-switcher__current">{{ current_label }}</span>
    <svg class="size-4 shrink-0 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M6 8l4 4 4-4"/></svg>
  </button>
  <ul class="language-switcher__menu absolute right-0 z-20 mt-1 hidden min-w-40 flex-col rounded-card border border-border bg-surface p-1 shadow-raised" role="menu">
    <li data-for="lang in languages" role="none">
      <a class="language-switcher__item block rounded-control px-3 py-2 text-sm text-on-surface-muted transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface data-[active=true]:font-medium data-[active=true]:text-on-surface" href="{{ lang.href }}" role="menuitem" data-active="{{ lang.active }}" aria-current="{{ lang.active }}">{{ lang.label }}</a>
    </li>
  </ul>
</div>
