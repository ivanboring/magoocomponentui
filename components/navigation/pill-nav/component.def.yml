name: pill-nav
props:
  label:
    type: string
    default: "Views"
    title: Accessible label
  items:
    type: array
    items: object
    required: true
    title: Items
    description: "Each item: { label, href, active }. One item should be active."
    example:
      - { label: "All", href: "?filter=all", active: true }
      - { label: "Active", href: "?filter=active", active: false }
      - { label: "Archived", href: "?filter=archived", active: false }
