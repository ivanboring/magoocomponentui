<article class="card-wallet flex aspect-[8/5] max-w-sm flex-col justify-between rounded-card p-5 shadow-raised {{ tone@class }}">
  <div class="card-wallet__top flex items-start justify-between">
    <span class="card-wallet__chip h-7 w-9 rounded bg-white/30" aria-hidden="true"></span>
    <span class="card-wallet__brand font-heading text-lg italic tracking-wider">{{ brand }}</span>
  </div>
  <div class="card-wallet__mid">
    <p data-if="label" class="card-wallet__label text-xs opacity-80">{{ label }}</p>
    <p class="card-wallet__number mt-1 font-mono text-lg tracking-widest tabular-nums">{{ number }}</p>
  </div>
  <div class="card-wallet__bottom flex items-end justify-between text-sm">
    <div>
      <p class="text-[10px] uppercase opacity-70">Card holder</p>
      <p class="card-wallet__holder font-medium">{{ holder }}</p>
    </div>
    <div class="text-right">
      <p class="text-[10px] uppercase opacity-70">Expires</p>
      <p class="card-wallet__expiry font-medium tabular-nums">{{ expiry }}</p>
    </div>
  </div>
</article>
