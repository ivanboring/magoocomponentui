<form class="transfer-form rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <h3 class="transfer-form__title font-heading text-lg text-on-surface">Transfer money</h3>
  <label class="transfer-form__field mt-4 block">
    <span class="text-sm font-medium text-on-surface">From</span>
    <select class="transfer-form__from mt-1 w-full rounded-control border border-border bg-surface px-3 py-2 text-sm text-on-surface">
      <option data-for="option in from_options" selected="{{ option.selected }}">{{ option.label }}</option>
    </select>
  </label>
  <div class="transfer-form__swap my-2 flex justify-center">
    <span class="flex size-8 items-center justify-center rounded-full border border-border bg-surface-raised text-on-surface-muted" aria-hidden="true">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M7 4v12m0 0l-3-3m3 3l3-3M13 16V4m0 0l3 3m-3-3l-3 3"/></svg>
    </span>
  </div>
  <label class="transfer-form__field block">
    <span class="text-sm font-medium text-on-surface">To</span>
    <select class="transfer-form__to mt-1 w-full rounded-control border border-border bg-surface px-3 py-2 text-sm text-on-surface">
      <option data-for="option in to_options" selected="{{ option.selected }}">{{ option.label }}</option>
    </select>
  </label>
  <label class="transfer-form__field mt-4 block">
    <span class="text-sm font-medium text-on-surface">Amount</span>
    <div class="mt-1 flex items-center rounded-control border border-border bg-surface px-3 focus-within:border-ring">
      <span class="text-on-surface-muted">$</span>
      <input type="text" inputmode="decimal" class="transfer-form__amount w-full bg-transparent py-2 pl-1 font-heading text-lg text-on-surface outline-none tabular-nums" value="{{ amount }}">
    </div>
  </label>
  <button type="submit" class="transfer-form__cta mt-5 w-full rounded-button bg-primary py-2.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">{{ cta_label }}</button>
</form>
