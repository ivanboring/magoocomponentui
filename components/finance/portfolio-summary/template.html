<section class="portfolio-summary rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="Portfolio summary">
  <p class="portfolio-summary__label text-sm text-on-surface-muted">Total portfolio value</p>
  <p class="portfolio-summary__total mt-1 font-heading text-3xl text-on-surface tabular-nums">{{ total }}</p>
  <p data-if="change" class="portfolio-summary__change mt-1 flex items-center gap-1 text-sm font-medium {{ direction@class }}" data-direction="{{ direction }}">
    <svg data-if="direction" class="size-3.5 data-[direction=down]:rotate-180 data-[direction=flat]:hidden" data-direction="{{ direction }}" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 15V5M6 9l4-4 4 4"/></svg>
    {{ change }}
  </p>
  <div class="portfolio-summary__allocation mt-5">
    <p class="mb-2 text-xs font-semibold uppercase tracking-wide text-on-surface-muted">Allocation</p>
    <div class="flex h-3 overflow-hidden rounded-pill">
      <span data-for="slice in allocation" class="h-full data-[tone=primary]:bg-primary data-[tone=accent]:bg-accent data-[tone=success]:bg-success data-[tone=warning]:bg-warning" data-tone="{{ slice.tone }}" style="width: {{ slice.pct }}%"></span>
    </div>
    <ul class="mt-3 flex flex-wrap gap-x-4 gap-y-1 text-sm">
      <li data-for="slice in allocation" class="flex items-center gap-1.5">
        <span class="size-2.5 rounded-full bg-current data-[tone=primary]:text-primary data-[tone=accent]:text-accent data-[tone=success]:text-success data-[tone=warning]:text-warning" data-tone="{{ slice.tone }}" aria-hidden="true"></span>
        <span class="text-on-surface">{{ slice.label }}</span>
        <span class="text-on-surface-muted tabular-nums">{{ slice.pct }}%</span>
      </li>
    </ul>
  </div>
</section>
