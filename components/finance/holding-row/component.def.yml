name: holding-row
props:
  ticker:
    type: string
    required: true
    title: Ticker
    example: "AAPL"
  name:
    type: string
    title: Name
    example: "Apple Inc."
  shares:
    type: string
    required: true
    title: Shares
    example: "24 shares"
  value:
    type: string
    required: true
    title: Value
    example: "$5,184"
  change:
    type: string
    required: true
    title: Change
    example: "+1.4%"
  direction:
    type: enum
    values: [up, down, flat]
    default: up
    title: Direction
variants:
  direction:
    up: "text-success"
    down: "text-danger"
    flat: "text-on-surface-muted"
