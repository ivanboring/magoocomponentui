<section class="cta-simple flex flex-col items-center gap-4 rounded-card bg-primary px-4 py-(--space-section) text-center text-primary-contrast sm:flex-row sm:justify-between sm:text-left">
  <div class="min-w-0">
    <h2 class="cta-simple__title font-heading text-2xl">{{ title }}</h2>
    <p data-if="subtitle" class="cta-simple__subtitle mt-1 text-primary-contrast/85">{{ subtitle }}</p>
  </div>
  <a class="cta-simple__cta shrink-0 rounded-button bg-surface px-6 py-3 text-sm font-heading text-on-surface transition-opacity duration-(--duration-token) hover:opacity-90" href="{{ cta_href }}">{{ cta_label }}</a>
</section>
