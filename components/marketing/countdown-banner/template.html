<section class="countdown-banner flex flex-col items-center justify-center gap-4 rounded-card bg-primary px-4 py-6 text-center text-primary-contrast sm:flex-row sm:justify-between sm:text-left" data-deadline="{{ deadline }}">
  <p class="countdown-banner__message font-heading text-lg">{{ message }}</p>
  <div class="countdown-banner__timer flex items-center gap-2" aria-live="polite">
    <span class="countdown-banner__unit flex flex-col items-center rounded-control bg-primary-contrast/15 px-3 py-1.5"><span class="countdown-banner__days font-heading text-xl tabular-nums">00</span><span class="text-[10px] uppercase opacity-80">days</span></span>
    <span class="countdown-banner__unit flex flex-col items-center rounded-control bg-primary-contrast/15 px-3 py-1.5"><span class="countdown-banner__hours font-heading text-xl tabular-nums">00</span><span class="text-[10px] uppercase opacity-80">hrs</span></span>
    <span class="countdown-banner__unit flex flex-col items-center rounded-control bg-primary-contrast/15 px-3 py-1.5"><span class="countdown-banner__minutes font-heading text-xl tabular-nums">00</span><span class="text-[10px] uppercase opacity-80">min</span></span>
    <span class="countdown-banner__unit flex flex-col items-center rounded-control bg-primary-contrast/15 px-3 py-1.5"><span class="countdown-banner__seconds font-heading text-xl tabular-nums">00</span><span class="text-[10px] uppercase opacity-80">sec</span></span>
  </div>
  <a data-if="cta_label" class="countdown-banner__cta shrink-0 rounded-button bg-surface px-5 py-2.5 text-sm font-heading text-on-surface transition-opacity duration-(--duration-token) hover:opacity-90" href="{{ cta_href }}">{{ cta_label }}</a>
</section>
