name: "Comparison Table"
short_description: A yes/no feature comparison matrix across options, with a highlighted column.
long_visual_description: >
  A table comparing options (columns) across features (rows) with a check or muted cross per
  cell; the highlighted column (your product) is tinted.

use_cases:
  - Us-vs-them feature comparison.
  - Product/plan capability matrix.
  - Competitor comparison.
  - Feature availability grid.
  - Buyer decision aid.

recommended_for:
  - A yes/no comparison across products or options.
avoid_for:
  - Plan pricing with values (use price-table).

markets:
  - Global

example_usage: >
  Highlight your own column; provide a boolean per column for each feature row.

props:
  columns: The option columns (name + highlight).
  rows: The feature rows with a boolean per column.

example_prompts:
  - "Add an us-vs-them comparison table."
  - "Add a feature comparison matrix with checks and crosses."

lifecycle: experimental
content_model: Option columns and feature rows forming a yes/no matrix.

theming:
  tokens_used:
    - --color-surface
    - --color-on-surface
    - --color-on-surface-muted
    - --color-primary
    - --color-success
    - --color-border
    - --radius-card
    - --shadow-card
    - --font-heading

editorial_guidance: >
  Keep feature labels neutral and factual; highlight only your own column.

categorization:
  category: Marketing
  subcategory: Conversion
  atomic_type: organism
  usage_type: [table]
  maturity: ai-generated
  wcag:
    level: AA
    notes: Real table with row/column scoped headers; each cell icon carries a Yes/No aria-label, so meaning isn't colour-only.
  keyboard_support: "none"
  seo_score: 55
  text_direction: both
