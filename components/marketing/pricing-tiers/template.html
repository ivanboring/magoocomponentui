<section class="pricing-tiers">
  <div class="pricing-tiers__head flex flex-col items-center gap-4">
    <h2 class="pricing-tiers__title font-heading text-3xl text-on-surface">{{ title }}</h2>
    <div class="pricing-tiers__toggle inline-flex items-center gap-0.5 rounded-pill border border-border bg-surface p-0.5" role="group" aria-label="Billing period">
      <button type="button" class="pricing-tiers__period rounded-pill px-4 py-1.5 text-sm font-medium text-on-surface transition-colors duration-(--duration-token) data-[active=true]:bg-primary data-[active=true]:text-primary-contrast" data-active="true" data-period="monthly" aria-pressed="true">Monthly</button>
      <button type="button" class="pricing-tiers__period rounded-pill px-4 py-1.5 text-sm font-medium text-on-surface-muted transition-colors duration-(--duration-token) data-[active=true]:bg-primary data-[active=true]:text-primary-contrast" data-active="false" data-period="annual" aria-pressed="false">Annual</button>
    </div>
  </div>
  <div class="pricing-tiers__plans mt-8 grid grid-cols-1 {{ gap@class }} md:grid-cols-3">
    <slot name="plans"></slot>
  </div>
</section>
