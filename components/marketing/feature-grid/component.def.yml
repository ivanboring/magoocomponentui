name: feature-grid
props:
  gap:
    type: enum
    values: [default, none, sm, md, lg, xl]
    default: default
    title: Gap
    description: >
      Space between grid cells, from a fixed set of choices. "default" keeps the component's
      designed spacing; none/sm/md/lg/xl are explicit fixed overrides.
  items:
    type: array
    items: object
    required: true
    title: Features
    description: "Each item: { badge, title, body }."
slots: {}
variants:
  gap:
    default: "gap-(--space-card)"
    none: "gap-0"
    sm: "gap-3"
    md: "gap-6"
    lg: "gap-10"
    xl: "gap-16"
