name: cta-grid-images
props:
  gap:
    type: enum
    values: [default, none, sm, md, lg, xl]
    default: default
    title: Gap
    description: >
      Space between grid cells, from a fixed set of choices. "default" keeps the component's
      designed spacing; none/sm/md/lg/xl are explicit fixed overrides.
  title:
    type: string
    required: true
    title: Title
    example: "Join thousands building faster"
  cta_label:
    type: string
    default: "Get started"
    title: CTA label
  cta_href:
    type: link
    title: CTA link
  images:
    type: array
    items: object
    required: true
    title: Backdrop images
    description: "Each item: { src }. Rendered as a blurred image-grid backdrop behind the CTA."
    example:
      - { src: "/stock/cover-workspace.jpg" }
      - { src: "/stock/food-plate.jpg" }
variants:
  gap:
    default: "gap-1"
    none: "gap-0"
    sm: "gap-3"
    md: "gap-6"
    lg: "gap-10"
    xl: "gap-16"
