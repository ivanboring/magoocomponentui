<section class="hero-centered mx-auto max-w-3xl px-4 py-(--space-section) text-center">
  <p data-if="eyebrow" class="hero-centered__eyebrow inline-flex rounded-pill bg-surface-raised px-3 py-1 text-xs font-semibold uppercase tracking-wide text-primary">{{ eyebrow }}</p>
  <h1 class="hero-centered__title mt-4 font-heading text-4xl leading-tight text-on-surface sm:text-5xl">{{ title }}</h1>
  <p data-if="subtitle" class="hero-centered__subtitle mx-auto mt-4 max-w-xl text-lg text-on-surface-muted">{{ subtitle }}</p>
  <div class="hero-centered__actions mt-8 flex flex-col items-center justify-center gap-3 sm:flex-row">
    <a class="hero-centered__primary inline-flex items-center justify-center rounded-button bg-primary px-6 py-3 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90" href="{{ primary_href }}">{{ primary_label }}</a>
    <a data-if="secondary_label" class="hero-centered__secondary inline-flex items-center justify-center rounded-button border border-border px-6 py-3 text-sm font-heading text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" href="{{ secondary_href }}">{{ secondary_label }}</a>
  </div>
</section>
