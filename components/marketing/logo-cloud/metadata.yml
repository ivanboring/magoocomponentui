name: "Logo Cloud"
short_description: A grid of partner/client wordmarks for social proof.
long_visual_description: >
  A titled grid of muted client wordmarks that brighten on hover, used as social proof
  ("Trusted by teams at").

use_cases:
  - Client/partner logos on a landing page.
  - Social proof band.
  - As-seen-in press logos.
  - Integrations or partners grid.
  - Trust bar.

recommended_for:
  - A social-proof band of client or partner names.
avoid_for:
  - Detailed testimonials (use testimonial-slider).

markets:
  - Global

example_usage: >
  List a handful of recognizable names; the skeleton renders wordmarks (swap for real logo
  images in production).

props:
  title: The band title.
  logos: The wordmark names.

example_prompts:
  - "Add a logo cloud of client names."
  - "Add a trusted-by social proof band."

lifecycle: experimental
content_model: A titled set of client/partner wordmarks.

theming:
  tokens_used:
    - --color-on-surface
    - --color-on-surface-muted
    - --font-heading
    - --space-section
    - --duration-token

editorial_guidance: >
  Use recognizable names; in production replace wordmarks with real, consistent-height logos.

categorization:
  category: Marketing
  subcategory: Social proof
  atomic_type: molecule
  usage_type: [grid, highlight]
  maturity: ai-generated
  wcag:
    level: AA
    notes: Wordmarks are real text so they're readable; when swapping for images, give each an alt of the company name.
  keyboard_support: "none"
  seo_score: 40
  text_direction: both
