name: shipment-tracker
props:
  tracking_number:
    type: string
    title: Tracking number
    description: The carrier tracking or reference number shown in the header.
    example: "1Z999AA10123456784"
  status:
    type: string
    title: Status
    description: Short overall status shown as a pill in the header (e.g. "In transit", "Delivered").
    example: "In transit"
  stops:
    type: array
    items: object
    required: true
    title: Stops
    description: >
      The scan/stop events in order, oldest first. Each stop:
      { label, location, time, done, current }. done is a boolean (the stop is completed —
      shows a success check); current is a boolean (the in-progress stop — shows a ring).
      A stop that is neither done nor current renders as an upcoming, muted step.
    example:
      - { label: "Order received", location: "Chicago, IL", time: "Jul 1, 9:12 AM", done: true, current: false }
      - { label: "In transit", location: "Indianapolis, IN", time: "Jul 3, 2:40 PM", done: false, current: true }
      - { label: "Out for delivery", location: "Columbus, OH", time: "Est. Jul 5", done: false, current: false }
