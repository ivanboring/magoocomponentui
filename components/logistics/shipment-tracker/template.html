<div class="shipment-tracker rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-start justify-between gap-3 border-b border-border pb-4">
    <div data-if="tracking_number" class="min-w-0">
      <p class="text-xs uppercase tracking-wide text-on-surface-muted">Tracking number</p>
      <p class="truncate font-mono text-sm text-on-surface">{{ tracking_number }}</p>
    </div>
    <span data-if="status" class="shrink-0 rounded-pill bg-primary/10 px-3 py-1 text-xs font-medium text-primary">{{ status }}</span>
  </div>
  <ol class="mt-4 flex flex-col">
    <li data-for="stop in stops" class="shipment-tracker__stop group relative flex gap-4 pb-6 last:pb-0" data-done="{{ stop.done }}" data-current="{{ stop.current }}">
      <span class="shipment-tracker__line absolute left-3.5 top-8 h-full w-0.5 -translate-x-1/2 bg-border group-last:hidden group-data-[done=true]:bg-success" aria-hidden="true"></span>
      <span class="shipment-tracker__dot relative z-10 mt-0.5 flex size-7 shrink-0 items-center justify-center rounded-full border-2 border-border bg-surface text-on-surface-muted group-data-[done=true]:border-success group-data-[done=true]:bg-success/10 group-data-[done=true]:text-success group-data-[current=true]:border-primary group-data-[current=true]:text-primary group-data-[current=true]:ring-2 group-data-[current=true]:ring-ring/40">
        <svg data-if="stop.done" class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
        <span data-if="!stop.done" class="size-2 rounded-full bg-current"></span>
      </span>
      <div class="min-w-0 flex-1">
        <p class="font-heading text-sm text-on-surface-muted group-data-[done=true]:text-on-surface group-data-[current=true]:text-on-surface">{{ stop.label }}</p>
        <p data-if="stop.location" class="text-sm text-on-surface-muted">{{ stop.location }}</p>
        <p data-if="stop.time" class="text-xs text-on-surface-muted">{{ stop.time }}</p>
      </div>
    </li>
  </ol>
</div>
