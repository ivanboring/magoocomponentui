<div class="dock-schedule overflow-x-auto rounded-card border border-border bg-surface shadow-card">
  <div class="dock-schedule__grid min-w-[560px] divide-y divide-border">
    <div data-for="dock in docks" class="dock-schedule__row flex items-stretch">
      <div class="flex w-32 shrink-0 items-center gap-2 border-r border-border p-3">
        <svg class="size-4 shrink-0 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 8l7-4 7 4v9H3z"/><path d="M7 17v-5h6v5"/></svg>
        <span class="min-w-0 truncate text-sm font-medium text-on-surface">{{ dock.label }}</span>
      </div>
      <div class="flex flex-1 gap-2 p-2">
        <div data-for="slot in dock.slots" class="dock-schedule__slot flex min-w-0 flex-1 flex-col items-center justify-center gap-0.5 rounded-control border border-border p-2 text-center data-[status=free]:bg-surface-raised data-[status=free]:text-on-surface-muted data-[status=booked]:bg-info/10 data-[status=booked]:text-info data-[status=loading]:bg-warning/10 data-[status=loading]:text-warning" data-status="{{ slot.status }}">
          <span class="text-xs font-medium tabular-nums">{{ slot.time }}</span>
          <span data-if="slot.carrier" class="w-full truncate text-xs">{{ slot.carrier }}</span>
        </div>
      </div>
    </div>
  </div>
  <span class="hidden bg-surface-raised text-on-surface-muted bg-info/10 text-info bg-warning/10 text-warning" aria-hidden="true"></span>
</div>
