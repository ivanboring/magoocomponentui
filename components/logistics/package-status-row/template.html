<div class="package-status-row flex items-center gap-3 rounded-card border border-border bg-surface p-4 shadow-card">
  <span class="package-status-row__icon flex size-10 shrink-0 items-center justify-center rounded-control bg-surface-raised text-on-surface-muted" aria-hidden="true">
    <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 6.5l7-3.5 7 3.5v7l-7 3.5-7-3.5v-7z"/><path d="M3 6.5l7 3.5 7-3.5"/><path d="M10 10v7"/></svg>
  </span>
  <div class="min-w-0 flex-1">
    <p class="truncate font-mono text-sm text-on-surface">{{ tracking_number }}</p>
    <p class="truncate text-xs text-on-surface-muted">
      <span data-if="carrier">{{ carrier }}</span>
      <span data-if="destination"> - {{ destination }}</span>
    </p>
  </div>
  <div class="flex shrink-0 flex-col items-end gap-1">
    <span class="rounded-pill px-3 py-1 text-xs font-medium {{ status@class }}">{{ status_label }}</span>
    <span data-if="eta" class="text-xs text-on-surface-muted">{{ eta }}</span>
  </div>
</div>
