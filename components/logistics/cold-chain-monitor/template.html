<div class="cold-chain-monitor group rounded-card border border-border bg-surface p-(--space-card) shadow-card" data-in-range="{{ in_range }}">
  <div class="flex items-start justify-between gap-3">
    <div class="min-w-0">
      <p class="text-sm text-on-surface-muted">Current temperature</p>
      <p class="mt-1 font-heading text-4xl tabular-nums text-danger group-data-[in-range=true]:text-success">{{ current_temp }}</p>
    </div>
    <span class="shrink-0 rounded-pill bg-danger/10 px-2.5 py-1 text-xs font-medium text-danger group-data-[in-range=true]:bg-success/10 group-data-[in-range=true]:text-success">
      <span class="group-data-[in-range=true]:hidden">Out of range</span>
      <span class="hidden group-data-[in-range=true]:inline">In range</span>
    </span>
  </div>
  <p data-if="min_temp" class="mt-3 flex items-center gap-1.5 text-xs text-on-surface-muted">
    <svg class="size-3.5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 4a2 2 0 114 0v7a3.5 3.5 0 11-4 0z"/><path d="M10 9v3.5"/></svg>
    <span>Safe range {{ min_temp }} to {{ max_temp }}</span>
  </p>
  <ul data-if="readings" class="cold-chain-monitor__log mt-4 flex flex-col gap-1.5 border-t border-border pt-3">
    <li data-for="reading in readings" class="flex items-center justify-between gap-3 text-sm">
      <span class="text-on-surface-muted tabular-nums">{{ reading.time }}</span>
      <span class="font-medium tabular-nums text-on-surface data-[breach=true]:text-danger" data-breach="{{ reading.breach }}">{{ reading.temp }}</span>
    </li>
  </ul>
</div>
