<ol class="tracking-timeline flex flex-col" aria-label="Tracking history">
  <li data-for="event in events" class="tracking-timeline__event group relative flex gap-4 pb-6 last:pb-0" data-done="{{ event.done }}">
    <span class="tracking-timeline__line absolute left-[11px] top-6 h-full w-0.5 bg-border group-last:hidden group-data-[done=true]:bg-primary" aria-hidden="true"></span>
    <span class="tracking-timeline__dot relative z-10 mt-0.5 flex size-6 shrink-0 items-center justify-center rounded-full border-2 border-border bg-surface text-on-surface-muted group-data-[done=true]:border-primary group-data-[done=true]:bg-primary group-data-[done=true]:text-primary-contrast">
      <svg class="hidden size-3.5 group-data-[done=true]:block" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
      <span class="size-2 rounded-full bg-current group-data-[done=true]:hidden"></span>
    </span>
    <div class="min-w-0 flex-1">
      <p class="font-medium text-on-surface-muted group-data-[done=true]:text-on-surface">{{ event.status }}</p>
      <p data-if="event.location" class="text-sm text-on-surface-muted">{{ event.location }}</p>
      <p data-if="event.time" class="text-xs text-on-surface-muted tabular-nums">{{ event.time }}</p>
    </div>
  </li>
</ol>
