<div class="carrier-rate-card group flex items-center gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card transition-colors duration-(--duration-token) hover:border-primary/60 data-[selected=true]:border-primary data-[selected=true]:bg-primary/10" data-selected="{{ selected }}">
  <img data-if="logo" class="size-10 shrink-0 rounded-control bg-surface-raised object-contain p-1" src="{{ logo }}" alt="">
  <div class="min-w-0 flex-1">
    <p class="font-heading text-on-surface">{{ carrier }}</p>
    <p data-if="service" class="truncate text-sm text-on-surface-muted">{{ service }}</p>
    <p data-if="eta" class="mt-1 flex items-center gap-1 text-xs text-on-surface-muted">
      <svg class="size-3.5 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="10" cy="10" r="7"/><path d="M10 6.5v3.5l2.5 1.5"/></svg>
      <span class="truncate">{{ eta }}</span>
    </p>
  </div>
  <p class="shrink-0 font-heading text-lg text-on-surface tabular-nums">{{ price }}</p>
  <span class="carrier-rate-card__mark flex size-5 shrink-0 items-center justify-center rounded-full border-2 border-border group-data-[selected=true]:border-primary" aria-hidden="true">
    <span class="size-2.5 rounded-full bg-primary opacity-0 transition-opacity duration-(--duration-token) group-data-[selected=true]:opacity-100"></span>
  </span>
</div>
