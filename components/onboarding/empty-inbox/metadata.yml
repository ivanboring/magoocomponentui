name: "Empty Inbox"
short_description: A no-messages empty state with a positive tone and optional CTA.
long_visual_description: >
  A centered empty state with a success-tinted envelope-check icon, an all-caught-up message,
  and an optional compose action.

use_cases:
  - Empty inbox.
  - No messages state.
  - All-caught-up view.
  - Zero notifications.
  - Empty mailbox.

recommended_for:
  - A positive empty inbox/messages state.
avoid_for:
  - A search empty state (use no-results).

markets:
  - Global

example_usage: >
  Use a positive tone ("all caught up"); offer a compose action.

props:
  title: The empty title.
  description: The message.
  cta_label: An optional action.

example_prompts:
  - "Add an empty inbox all-caught-up state."
  - "Add a no-messages view."

lifecycle: experimental
content_model: A positive empty inbox state.

theming:
  tokens_used:
    - --color-success
    - --color-on-surface
    - --color-on-surface-muted
    - --color-primary
    - --color-primary-contrast
    - --radius-button
    - --font-heading
    - --space-section
    - --duration-token

editorial_guidance: >
  Keep the tone positive; the CTA offers a next step.

categorization:
  category: Onboarding
  subcategory: States
  atomic_type: molecule
  usage_type: [highlight]
  maturity: ai-generated
  wcag:
    level: AA
    notes: The title/description are real text; the icon is decorative; the CTA is a real button.
  keyboard_support: The CTA is focusable and activates on Enter/Space.
  seo_score: 15
  text_direction: both
