name: "500 Error"
short_description: A server-error block with retry, home, and an incident ID.
long_visual_description: >
  A centered server-error block with a warning icon, a title and reassuring description,
  retry/home actions, and a monospace incident ID.

use_cases:
  - Server error page.
  - 500 error state.
  - Unexpected error.
  - Crash recovery.
  - Backend failure.

recommended_for:
  - A server-error (500) page block.
avoid_for:
  - A not-found (use error-404).

markets:
  - Global

example_usage: >
  Reassure the user, offer retry/home, and show an incident ID for support.

props:
  code: The error code.
  title: The title.
  description: The reassuring description.
  incident_id: The incident ID.
  retry_label: The retry text.

example_prompts:
  - "Add a 500 server error page with an incident ID."
  - "Add an unexpected-error block."

lifecycle: experimental
content_model: A server-error page block.

theming:
  tokens_used:
    - --color-surface-raised
    - --color-on-surface
    - --color-on-surface-muted
    - --color-primary
    - --color-primary-contrast
    - --color-danger
    - --color-border
    - --radius-button
    - --font-heading
    - --space-section
    - --duration-token

editorial_guidance: >
  Reassure that it's being handled; the incident ID helps support.

categorization:
  category: Onboarding
  subcategory: Errors
  atomic_type: organism
  usage_type: [highlight]
  maturity: ai-generated
  wcag:
    level: AA
    notes: Uses a real h1; retry/home are real controls; the incident ID is real text; the icon is decorative.
  keyboard_support: Retry and home are focusable and keyboard-operable.
  seo_score: 25
  text_direction: both
