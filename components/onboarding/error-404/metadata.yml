name: "404 Error"
short_description: A not-found page block with a big code, search, and back-home.
long_visual_description: >
  A centered not-found block with a large 404, a title and description, a site search, and a
  back-to-home button.

use_cases:
  - 404 page.
  - Not-found state.
  - Broken link page.
  - Missing page.
  - Dead-end recovery.

recommended_for:
  - A not-found (404) page block.
avoid_for:
  - A server error (use error-500).

markets:
  - Global

example_usage: >
  Offer a way forward (search, home) rather than a dead end.

props:
  code: The error code.
  title: The title.
  description: The description.
  home_label: The back-home text.
  search: Whether to show search.

example_prompts:
  - "Add a 404 not-found page with search."
  - "Add a page-not-found block."

lifecycle: experimental
content_model: A not-found page block.

theming:
  tokens_used:
    - --color-surface
    - --color-on-surface
    - --color-on-surface-muted
    - --color-primary
    - --color-primary-contrast
    - --color-border
    - --radius-pill
    - --radius-button
    - --font-heading
    - --space-section
    - --duration-token

editorial_guidance: >
  Always offer a way forward (search, home); keep the tone light.

categorization:
  category: Onboarding
  subcategory: Errors
  atomic_type: organism
  usage_type: [highlight]
  maturity: ai-generated
  wcag:
    level: AA
    notes: Uses a real h1; the search has a label; home is a real link; the big code is decorative reinforcement.
  keyboard_support: Search and home are focusable and keyboard-operable.
  seo_score: 30
  text_direction: both
