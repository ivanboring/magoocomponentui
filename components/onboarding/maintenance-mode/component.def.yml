name: maintenance-mode
props:
  title:
    type: string
    default: "We'll be right back"
    title: Title
  description:
    type: string
    default: "We're performing scheduled maintenance to make things better."
    title: Description
  eta:
    type: string
    title: ETA
    example: "Estimated back by 3:00 PM UTC"
  status_label:
    type: string
    title: Status link label
    example: "View status page"
