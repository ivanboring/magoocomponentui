<div class="sleep-summary rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="mb-3">
    <p class="text-sm text-on-surface-muted">{{ label }}</p>
    <p class="font-heading text-3xl text-on-surface tabular-nums">{{ total }}</p>
  </div>
  <div class="flex h-3 w-full overflow-hidden rounded-pill bg-surface-raised">
    <span data-for="stage in stages" class="h-full {{ stage.color_class }}" style="width: {{ stage.pct }}%" aria-hidden="true"></span>
  </div>
  <ul class="mt-3 flex flex-wrap gap-x-4 gap-y-1.5">
    <li data-for="stage in stages" class="flex items-center gap-1.5 text-sm">
      <span class="size-2.5 shrink-0 rounded-[3px] {{ stage.color_class }}"></span>
      <span class="text-on-surface">{{ stage.label }}</span>
      <span class="tabular-nums text-on-surface-muted">{{ stage.pct }}%</span>
    </li>
  </ul>
  <span class="hidden bg-primary bg-secondary bg-accent bg-success bg-warning bg-danger bg-info bg-surface-raised" aria-hidden="true"></span>
</div>
