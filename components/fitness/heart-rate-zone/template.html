<div class="heart-rate-zone rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="mb-4 flex items-baseline gap-2">
    <p class="font-heading text-3xl text-on-surface tabular-nums">{{ bpm }} <span class="text-base font-normal text-on-surface-muted">bpm</span></p>
    <span class="ml-auto rounded-pill bg-surface-raised px-2.5 py-1 text-xs font-medium text-on-surface">{{ zone_label }}</span>
  </div>
  <div class="flex items-end gap-1">
    <div data-for="zone in zones" class="group/z flex-1" data-active="{{ zone.active }}">
      <div class="h-3 w-full rounded-sm transition-all duration-(--duration-token) group-data-[active=true]/z:h-5 group-data-[active=true]/z:ring-2 group-data-[active=true]/z:ring-ring {{ zone.color_class }}"></div>
      <p class="mt-1.5 text-center text-[10px] leading-tight text-on-surface-muted group-data-[active=true]/z:font-semibold group-data-[active=true]/z:text-on-surface">{{ zone.label }}</p>
      <p class="text-center text-[10px] leading-tight text-on-surface-muted">{{ zone.range }}</p>
    </div>
  </div>
  <span class="hidden bg-primary bg-secondary bg-accent bg-success bg-warning bg-danger bg-info" aria-hidden="true"></span>
</div>
