    notes: Phase is conveyed by text (Work/Rest/Done) as well as colour; controls are native buttons and the display is a role="timer" region.
  keyboard_support: Start, Pause and Reset are native buttons, focusable and activated with Enter/Space.
  seo_score: 20
  text_direction: both
