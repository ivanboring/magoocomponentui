<div class="rep-counter rounded-card border border-border bg-surface p-(--space-card) text-center shadow-card" data-target="{{ target }}">
  <p data-if="label" class="text-sm text-on-surface-muted">{{ label }}</p>
  <p class="mt-1 flex items-baseline justify-center gap-1">
    <span class="rep-counter__count font-heading text-5xl text-on-surface tabular-nums">{{ count }}</span>
    <span data-if="target" class="text-lg text-on-surface-muted">/ {{ target }}</span>
  </p>
  <button type="button" class="rep-counter__inc mx-auto mt-4 flex size-20 items-center justify-center rounded-pill bg-primary text-primary-contrast shadow-card transition-transform duration-(--duration-token) hover:opacity-90 active:scale-95" aria-label="Add one rep">
    <span class="font-heading text-xl">+1</span>
  </button>
  <button type="button" class="rep-counter__reset mt-3 block w-full text-sm text-on-surface-muted underline-offset-2 transition-colors duration-(--duration-token) hover:text-on-surface hover:underline">Reset</button>
</div>
