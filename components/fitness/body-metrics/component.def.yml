name: body-metrics
props:
  metrics:
    type: array
    items: object
    required: true
    title: Metrics
    description: >
      The body measurements to tile out, in order. Each item:
      { label, value, unit, change, change_dir }. label and value are required; unit is an optional
      suffix (e.g. "kg"); change is an optional signed delta string (e.g. "1.2 kg") and change_dir is
      "up" or "down". By default up is coloured danger and down success (weight-loss framing) - swap
      the direction per metric if a rise is the good outcome.
    example:
      - { label: "Weight", value: "74.2", unit: "kg", change: "1.2", change_dir: "down" }
      - { label: "BMI", value: "22.8", unit: "", change: "0.3", change_dir: "down" }
      - { label: "Body fat", value: "18.4", unit: "%", change: "0.6", change_dir: "down" }
      - { label: "Muscle", value: "34.1", unit: "kg", change: "0.4", change_dir: "up" }
      - { label: "Waist", value: "82", unit: "cm", change: "1.0", change_dir: "down" }
      - { label: "Resting HR", value: "58", unit: "bpm" }
