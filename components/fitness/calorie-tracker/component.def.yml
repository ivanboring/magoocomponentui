name: calorie-tracker
props:
  consumed:
    type: string
    required: true
    title: Consumed
    description: Calories consumed so far, as a plain number string.
    example: "1450"
  goal:
    type: string
    required: true
    title: Goal
    description: Daily calorie goal, as a plain number string.
    example: "2000"
  consumed_pct:
    type: integer
    required: true
    title: Consumed percent
    description: >
      Precomputed fill percentage (0-100) for the main bar, i.e. round(consumed / goal * 100)
      clamped to 100. The template does no arithmetic, so pass this ready to use.
    example: 73
  remaining:
    type: string
    title: Remaining
    description: Optional calories remaining, as a plain number string.
    example: "550"
  macros:
    type: array
    items: object
    title: Macros
    description: >
      Optional macro breakdown. Each item: { label, grams, pct, color_class }. grams is a plain
      number string; pct is the precomputed bar width percentage (0-100); color_class is a tokenized
      bg-* utility (bg-primary/success/warning/danger/info/accent).
    example:
      - { label: "Protein", grams: "120", pct: 60, color_class: "bg-primary" }
