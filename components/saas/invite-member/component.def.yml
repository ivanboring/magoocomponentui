name: invite-member
props:
  placeholder:
    type: string
    default: "colleague@company.com"
    title: Email placeholder
    description: Placeholder text for the email input.
    example: "colleague@company.com"
  roles:
    type: array
    items: object
    required: true
    title: Roles
    description: >
      The selectable roles for the invited member. Each item: { label, value } — label is shown in
      the dropdown, value is the machine role sent on submit. The first entry is the default option.
    example:
      - { label: "Admin", value: "admin" }
      - { label: "Member", value: "member" }
      - { label: "Viewer", value: "viewer" }
