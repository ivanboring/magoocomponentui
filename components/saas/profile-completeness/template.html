<div class="profile-completeness rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-center justify-between gap-3">
    <h3 class="font-heading text-on-surface">{{ title }}</h3>
    <span class="shrink-0 text-sm font-medium tabular-nums text-on-surface-muted">{{ percent }}% complete</span>
  </div>
  <div class="mt-3 h-2 w-full overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ percent }}" aria-valuemin="0" aria-valuemax="100" aria-label="{{ title }}">
    <div class="profile-completeness__fill h-full rounded-pill bg-primary transition-all duration-(--duration-token)" style="width: {{ percent }}%"></div>
  </div>
  <ul class="mt-4 flex flex-col gap-2">
    <li data-for="step in steps" class="profile-completeness__step flex items-center gap-2 text-sm text-on-surface data-[done=true]:text-on-surface-muted data-[done=true]:line-through" data-done="{{ step.done }}">
      <span data-if="step.done" class="flex size-5 shrink-0 items-center justify-center rounded-full bg-success/10 text-success">
        <svg class="size-3" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
      </span>
      <span data-if="!step.done" class="size-5 shrink-0 rounded-full border border-border"></span>
      <span>{{ step.label }}</span>
    </li>
  </ul>
</div>
