<div class="notification-preferences overflow-x-auto rounded-card border border-border bg-surface shadow-card">
  <table class="notification-preferences__table w-full text-sm">
    <thead>
      <tr class="border-b border-border">
        <th class="px-4 py-3 text-left font-medium text-on-surface-muted" scope="col">Notification</th>
        <th class="px-4 py-3 text-center font-medium text-on-surface-muted" scope="col">Email</th>
        <th class="px-4 py-3 text-center font-medium text-on-surface-muted" scope="col">Push</th>
        <th class="px-4 py-3 text-center font-medium text-on-surface-muted" scope="col">SMS</th>
      </tr>
    </thead>
    <tbody>
      <tr data-for="row in rows" class="border-b border-border last:border-b-0">
        <th class="notification-preferences__label px-4 py-3 text-left font-normal text-on-surface" scope="row">{{ row.label }}</th>
        <td class="px-4 py-3 text-center">
          <button type="button" class="notification-preferences__switch relative inline-flex h-5 w-9 items-center rounded-pill bg-surface-raised align-middle transition-colors duration-(--duration-token) data-[state=true]:bg-primary" role="switch" data-state="{{ row.email }}" aria-checked="{{ row.email }}" data-channel="email" aria-label="Email for {{ row.label }}">
            <span class="ml-0.5 inline-block size-4 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[state=true]:translate-x-4" data-state="{{ row.email }}"></span>
          </button>
        </td>
        <td class="px-4 py-3 text-center">
          <button type="button" class="notification-preferences__switch relative inline-flex h-5 w-9 items-center rounded-pill bg-surface-raised align-middle transition-colors duration-(--duration-token) data-[state=true]:bg-primary" role="switch" data-state="{{ row.push }}" aria-checked="{{ row.push }}" data-channel="push" aria-label="Push for {{ row.label }}">
            <span class="ml-0.5 inline-block size-4 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[state=true]:translate-x-4" data-state="{{ row.push }}"></span>
          </button>
        </td>
        <td class="px-4 py-3 text-center">
          <button type="button" class="notification-preferences__switch relative inline-flex h-5 w-9 items-center rounded-pill bg-surface-raised align-middle transition-colors duration-(--duration-token) data-[state=true]:bg-primary" role="switch" data-state="{{ row.sms }}" aria-checked="{{ row.sms }}" data-channel="sms" aria-label="SMS for {{ row.label }}">
            <span class="ml-0.5 inline-block size-4 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[state=true]:translate-x-4" data-state="{{ row.sms }}"></span>
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
