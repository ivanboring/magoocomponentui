<div class="workspace-switcher group/ws relative inline-block" data-open="{{ start_open }}">
  <button type="button" class="workspace-switcher__trigger flex w-56 items-center gap-2 rounded-button border border-border bg-surface px-3 py-2 text-left text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" aria-haspopup="listbox" aria-expanded="false">
    <span class="flex size-7 shrink-0 items-center justify-center rounded-control bg-surface-raised text-on-surface-muted" aria-hidden="true">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 17V6l6-3v14M10 17V8l6 2v7M2 17h16"/></svg>
    </span>
    <span class="workspace-switcher__current min-w-0 flex-1 truncate font-medium">{{ current }}</span>
    <svg class="size-4 shrink-0 text-on-surface-muted transition-transform duration-(--duration-token) group-data-[open=true]/ws:rotate-180" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 8l5 5 5-5"/></svg>
  </button>
  <div class="workspace-switcher__menu invisible pointer-events-none absolute left-0 z-30 mt-1 flex w-64 flex-col rounded-card border border-border bg-surface p-1 opacity-0 shadow-raised transition-opacity duration-(--duration-token) group-data-[open=true]/ws:visible group-data-[open=true]/ws:pointer-events-auto group-data-[open=true]/ws:opacity-100" role="listbox" aria-label="Switch workspace">
    <button data-for="ws in workspaces" type="button" class="workspace-switcher__item group/opt flex w-full items-center gap-3 rounded-control px-2 py-2 text-left transition-colors duration-(--duration-token) hover:bg-surface-raised data-[current=true]:bg-surface-raised" role="option" data-value="{{ ws.name }}" data-current="{{ ws.current }}" aria-selected="{{ ws.current }}">
      <span class="flex size-8 shrink-0 items-center justify-center overflow-hidden rounded-control bg-surface-raised text-on-surface-muted" aria-hidden="true">
        <img data-if="ws.avatar" class="size-full object-cover" src="{{ ws.avatar }}" alt="">
        <svg data-if="!ws.avatar" class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 17V6l6-3v14M10 17V8l6 2v7M2 17h16"/></svg>
      </span>
      <span class="min-w-0 flex-1">
        <span class="block truncate text-sm font-medium text-on-surface">{{ ws.name }}</span>
        <span data-if="ws.plan" class="block truncate text-xs text-on-surface-muted">{{ ws.plan }}</span>
      </span>
      <svg class="size-4 shrink-0 text-primary opacity-0 transition-opacity duration-(--duration-token) group-data-[current=true]/opt:opacity-100" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 10l3 3 7-7"/></svg>
    </button>
    <hr class="my-1 border-border" role="none">
    <button type="button" class="workspace-switcher__create flex w-full items-center gap-2 rounded-control px-2 py-2 text-left text-sm font-medium text-primary transition-colors duration-(--duration-token) hover:bg-surface-raised">
      <svg class="size-4 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 4v12M4 10h12"/></svg>
      Create workspace
    </button>
  </div>
</div>
