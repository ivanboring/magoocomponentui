<div class="toggle-setting-row flex items-center justify-between gap-4 py-3">
  <div class="min-w-0">
    <p class="toggle-setting-row__label text-sm font-medium text-on-surface">{{ label }}</p>
    <p data-if="help" class="toggle-setting-row__help text-xs text-on-surface-muted">{{ help }}</p>
  </div>
  <button type="button" class="toggle-setting-row__switch relative inline-flex h-6 w-10 shrink-0 items-center rounded-pill bg-surface-raised transition-colors duration-(--duration-token) focus:outline-none focus:ring-2 focus:ring-ring data-[state=true]:bg-primary" role="switch" data-state="{{ on }}" aria-checked="{{ on }}" aria-label="{{ label }}" data-name="{{ name }}">
    <span class="toggle-setting-row__knob ml-0.5 inline-block size-5 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[state=true]:translate-x-4" data-state="{{ on }}"></span>
  </button>
</div>
