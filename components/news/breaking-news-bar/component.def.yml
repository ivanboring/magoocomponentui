name: breaking-news-bar
props:
  label:
    type: string
    default: "Breaking"
    title: Label
  headline:
    type: string
    required: true
    title: Headline
    example: "Central bank cuts rates by half a point in surprise move"
  time:
    type: string
    title: Time
    example: "2 min ago"
  href:
    type: link
    title: Link
