<aside class="correction-notice rounded-card border border-border bg-surface-raised p-4 text-sm" role="note">
  <p class="correction-notice__body text-on-surface">
    <span class="correction-notice__label font-semibold text-warning">{{ label }}:</span>
    {{ text }}
  </p>
  <p data-if="date" class="correction-notice__date mt-1 text-xs text-on-surface-muted">{{ date }}</p>
</aside>
