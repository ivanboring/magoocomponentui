<section class="weather-strip flex flex-wrap items-center gap-x-6 gap-y-3 rounded-card border border-border bg-surface px-(--space-card) py-3 shadow-card" aria-label="Weather">
  <div class="weather-strip__now flex items-center gap-3">
    <span class="text-3xl" aria-hidden="true">{{ icon }}</span>
    <div>
      <p class="weather-strip__temp font-heading text-xl text-on-surface tabular-nums">{{ temp }}</p>
      <p class="weather-strip__location text-xs text-on-surface-muted">{{ location }}<span data-if="condition"> · {{ condition }}</span></p>
    </div>
  </div>
  <ul data-if="days" class="weather-strip__days ml-auto flex flex-wrap justify-end gap-x-4 gap-y-2">
    <li data-for="day in days" class="weather-strip__day flex flex-col items-center gap-0.5 text-center">
      <span class="text-[10px] uppercase text-on-surface-muted">{{ day.label }}</span>
      <span class="text-lg" aria-hidden="true">{{ day.icon }}</span>
      <span class="text-xs text-on-surface tabular-nums">{{ day.high }}<span class="text-on-surface-muted">/{{ day.low }}</span></span>
    </li>
  </ul>
</section>
