<figure class="quote-card-news border-l-4 border-primary pl-5 py-2">
  <svg class="quote-card-news__mark size-8 text-primary/30" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 7H4v6h3v-1a2 2 0 01-2-2h2V7zm10 0h-3v6h3v-1a2 2 0 01-2-2h2V7z"/></svg>
  <blockquote class="quote-card-news__quote mt-1 font-heading text-2xl leading-snug text-on-surface">{{ quote }}</blockquote>
  <figcaption class="quote-card-news__source mt-3 text-sm text-on-surface-muted">
    <span class="font-semibold text-on-surface">{{ source }}</span><span data-if="role">, {{ role }}</span>
  </figcaption>
</figure>
