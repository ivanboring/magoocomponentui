<a class="team-card flex items-center gap-3 rounded-card border border-border bg-surface p-(--space-card) shadow-card transition-shadow duration-(--duration-token) hover:shadow-raised" href="{{ href }}">
  <span class="team-card__crest flex size-12 shrink-0 items-center justify-center rounded-full bg-surface-raised font-heading text-on-surface" role="img" aria-label="{{ name }}">{{ code }}</span>
  <span class="min-w-0 flex-1">
    <span class="team-card__name block font-heading text-on-surface">{{ name }}</span>
    <span class="team-card__meta mt-0.5 block text-xs text-on-surface-muted">
      <span data-if="group">{{ group }}</span><span data-if="record"> · {{ record }}</span>
    </span>
  </span>
  <span data-if="fifa_rank" class="team-card__rank shrink-0 rounded-pill bg-surface-raised px-2 py-0.5 text-xs font-medium text-on-surface-muted">FIFA {{ fifa_rank }}</span>
</a>
