name: group-stage-grid
props:
  gap:
    type: enum
    values: [default, none, sm, md, lg, xl]
    default: default
    title: Gap
    description: >
      Space between grid cells, from a fixed set of choices. "default" keeps the component's
      designed spacing; none/sm/md/lg/xl are explicit fixed overrides.
  groups:
    type: array
    items: object
    required: true
    title: Groups
    description: >
      Each group: { name, teams: [{ code, name, pts, qualified }] }. Rendered as a
      responsive grid of mini group tables (top-N qualified shaded).
    example:
      - name: "Group A"
        teams:
          - { code: "NED", name: "Netherlands", pts: 7, qualified: true }
variants:
  gap:
    default: "gap-(--space-card)"
    none: "gap-0"
    sm: "gap-3"
    md: "gap-6"
    lg: "gap-10"
    xl: "gap-16"
