<nav class="matchday-selector flex items-center gap-1 overflow-x-auto" aria-label="Matchday">
  <button data-for="item in items" type="button" class="matchday-selector__item shrink-0 rounded-pill px-4 py-1.5 text-sm font-medium text-on-surface-muted transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface data-[active=true]:bg-primary data-[active=true]:text-primary-contrast" data-value="{{ item.value }}" data-active="{{ item.active }}" aria-current="{{ item.active }}">{{ item.label }}</button>
</nav>
