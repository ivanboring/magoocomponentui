<div class="bulk-actions-bar flex items-center gap-3 rounded-card border border-border bg-surface-raised px-4 py-2 font-body text-on-surface">
  <input type="checkbox" class="bulk-actions-bar__select-all size-4 shrink-0 rounded-control accent-primary" aria-label="Select all">
  <span class="bulk-actions-bar__count text-sm font-medium text-on-surface">{{ selected_count }} selected</span>
  <span class="mx-1 h-5 w-px shrink-0 bg-border" aria-hidden="true"></span>
  <div class="flex flex-wrap items-center gap-1">
    <button data-for="action in actions" type="button" class="bulk-actions-bar__action inline-flex items-center gap-2 rounded-button px-3 py-1.5 text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface" data-label="{{ action.label }}">
      <span data-if="action.icon" class="shrink-0 text-on-surface-muted" aria-hidden="true">{{{ action.icon }}}</span>
      {{ action.label }}
    </button>
  </div>
</div>
