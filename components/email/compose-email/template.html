<form class="compose-email flex flex-col overflow-hidden rounded-card border border-border bg-surface shadow-card">
  <div class="flex items-center gap-3 border-b border-border px-4 py-2">
    <span class="w-16 shrink-0 text-sm text-on-surface-muted" aria-hidden="true">To</span>
    <input type="text" class="compose-email__to min-w-0 flex-1 bg-transparent text-sm text-on-surface outline-none placeholder:text-on-surface-muted" value="{{ to }}" placeholder="Recipients" aria-label="To">
  </div>
  <div class="flex items-center gap-3 border-b border-border px-4 py-2">
    <span class="w-16 shrink-0 text-sm text-on-surface-muted" aria-hidden="true">Subject</span>
    <input type="text" class="compose-email__subject min-w-0 flex-1 bg-transparent text-sm text-on-surface outline-none placeholder:text-on-surface-muted" value="{{ subject }}" placeholder="Subject" aria-label="Subject">
  </div>
  <textarea class="compose-email__body min-h-40 w-full resize-y bg-transparent p-4 text-sm leading-relaxed text-on-surface outline-none placeholder:text-on-surface-muted" placeholder="{{ body_placeholder }}" aria-label="Message body"></textarea>
  <div class="flex items-center justify-between gap-3 border-t border-border px-4 py-2">
    <div class="flex items-center gap-1 text-on-surface-muted">
      <button type="button" class="rounded-control p-1.5 transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface" aria-label="Attach file">
        <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M14 8l-5 5a2.5 2.5 0 01-3.5-3.5l6-6a4 4 0 015.5 5.5l-6 6"/></svg>
      </button>
      <button type="button" class="rounded-control p-1.5 font-heading text-sm font-bold transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface" aria-label="Bold">B</button>
      <button type="button" class="rounded-control p-1.5 font-heading text-sm italic transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface" aria-label="Italic">I</button>
      <button type="button" class="rounded-control p-1.5 transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface" aria-label="Insert link">
        <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M9 11a3 3 0 004.24 0l2-2A3 3 0 0011 4.76l-1 1"/><path d="M11 9a3 3 0 00-4.24 0l-2 2A3 3 0 009 15.24l1-1"/></svg>
      </button>
    </div>
    <button type="submit" class="compose-email__send inline-flex items-center gap-2 rounded-button bg-primary px-4 py-2 text-sm font-medium text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M18 2L9 11M18 2l-6 16-3-7-7-3z"/></svg>
      Send
    </button>
  </div>
</form>
