<article class="email-reader overflow-hidden rounded-card border border-border bg-surface shadow-card">
  <header class="email-reader__header border-b border-border p-(--space-card)">
    <h1 class="font-heading text-xl text-on-surface">{{ subject }}</h1>
    <div class="mt-3 flex items-center gap-3">
      <span class="email-reader__avatar flex size-10 shrink-0 items-center justify-center overflow-hidden rounded-pill bg-surface-raised text-sm font-medium text-on-surface-muted">
        <img data-if="sender.avatar" class="size-full object-cover" src="{{ sender.avatar }}" alt="">
        <span data-if="!sender.avatar">{{ sender.initials }}</span>
      </span>
      <div class="min-w-0 flex-1">
        <p class="truncate text-sm text-on-surface"><span class="font-medium">{{ sender.name }}</span> <span class="text-on-surface-muted">&lt;{{ sender.email }}&gt;</span></p>
        <p data-if="to" class="truncate text-xs text-on-surface-muted">to {{ to }}</p>
      </div>
      <span class="email-reader__date shrink-0 text-xs text-on-surface-muted">{{ date }}</span>
    </div>
  </header>

  <div class="email-reader__body space-y-4 p-(--space-card) text-sm leading-relaxed text-on-surface">
    {{{ body_html }}}
  </div>

  <div data-if="attachments" class="email-reader__attachments flex flex-wrap gap-2 border-t border-border p-(--space-card)">
    <a data-for="file in attachments" class="flex items-center gap-2 rounded-control border border-border bg-surface-raised px-3 py-2 text-xs text-on-surface transition-colors duration-(--duration-token) hover:bg-surface" href="#">
      <svg class="size-4 shrink-0 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M6 2h5l3 3v12a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M11 2v3h3"/></svg>
      <span class="truncate font-medium">{{ file.name }}</span>
      <span class="text-on-surface-muted">{{ file.size }}</span>
    </a>
  </div>
</article>
