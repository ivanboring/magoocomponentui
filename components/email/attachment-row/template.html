<div class="attachment-row flex items-center gap-3 rounded-control border border-border bg-surface px-3 py-2">
  <span class="attachment-row__icon shrink-0 {{ kind@class }}" aria-hidden="true">
    <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2h5l3 3v12a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1z"/><path d="M11 2v3h3"/></svg>
  </span>
  <span class="attachment-row__name min-w-0 flex-1 truncate text-sm text-on-surface">{{ name }}</span>
  <span class="shrink-0 text-xs text-on-surface-muted">{{ size }}</span>
  <button type="button" class="attachment-row__download shrink-0 rounded-control p-1 text-on-surface-muted transition-colors duration-(--duration-token) hover:text-on-surface" aria-label="Download {{ name }}">
    <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M10 3v9m0 0l-3-3m3 3l3-3M4 15v1a2 2 0 002 2h8a2 2 0 002-2v-1"/></svg>
  </button>
</div>
