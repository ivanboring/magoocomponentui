name: "Location Pin Card"
short_description: A map pin popup card with photo, rating, address, and directions/save.
long_visual_description: >
  A compact popup card with a place photo, name, rating and category, address, open status, and
  directions/save actions — the map-marker popup style.

use_cases:
  - Map pin popup.
  - Place info card.
  - Marker callout.
  - Location preview.
  - Map tooltip card.

recommended_for:
  - A popup card for a selected map pin.
avoid_for:
  - A result list row (use place-result-row).

markets:
  - Global

example_usage: >
  Show the place photo and key info with directions/save actions; sized as a map popup.

props:
  name: The place name.
  category: The category.
  rating: The rating.
  address: The address.
  image: The place photo.
  status: The open status.

example_prompts:
  - "Add a map pin popup card with directions."
  - "Add a place info callout."

lifecycle: experimental
content_model: A map pin popup with actions.

theming:
  tokens_used:
    - --color-surface
    - --color-surface-raised
    - --color-on-surface
    - --color-on-surface-muted
    - --color-primary
    - --color-primary-contrast
    - --color-success
    - --color-border
    - --radius-card
    - --radius-button
    - --shadow-raised
    - --font-heading
    - --duration-token

editorial_guidance: >
  Keep it compact for a popup; directions is the primary action.

categorization:
  category: Maps
  subcategory: Places
  atomic_type: molecule
  usage_type: [card]
  maturity: ai-generated
  wcag:
    level: AA
    notes: The photo alt is the place name; rating/address/status are real text; directions/save are real buttons.
  keyboard_support: Directions and save are focusable and activate on Enter/Space.
  seo_score: 40
  text_direction: both
