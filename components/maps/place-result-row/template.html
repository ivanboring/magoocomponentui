<article class="place-result-row flex items-start gap-3 py-3">
  <span data-if="marker" class="place-result-row__marker flex size-6 shrink-0 items-center justify-center rounded-full bg-primary text-xs font-bold text-primary-contrast">{{ marker }}</span>
  <div class="min-w-0 flex-1">
    <h3 class="place-result-row__name font-heading text-on-surface"><a class="hover:underline" href="#">{{ name }}</a></h3>
    <p class="place-result-row__meta flex flex-wrap items-center gap-x-2 text-sm text-on-surface-muted">
      <span data-if="rating" class="flex items-center gap-0.5 text-on-surface"><svg class="size-3.5 text-warning" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.5l2.6 5.3 5.9.9-4.3 4.1 1 5.9L10 14.9l-5.2 2.8 1-5.9-4.3-4.1 5.9-.9L10 1.5z"/></svg>{{ rating }}</span>
      <span data-if="reviews">({{ reviews }})</span>
      <span data-if="category">· {{ category }}</span>
      <span data-if="distance">· {{ distance }}</span>
    </p>
    <p data-if="status" class="place-result-row__status text-xs text-success">{{ status }}</p>
  </div>
  <button type="button" class="place-result-row__dir flex size-9 shrink-0 items-center justify-center rounded-full border border-border text-primary transition-colors duration-(--duration-token) hover:bg-surface-raised" aria-label="Directions to {{ name }}">
    <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M10 2l8 8-8 8-8-8z"/><path d="M8 11V9h4v2"/></svg>
  </button>
</article>
