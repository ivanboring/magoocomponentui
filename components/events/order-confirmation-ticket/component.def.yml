name: order-confirmation-ticket
props:
  event:
    type: string
    required: true
    title: Event
    example: "Frontend Conf 2026"
  order_id:
    type: string
    required: true
    title: Order ID
    example: "FC-2026-04821"
  email:
    type: string
    title: Email
    example: "jane@example.com"
  lines:
    type: array
    items: object
    required: true
    title: Order lines
    description: "Each: { label, qty, amount }."
    example:
      - { label: "General Admission", qty: "2", amount: "$180.00" }
  total:
    type: string
    required: true
    title: Total
    example: "$180.00"
