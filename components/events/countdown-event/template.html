<div class="countdown-event text-center" data-deadline="{{ deadline }}">
  <p data-if="title" class="countdown-event__title text-sm font-medium text-on-surface-muted">{{ title }}</p>
  <div class="countdown-event__units mt-2 flex items-center justify-center gap-3" role="timer" aria-live="polite">
    <span class="flex flex-col items-center rounded-card bg-surface-raised px-4 py-3"><span class="countdown-event__days font-heading text-3xl text-on-surface tabular-nums">00</span><span class="text-[10px] uppercase tracking-wide text-on-surface-muted">days</span></span>
    <span class="flex flex-col items-center rounded-card bg-surface-raised px-4 py-3"><span class="countdown-event__hours font-heading text-3xl text-on-surface tabular-nums">00</span><span class="text-[10px] uppercase tracking-wide text-on-surface-muted">hrs</span></span>
    <span class="flex flex-col items-center rounded-card bg-surface-raised px-4 py-3"><span class="countdown-event__minutes font-heading text-3xl text-on-surface tabular-nums">00</span><span class="text-[10px] uppercase tracking-wide text-on-surface-muted">min</span></span>
    <span class="flex flex-col items-center rounded-card bg-surface-raised px-4 py-3"><span class="countdown-event__seconds font-heading text-3xl text-on-surface tabular-nums">00</span><span class="text-[10px] uppercase tracking-wide text-on-surface-muted">sec</span></span>
  </div>
</div>
