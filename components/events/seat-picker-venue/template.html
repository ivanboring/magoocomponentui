<div class="seat-picker-venue rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="seat-picker-venue__stage mx-auto mb-6 w-3/4 rounded-t-[50%] border-b-2 border-primary bg-surface-raised py-2 text-center text-xs font-semibold uppercase tracking-widest text-on-surface-muted">{{ stage_label }}</div>
  <div class="seat-picker-venue__legend mb-4 flex flex-wrap items-center justify-center gap-4 text-xs text-on-surface-muted">
    <span class="flex items-center gap-1.5"><span class="size-3 rounded bg-surface-raised ring-1 ring-border"></span>Available</span>
    <span class="flex items-center gap-1.5"><span class="size-3 rounded bg-primary"></span>Selected</span>
    <span class="flex items-center gap-1.5"><span class="size-3 rounded bg-on-surface-muted/40"></span>Taken</span>
  </div>
  <div class="seat-picker-venue__sections flex flex-col items-center gap-4">
    <section data-for="section in sections" class="seat-picker-venue__section text-center">
      <p class="seat-picker-venue__section-label mb-2 text-xs font-medium text-on-surface-muted">{{ section.label }}</p>
      <div class="flex flex-col items-center gap-1.5">
        <div data-for="row in section.rows" class="flex items-center gap-1.5">
          <span data-for="seat in row.seats" class="inline-flex data-[status=aisle]:w-3" data-status="{{ seat.status }}">
            <button type="button" class="seat-picker-venue__seat flex size-6 items-center justify-center rounded text-[10px] font-medium ring-1 ring-border transition-colors duration-(--duration-token) data-[status=aisle]:hidden data-[status=available]:bg-surface-raised data-[status=available]:text-on-surface data-[status=available]:hover:ring-primary data-[status=selected]:bg-primary data-[status=selected]:text-primary-contrast data-[status=selected]:ring-primary data-[status=taken]:cursor-not-allowed data-[status=taken]:bg-on-surface-muted/30 data-[status=taken]:text-on-surface-muted" data-status="{{ seat.status }}" aria-label="Seat {{ seat.label }}" aria-pressed="false">{{ seat.label }}</button>
          </span>
        </div>
      </div>
    </section>
  </div>
</div>
