name: seat-picker-venue
props:
  stage_label:
    type: string
    default: "STAGE"
    title: Stage label
  sections:
    type: array
    items: object
    required: true
    title: Sections
    description: >
      Each section: { label, rows: [{ seats: [{ label, status }] }] } where status is
      available | selected | taken | aisle.
    example:
      - label: "Floor A"
        rows:
          - { seats: [{ label: "1", status: "available" }] }
