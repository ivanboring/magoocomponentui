<article class="session-card flex gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="session-card__time shrink-0 border-r border-border pr-4 text-sm font-medium text-on-surface-muted tabular-nums">{{ time }}</div>
  <div class="min-w-0 flex-1">
    <div class="flex items-start justify-between gap-2">
      <h3 class="session-card__title font-heading text-on-surface">{{ title }}</h3>
      <span data-if="track" class="session-card__track shrink-0 rounded-pill bg-primary/15 px-2 py-0.5 text-xs font-medium text-primary">{{ track }}</span>
    </div>
    <p class="session-card__meta mt-1 text-sm text-on-surface-muted"><span data-if="speaker">{{ speaker }}</span><span data-if="room"> · {{ room }}</span></p>
  </div>
</article>
