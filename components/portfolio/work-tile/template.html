<a data-if="href" class="work-tile group relative block aspect-[4/3] overflow-hidden rounded-card bg-surface-raised shadow-card" href="{{ href }}">
  <img class="size-full object-cover transition-transform duration-(--duration-token) group-hover:scale-105" src="{{ image }}" alt="">
  <span class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent opacity-0 transition-opacity duration-(--duration-token) group-hover:opacity-100" aria-hidden="true"></span>
  <span class="absolute inset-x-0 bottom-0 p-4 opacity-0 transition-opacity duration-(--duration-token) group-hover:opacity-100">
    <span data-if="category" class="block text-xs font-medium uppercase tracking-wide text-white/80">{{ category }}</span>
    <span class="block font-heading text-white">{{ title }}</span>
  </span>
</a>
<div data-if="!href" class="work-tile group relative block aspect-[4/3] overflow-hidden rounded-card bg-surface-raised shadow-card">
  <img class="size-full object-cover transition-transform duration-(--duration-token) group-hover:scale-105" src="{{ image }}" alt="">
  <span class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/10 to-transparent opacity-0 transition-opacity duration-(--duration-token) group-hover:opacity-100" aria-hidden="true"></span>
  <span class="absolute inset-x-0 bottom-0 p-4 opacity-0 transition-opacity duration-(--duration-token) group-hover:opacity-100">
    <span data-if="category" class="block text-xs font-medium uppercase tracking-wide text-white/80">{{ category }}</span>
    <span class="block font-heading text-white">{{ title }}</span>
  </span>
</div>
