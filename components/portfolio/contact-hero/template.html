<section class="contact-hero grid grid-cols-1 items-start gap-10 px-4 py-(--space-section) lg:grid-cols-2">
  <div class="contact-hero__intro">
    <h2 class="contact-hero__heading font-heading text-4xl leading-tight text-on-surface">{{ heading }}</h2>
    <p data-if="subheading" class="contact-hero__subheading mt-4 text-lg text-on-surface-muted">{{ subheading }}</p>
    <dl class="contact-hero__details mt-8 space-y-4">
      <div data-if="email" class="flex items-center gap-3">
        <span class="flex size-10 shrink-0 items-center justify-center rounded-full bg-primary/10 text-primary" aria-hidden="true">
          <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
        </span>
        <dd class="min-w-0"><a class="break-words text-on-surface transition-colors duration-(--duration-token) hover:text-primary" href="mailto:{{ email }}">{{ email }}</a></dd>
      </div>
      <div data-if="phone" class="flex items-center gap-3">
        <span class="flex size-10 shrink-0 items-center justify-center rounded-full bg-primary/10 text-primary" aria-hidden="true">
          <svg class="size-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M5 4h4l2 5-3 2a12 12 0 006 6l2-3 5 2v4a2 2 0 01-2 2A16 16 0 013 6a2 2 0 012-2z"/></svg>
        </span>
        <dd class="min-w-0"><a class="text-on-surface transition-colors duration-(--duration-token) hover:text-primary" href="tel:{{ phone }}">{{ phone }}</a></dd>
      </div>
    </dl>
  </div>

  <form class="contact-hero__form rounded-card border border-border bg-surface p-(--space-card) shadow-card">
    <div class="space-y-4">
      <div>
        <label class="mb-1.5 block text-sm font-medium text-on-surface" for="contact-hero-name">Name</label>
        <input class="contact-hero__field w-full rounded-control border border-border bg-surface-raised px-3 py-2.5 text-on-surface outline-none transition-shadow duration-(--duration-token) placeholder:text-on-surface-muted focus-visible:ring-2 focus-visible:ring-ring" type="text" id="contact-hero-name" name="name" autocomplete="name" placeholder="Your name">
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-on-surface" for="contact-hero-email">Email</label>
        <input class="contact-hero__field w-full rounded-control border border-border bg-surface-raised px-3 py-2.5 text-on-surface outline-none transition-shadow duration-(--duration-token) placeholder:text-on-surface-muted focus-visible:ring-2 focus-visible:ring-ring" type="email" id="contact-hero-email" name="email" autocomplete="email" placeholder="you@company.com">
      </div>
      <div>
        <label class="mb-1.5 block text-sm font-medium text-on-surface" for="contact-hero-message">Message</label>
        <textarea class="contact-hero__field min-h-32 w-full rounded-control border border-border bg-surface-raised px-3 py-2.5 text-on-surface outline-none transition-shadow duration-(--duration-token) placeholder:text-on-surface-muted focus-visible:ring-2 focus-visible:ring-ring" id="contact-hero-message" name="message" placeholder="Tell us about your project"></textarea>
      </div>
    </div>
    <button class="contact-hero__send mt-5 inline-flex w-full items-center justify-center rounded-button bg-primary px-6 py-3 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring" type="submit">Send message</button>
  </form>
</section>
