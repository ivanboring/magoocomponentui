<section class="bio-hero grid grid-cols-1 items-center gap-10 px-4 py-(--space-section) lg:grid-cols-2">
  <div class="bio-hero__portrait">
    <img data-if="portrait" class="aspect-square w-full rounded-card object-cover shadow-card" src="{{ portrait }}" alt="">
  </div>
  <div class="bio-hero__body">
    <h1 class="bio-hero__name font-heading text-4xl leading-tight text-on-surface">{{ name }}</h1>
    <p class="bio-hero__role mt-2 text-lg text-on-surface-muted">{{ role }}</p>
    <div class="bio-hero__intro mt-6 space-y-4 text-on-surface-muted">{{{ intro_html }}}</div>
    <div data-if="ctas" class="bio-hero__ctas mt-8 flex flex-wrap gap-3">
      <a data-for="cta in ctas" data-primary="{{ cta.primary }}" href="{{ cta.href }}" class="bio-hero__cta inline-flex items-center rounded-button px-6 py-3 text-sm font-heading transition-colors duration-(--duration-token) focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring data-[primary=true]:bg-primary data-[primary=true]:text-primary-contrast data-[primary=true]:hover:opacity-90 data-[primary=false]:border data-[primary=false]:border-border data-[primary=false]:text-on-surface data-[primary=false]:hover:bg-surface-raised">{{ cta.label }}</a>
    </div>
  </div>
</section>
