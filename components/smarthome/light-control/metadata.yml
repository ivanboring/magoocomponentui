    - --shadow-card
    - --space-card
    - --duration-token
    - --font-heading

editorial_guidance: >
  Name the light the way a resident would say it, not by device id. Keep brightness a plain
  percentage; let colour convey warmth via the swatch rather than words.

relationships:
