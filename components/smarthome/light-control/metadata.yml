  subcategory: Controls
  atomic_type: molecule
  usage_type: [card, control]
  maturity: ai-generated
  wcag:
    level: AA
    notes: The power control is a role="switch" with aria-checked; the dimmer is a native range input with an aria-label; the colour swatch is decorative and aria-hidden.
  keyboard_support: The switch activates on Enter/Space and the range input adjusts with arrow keys when focused.
  seo_score: 20
  text_direction: both
