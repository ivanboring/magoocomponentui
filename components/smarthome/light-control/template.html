<div class="light-control rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-center justify-between gap-3">
    <div class="flex min-w-0 items-center gap-2">
      <span data-if="color_hex" class="light-control__swatch size-6 shrink-0 rounded-full border border-border" style="background-color: {{ color_hex }}" aria-hidden="true"></span>
      <span class="light-control__name truncate font-heading text-on-surface">{{ name }}</span>
    </div>
    <button type="button" class="light-control__switch relative inline-flex h-6 w-10 shrink-0 items-center rounded-pill bg-surface-raised transition-colors duration-(--duration-token) data-[state=true]:bg-primary" role="switch" data-state="{{ on }}" aria-checked="{{ on }}" aria-label="Toggle light">
      <span class="light-control__knob ml-0.5 inline-block size-5 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[state=true]:translate-x-4" data-state="{{ on }}"></span>
    </button>
  </div>
  <div class="mt-4 flex items-center gap-3">
    <svg class="size-4 shrink-0 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="10" cy="10" r="3.5"/><path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M15.8 4.2l-1.4 1.4M5.6 14.4l-1.4 1.4"/></svg>
    <div class="light-control__slider relative h-2 flex-1">
      <div class="absolute inset-0 rounded-pill bg-surface-raised" aria-hidden="true"></div>
      <div class="light-control__fill absolute inset-y-0 left-0 rounded-pill bg-primary" style="width: {{ brightness_pct }}%" aria-hidden="true"></div>
      <input class="light-control__range absolute inset-0 size-full cursor-pointer appearance-none bg-transparent" type="range" min="0" max="100" value="{{ brightness_pct }}" aria-label="Brightness">
    </div>
    <span class="light-control__value w-9 shrink-0 text-right text-xs tabular-nums text-on-surface-muted">{{ brightness_pct }}%</span>
  </div>
</div>
