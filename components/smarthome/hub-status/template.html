<div class="hub-status rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-center justify-between gap-3">
    <div class="flex min-w-0 items-center gap-2">
      <span class="hub-status__icon flex size-10 shrink-0 items-center justify-center rounded-full bg-surface-raised text-on-surface-muted" aria-hidden="true">
        <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="7" width="14" height="9" rx="2"/><path d="M6 4l4 3 4-3"/><circle cx="10" cy="11.5" r="1.5"/></svg>
      </span>
      <span data-if="hub_name" class="hub-status__name truncate font-heading text-on-surface">{{ hub_name }}</span>
    </div>
    <span class="hub-status__status flex shrink-0 items-center gap-1.5 text-sm font-medium">
      <span data-if="online" class="flex items-center gap-1.5 text-success"><span class="size-2 rounded-full bg-success" aria-hidden="true"></span>Online</span>
      <span data-if="!online" class="flex items-center gap-1.5 text-danger"><span class="size-2 rounded-full bg-danger" aria-hidden="true"></span>Offline</span>
    </span>
  </div>
  <div class="mt-4 flex items-center justify-between gap-3">
    <p data-if="device_count" class="hub-status__devices text-sm tabular-nums text-on-surface-muted">{{ device_count }} devices</p>
    <div data-if="signal" class="hub-status__signal flex items-center gap-1.5 text-xs font-medium capitalize {{ signal@class }}">
      <svg class="size-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><rect x="2" y="12" width="3" height="5" rx="1"/><rect x="7" y="8" width="3" height="9" rx="1"/><rect x="12" y="4" width="3" height="13" rx="1"/></svg>
      {{ signal }}
    </div>
  </div>
  <p data-if="offline_count" class="hub-status__offline mt-2 text-xs tabular-nums text-warning">{{ offline_count }} devices offline</p>
</div>
