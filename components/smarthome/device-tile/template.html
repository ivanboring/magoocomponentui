<article class="device-tile rounded-card border border-border bg-surface p-(--space-card) shadow-card transition-colors duration-(--duration-token) data-[on=true]:border-primary data-[on=true]:bg-primary/10" data-on="{{ on }}">
  <div class="flex items-start justify-between gap-3">
    <span data-if="icon" class="device-tile__icon flex size-10 shrink-0 items-center justify-center rounded-full bg-surface-raised text-on-surface-muted transition-colors duration-(--duration-token) data-[on=true]:bg-primary/10 data-[on=true]:text-primary" data-on="{{ on }}">{{{ icon }}}</span>
    <button type="button" class="device-tile__switch relative inline-flex h-5 w-9 shrink-0 items-center rounded-pill bg-surface-raised transition-colors duration-(--duration-token) data-[state=true]:bg-primary" data-state="{{ on }}" role="switch" aria-checked="{{ on }}" aria-label="Toggle {{ name }}">
      <span class="ml-0.5 inline-block size-4 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[state=true]:translate-x-4" data-state="{{ on }}"></span>
    </button>
  </div>
  <p class="device-tile__name mt-3 font-heading text-on-surface">{{ name }}</p>
  <p data-if="room" class="device-tile__room text-sm text-on-surface-muted">{{ room }}</p>
  <p data-if="status_text" class="device-tile__status mt-1 text-xs text-on-surface-muted">{{ status_text }}</p>
</article>
