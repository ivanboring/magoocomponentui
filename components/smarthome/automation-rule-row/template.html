<div class="automation-rule-row flex items-center gap-3 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <span data-if="icon" class="automation-rule-row__icon flex size-9 shrink-0 items-center justify-center rounded-full bg-primary/10 text-primary" aria-hidden="true">{{{ icon }}}</span>
  <p class="min-w-0 flex-1 text-sm leading-relaxed text-on-surface-muted">
    <span class="font-mono text-xs font-semibold uppercase tracking-wide">If</span>
    <span class="automation-rule-row__trigger mx-1 inline-block rounded-control bg-surface-raised px-2 py-0.5 text-on-surface">{{ trigger }}</span>
    <span class="font-mono text-xs font-semibold uppercase tracking-wide">then</span>
    <span class="automation-rule-row__action mx-1 inline-block rounded-control bg-surface-raised px-2 py-0.5 text-on-surface">{{ action }}</span>
  </p>
  <button type="button" class="automation-rule-row__switch relative inline-flex h-5 w-9 shrink-0 items-center rounded-pill bg-surface-raised transition-colors duration-(--duration-token) data-[state=true]:bg-primary" data-state="{{ enabled }}" role="switch" aria-checked="{{ enabled }}" aria-label="Enable rule">
    <span class="ml-0.5 inline-block size-4 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[state=true]:translate-x-4" data-state="{{ enabled }}"></span>
  </button>
</div>
