  maturity: ai-generated
  wcag:
    level: AA
    notes: The enable control is a role="switch" with aria-checked; active weekdays are shown by fill and text weight alongside colour, and the time-row glyphs are aria-hidden.
  keyboard_support: The enable switch is focusable and toggles on Enter/Space.
  seo_score: 20
  text_direction: both
