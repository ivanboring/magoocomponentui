<div class="schedule-timer rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="flex items-center justify-between gap-3">
    <div class="flex min-w-0 items-center gap-2">
      <span class="schedule-timer__icon flex size-9 shrink-0 items-center justify-center rounded-full bg-primary/10 text-primary" aria-hidden="true">
        <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="10" cy="11" r="6"/><path d="M10 8v3l2 1.5M7.5 2.5h5"/></svg>
      </span>
      <span data-if="device" class="schedule-timer__device truncate font-heading text-on-surface">{{ device }}</span>
    </div>
    <button type="button" class="schedule-timer__switch relative inline-flex h-6 w-10 shrink-0 items-center rounded-pill bg-surface-raised transition-colors duration-(--duration-token) data-[state=true]:bg-primary" role="switch" data-state="{{ enabled }}" aria-checked="{{ enabled }}" aria-label="Toggle schedule">
      <span class="schedule-timer__knob ml-0.5 inline-block size-5 rounded-full bg-surface shadow-card transition-transform duration-(--duration-token) data-[state=true]:translate-x-4" data-state="{{ enabled }}"></span>
    </button>
  </div>
  <div class="mt-4 flex flex-col gap-2 text-sm">
    <div data-if="on_time" class="flex items-center justify-between">
      <span class="flex items-center gap-2 text-on-surface-muted">
        <svg class="size-4 text-warning" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><circle cx="10" cy="10" r="3.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M15.8 4.2l-1.4 1.4M5.6 14.4l-1.4 1.4"/></svg>
        Turns on
      </span>
      <span class="schedule-timer__on-time font-mono tabular-nums text-on-surface">{{ on_time }}</span>
    </div>
    <div data-if="off_time" class="flex items-center justify-between">
      <span class="flex items-center gap-2 text-on-surface-muted">
        <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M16 11.5A6.5 6.5 0 018.5 4 6.5 6.5 0 1016 11.5z"/></svg>
        Turns off
      </span>
      <span class="schedule-timer__off-time font-mono tabular-nums text-on-surface">{{ off_time }}</span>
    </div>
  </div>
  <div data-if="days" class="schedule-timer__days mt-4 flex flex-wrap gap-1.5">
    <span data-for="day in days" class="schedule-timer__day flex size-7 items-center justify-center rounded-full border border-border text-xs font-medium text-on-surface-muted data-[active=true]:border-primary data-[active=true]:bg-primary data-[active=true]:text-primary-contrast" data-active="{{ day.active }}">{{ day.label }}</span>
  </div>
</div>
