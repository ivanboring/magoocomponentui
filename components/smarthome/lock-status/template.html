<div class="lock-status flex items-center gap-3 rounded-card border border-border bg-surface p-(--space-card) shadow-card" data-locked="{{ locked }}">
  <span class="lock-status__icon flex size-11 shrink-0 items-center justify-center rounded-full bg-surface-raised data-[locked=true]:text-success data-[locked=false]:text-warning" data-locked="{{ locked }}" aria-hidden="true">
    <svg class="size-5 data-[locked=false]:hidden" data-locked="{{ locked }}" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="9" width="12" height="8" rx="1.5"/><path d="M7 9V6.5a3 3 0 016 0V9"/></svg>
    <svg class="size-5 data-[locked=true]:hidden" data-locked="{{ locked }}" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="9" width="12" height="8" rx="1.5"/><path d="M7 9V6.5a3 3 0 015.6-1.4"/></svg>
  </span>
  <div class="min-w-0 flex-1">
    <p class="lock-status__name font-heading text-on-surface">{{ name }}</p>
    <p class="lock-status__state text-sm">
      <span class="lock-status__label-locked font-medium text-success data-[locked=false]:hidden" data-locked="{{ locked }}">Locked</span>
      <span class="lock-status__label-unlocked font-medium text-warning data-[locked=true]:hidden" data-locked="{{ locked }}">Unlocked</span>
      <span data-if="last_changed" class="text-on-surface-muted"> · {{ last_changed }}</span>
    </p>
  </div>
  <button type="button" class="lock-status__toggle shrink-0 rounded-button border border-border bg-surface px-3 py-1.5 text-sm font-medium text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" data-locked="{{ locked }}">
    <span class="data-[locked=false]:hidden" data-locked="{{ locked }}">Unlock</span>
    <span class="data-[locked=true]:hidden" data-locked="{{ locked }}">Lock</span>
  </button>
</div>
