<div class="thermostat-dial rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="relative mx-auto flex size-40 items-center justify-center">
    <svg class="size-full -rotate-90 text-primary" viewBox="0 0 100 100" aria-hidden="true">
      <circle class="text-surface-raised" cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="8"></circle>
      <circle class="thermostat-dial__arc transition-all duration-(--duration-token) {{ mode@class }}" cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="8" stroke-linecap="round" stroke-dasharray="{{ arc_dash }}" style="stroke-dashoffset: {{ arc_offset }}"></circle>
    </svg>
    <div class="absolute flex flex-col items-center">
      <span class="thermostat-dial__target font-heading text-3xl text-on-surface tabular-nums">{{ target_temp }}</span>
      <span data-if="mode" class="text-xs font-medium uppercase tracking-wide text-on-surface-muted">{{ mode }}</span>
    </div>
  </div>
  <p class="mt-3 text-center text-sm text-on-surface-muted">Currently <span class="thermostat-dial__current font-medium text-on-surface tabular-nums">{{ current_temp }}</span></p>
</div>
