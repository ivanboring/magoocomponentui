name: video-grid
props:
  gap:
    type: enum
    values: [default, none, sm, md, lg, xl]
    default: default
    title: Gap
    description: >
      Space between grid cells, from a fixed set of choices. "default" keeps the component's
      designed spacing; none/sm/md/lg/xl are explicit fixed overrides.
  items:
    type: array
    items: object
    required: true
    title: Videos
    description: "Each item: { title, channel, duration, views, thumbnail, href }."
    example:
      - { title: "Intro to tokens", channel: "DS Podcast", duration: "8:12", views: "12K views", thumbnail: "/stock/cover-workspace.jpg", href: "#" }
variants:
  gap:
    default: "gap-(--space-card)"
    none: "gap-0"
    sm: "gap-3"
    md: "gap-6"
    lg: "gap-10"
    xl: "gap-16"
