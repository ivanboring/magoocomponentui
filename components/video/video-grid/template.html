<div class="video-grid grid grid-cols-1 gap-(--space-card) sm:grid-cols-2 lg:grid-cols-3">
  <a data-for="item in items" class="video-grid__item group flex flex-col" href="{{ item.href }}">
    <span class="video-grid__media relative block aspect-video overflow-hidden rounded-card bg-surface-raised">
      <img data-if="item.thumbnail" class="size-full object-cover transition-transform duration-(--duration-token) group-hover:scale-105" src="{{ item.thumbnail }}" alt="">
      <span class="video-grid__duration absolute bottom-1.5 right-1.5 rounded-control bg-black/75 px-1.5 text-xs font-medium tabular-nums text-white">{{ item.duration }}</span>
    </span>
    <span class="video-grid__title mt-2 line-clamp-2 text-sm font-medium text-on-surface">{{ item.title }}</span>
    <span class="video-grid__meta mt-0.5 text-xs text-on-surface-muted">{{ item.channel }} · {{ item.views }}</span>
  </a>
</div>
