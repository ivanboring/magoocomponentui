name: media-gallery
props:
  items:
    type: array
    items: object
    required: true
    title: Images
    description: "Each item: { src, alt, active }. One should be active (shown large)."
    example:
      - { src: "/stock/cover-workspace.jpg", alt: "Workspace", active: true }
      - { src: "/stock/property-house.jpg", alt: "House", active: false }
