<div class="video-scrubber flex items-center gap-3">
  <span class="video-scrubber__current shrink-0 text-xs tabular-nums text-on-surface-muted">{{ current_time }}</span>
  <div class="video-scrubber__track group relative h-1.5 flex-1 cursor-pointer rounded-pill bg-surface-raised" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="{{ progress }}" tabindex="0">
    <div class="video-scrubber__buffered absolute inset-y-0 left-0 rounded-pill bg-on-surface-muted/40" style="width: {{ buffered }}%"></div>
    <div class="video-scrubber__played absolute inset-y-0 left-0 rounded-pill bg-primary" style="width: {{ progress }}%"></div>
    <div class="video-scrubber__thumb absolute top-1/2 size-3 -translate-x-1/2 -translate-y-1/2 rounded-full bg-primary opacity-0 shadow-raised transition-opacity duration-(--duration-token) group-hover:opacity-100" style="left: {{ progress }}%"></div>
  </div>
  <span class="video-scrubber__duration shrink-0 text-xs tabular-nums text-on-surface-muted">{{ duration }}</span>
</div>
