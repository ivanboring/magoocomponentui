name: video-scrubber
props:
  progress:
    type: integer
    default: 30
    title: Progress
    description: Played percentage 0-100.
  buffered:
    type: integer
    default: 55
    title: Buffered
    description: Buffered percentage 0-100.
  current_time:
    type: string
    default: "0:00"
    title: Current time
  duration:
    type: string
    default: "0:00"
    title: Duration
  sync_id:
    type: string
    title: Sync ID
    description: >
      Optional sync_id of a video-player to bind to. When set, seeking emits a targeted
      request to that player and the played range follows the player's position over a
      document-level event bus. Leave empty for a standalone scrubber.
