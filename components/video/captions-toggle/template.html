<div class="captions-toggle relative inline-block">
  <button type="button" class="captions-toggle__button flex items-center gap-1.5 rounded-control border border-border px-2 py-1 text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised data-[enabled=true]:border-primary data-[enabled=true]:text-primary" data-enabled="{{ enabled }}" aria-pressed="{{ enabled }}" aria-label="Toggle captions">
    <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><rect x="2" y="4" width="16" height="12" rx="2"/><path d="M6 9h2M11 9h3M6 12h4M13 12h1"/></svg>
    CC
  </button>
  <ul data-if="languages" class="captions-toggle__menu absolute bottom-full right-0 mb-1 hidden min-w-32 flex-col rounded-card border border-border bg-surface p-1 shadow-raised" role="menu">
    <li data-for="lang in languages" role="none">
      <button type="button" class="captions-toggle__lang block w-full rounded-control px-3 py-1.5 text-left text-sm text-on-surface hover:bg-surface-raised" role="menuitemradio" data-value="{{ lang.value }}">{{ lang.label }}</button>
    </li>
  </ul>
</div>
