name: captions-toggle
props:
  enabled:
    type: boolean
    default: false
    title: Enabled
  language:
    type: string
    default: "English"
    title: Current language
  languages:
    type: array
    items: object
    title: Languages
    description: "Each item: { label, value }."
    example:
      - { label: "English", value: "en" }
      - { label: "Español", value: "es" }
