<figure class="video-player" data-sync-id="{{ sync_id }}">
  <div class="video-player__frame relative overflow-hidden rounded-card bg-black shadow-card">
  <video data-if="src" class="video-player__video block aspect-video w-full" src="{{ src }}" poster="{{ poster }}" preload="metadata"></video>
  <div data-if="!src" class="video-player__placeholder relative flex aspect-video w-full items-center justify-center bg-cover bg-center" style="background-image: url({{ poster }})">
    <span class="absolute inset-0 bg-black/30" aria-hidden="true"></span>
  </div>
  <div class="video-player__controls absolute inset-x-0 bottom-0 flex flex-col gap-2 bg-gradient-to-t from-black/80 to-transparent p-3 text-white">
    <div class="video-player__scrubber h-1.5 w-full cursor-pointer overflow-hidden rounded-pill bg-white/25" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" tabindex="0">
      <div class="video-player__progress h-full rounded-pill bg-primary" style="width: 0%"></div>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <button type="button" class="video-player__play flex size-8 items-center justify-center rounded-control hover:bg-white/15" aria-label="Play" aria-pressed="false">
        <svg class="video-player__icon-play size-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M6 4l10 6-10 6z"/></svg>
        <svg class="video-player__icon-pause hidden size-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M6 4h3v12H6zM11 4h3v12h-3z"/></svg>
      </button>
      <button type="button" class="video-player__mute flex size-8 items-center justify-center rounded-control hover:bg-white/15" aria-label="Mute" aria-pressed="false">
        <svg class="size-5" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M4 8v4h3l4 3V5L7 8z"/><path d="M14 7a4 4 0 010 6" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
      </button>
      <span class="video-player__time tabular-nums text-xs">{{ duration }}</span>
      <div class="ml-auto flex items-center gap-2">
        <button type="button" class="video-player__speed rounded-control px-2 py-1 text-xs hover:bg-white/15" aria-label="Playback speed">1×</button>
        <button type="button" class="video-player__fullscreen flex size-8 items-center justify-center rounded-control hover:bg-white/15" aria-label="Fullscreen">
          <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M4 7V4h3M16 7V4h-3M4 13v3h3M16 13v3h-3"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="video-player__endscreen absolute inset-0 z-10 hidden overflow-auto bg-surface/95 p-4 text-on-surface backdrop-blur-sm">
    <slot name="end_screen"></slot>
  </div>
  </div>
  <figcaption data-if="credit" class="video-player__credit mt-2 text-xs text-on-surface-muted">{{{ credit }}}</figcaption>
</figure>
