name: video-player-live
props:
  poster:
    type: image
    title: Poster
    example: "/stock/cover-workspace.jpg"
  src:
    type: link
    title: Stream source
    description: >
      HLS playlist URL (.m3u8). Delivered via hls.js, loaded lazily from a CDN when a
      stream is present; Safari/iOS use native HLS. A non-.m3u8 URL is set as a plain
      progressive source. Held in data-src so an empty value never resolves to the page URL.
  viewers:
    type: string
    required: true
    title: Viewers
    example: "1,204 watching"
  latency:
    type: string
    title: Latency
    example: "Low latency"
  sync_id:
    type: string
    title: Sync ID
    description: >
      Optional identifier that links this stream to satellite components
      (video-transcript, video-chapters) carrying the same sync_id. When set, the player
      broadcasts its playback position and play/pause state on a document-level event bus
      so those components can follow the live edge. Live streams play at the edge, so
      inbound seek requests are ignored. Leave empty for a standalone player.
