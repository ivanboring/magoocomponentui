<section class="fabric-detail rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="Fabric & care">
  <div class="fabric-detail__composition">
    <h4 class="text-xs font-semibold uppercase tracking-wide text-on-surface-muted">Composition</h4>
    <ul class="mt-2 flex flex-col gap-1 text-sm">
      <li data-for="item in composition" class="flex items-center justify-between">
        <span class="text-on-surface">{{ item.material }}</span>
        <span class="text-on-surface-muted tabular-nums">{{ item.pct }}</span>
      </li>
    </ul>
  </div>
  <div class="fabric-detail__care mt-4 border-t border-border pt-4">
    <h4 class="text-xs font-semibold uppercase tracking-wide text-on-surface-muted">Care</h4>
    <ul class="mt-2 flex flex-wrap gap-3 text-sm text-on-surface">
      <li data-for="item in care" class="flex items-center gap-1.5"><span aria-hidden="true">{{ item.icon }}</span>{{ item.label }}</li>
    </ul>
  </div>
</section>
