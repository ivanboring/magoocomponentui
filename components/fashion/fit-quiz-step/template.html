<fieldset class="fit-quiz-step">
  <p data-if="step_label" class="fit-quiz-step__step text-xs font-semibold uppercase tracking-wide text-primary">{{ step_label }}</p>
  <legend class="fit-quiz-step__question mt-1 font-heading text-lg text-on-surface">{{ question }}</legend>
  <div class="fit-quiz-step__options mt-4 grid grid-cols-1 gap-2 sm:grid-cols-3" role="radiogroup" aria-label="Answer">
    <label data-for="option in options" class="fit-quiz-step__option flex cursor-pointer flex-col items-center gap-1 rounded-card border border-border p-4 text-center transition-colors duration-(--duration-token) has-[:checked]:border-primary has-[:checked]:bg-primary/5">
      <input type="radio" name="fit" class="sr-only" checked="{{ option.selected }}">
      <span class="text-2xl" aria-hidden="true">{{ option.icon }}</span>
      <span class="text-sm font-medium text-on-surface">{{ option.label }}</span>
      <span data-if="option.detail" class="text-xs text-on-surface-muted">{{ option.detail }}</span>
    </label>
  </div>
</fieldset>
