<div class="sort-and-view group flex flex-wrap items-center justify-between gap-3" data-state="{{ view }}">
  <p data-if="total" class="sort-and-view__count text-sm text-on-surface-muted">{{ total }}</p>
  <div class="sort-and-view__controls flex items-center gap-3">
    <label class="flex items-center gap-2 text-sm text-on-surface-muted">
      Sort
      <select class="sort-and-view__sort rounded-control border border-border bg-surface px-2 py-1.5 text-sm text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised focus:outline-none focus:ring-2 focus:ring-ring" aria-label="Sort results">
        <option data-for="sort in sorts" value="{{ sort.value }}">{{ sort.label }}</option>
      </select>
    </label>
    <div class="sort-and-view__toggle inline-flex items-center rounded-control border border-border bg-surface p-0.5" role="group" aria-label="View">
      <button type="button" class="sort-and-view__grid flex size-8 items-center justify-center rounded-control text-on-surface-muted transition-colors duration-(--duration-token) group-data-[state=grid]:bg-surface-raised group-data-[state=grid]:text-on-surface" data-view="grid" aria-label="Grid view">
        <svg class="size-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M3 3h6v6H3V3zm8 0h6v6h-6V3zM3 11h6v6H3v-6zm8 0h6v6h-6v-6z"/></svg>
      </button>
      <button type="button" class="sort-and-view__list flex size-8 items-center justify-center rounded-control text-on-surface-muted transition-colors duration-(--duration-token) group-data-[state=list]:bg-surface-raised group-data-[state=list]:text-on-surface" data-view="list" aria-label="List view">
        <svg class="size-4" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M3 4h14v2H3V4zm0 5h14v2H3V9zm0 5h14v2H3v-2z"/></svg>
      </button>
    </div>
  </div>
</div>
