name: recent-searches
props:
  searches:
    type: array
    items: object
    required: true
    title: Searches
    description: >
      The recent queries as history chips, newest first. Each item: { label } — the query text
      shown on the chip and emitted on the "recent:remove" event.
    example:
      - { label: "webhooks" }
      - { label: "api keys" }
  clear_label:
    type: string
    default: "Clear"
    title: Clear label
    description: Text of the button that removes the whole history.
