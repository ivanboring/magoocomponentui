name: filter-chip-row
props:
  chips:
    type: array
    items: object
    required: true
    title: Chips
    description: >
      The active filters shown as removable pills. Each item: { label, value } — label is shown,
      value is emitted on the "filter:remove" event when the chip's × is clicked.
    example:
      - { label: "Category: Guides", value: "category:guides" }
      - { label: "Updated: Past month", value: "updated:month" }
  clear_label:
    type: string
    default: "Clear all"
    title: Clear-all label
    description: Text of the trailing button that removes every chip at once.
