<article class="game-card group flex flex-col overflow-hidden rounded-card border border-border bg-surface shadow-card transition-shadow duration-(--duration-token) hover:shadow-raised">
  <a class="game-card__media relative block aspect-[3/4] overflow-hidden" href="{{ href }}">
    <img class="size-full object-cover transition-transform duration-(--duration-token) group-hover:scale-105" src="{{ cover }}" alt="{{ title }}">
    <span data-if="discount" class="game-card__discount absolute left-2 top-2 rounded-control bg-success px-2 py-0.5 text-xs font-bold text-success-contrast">{{ discount }}</span>
  </a>
  <div class="game-card__body flex flex-1 flex-col p-3">
    <h3 class="game-card__title font-heading text-on-surface"><a class="hover:underline" href="{{ href }}">{{ title }}</a></h3>
    <p data-if="genre" class="game-card__genre text-xs text-on-surface-muted">{{ genre }}</p>
    <div class="game-card__foot mt-auto flex items-center justify-between gap-2 pt-3">
      <span data-if="rating" class="flex items-center gap-1 text-xs text-on-surface"><svg class="size-3.5 text-warning" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.5l2.6 5.3 5.9.9-4.3 4.1 1 5.9L10 14.9l-5.2 2.8 1-5.9-4.3-4.1 5.9-.9L10 1.5z"/></svg>{{ rating }}</span>
      <span class="game-card__price font-heading text-on-surface tabular-nums">{{ price }}</span>
    </div>
  </div>
</article>
