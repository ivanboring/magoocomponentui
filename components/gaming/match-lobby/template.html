<section class="match-lobby rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="Match lobby">
  <div class="match-lobby__head flex items-center justify-between gap-2">
    <h3 class="match-lobby__mode font-heading text-lg text-on-surface">{{ mode }}</h3>
    <span data-if="status" class="match-lobby__status text-sm text-on-surface-muted">{{ status }}</span>
  </div>
  <ul class="match-lobby__players mt-4 grid grid-cols-2 gap-2 sm:grid-cols-4">
    <li data-for="player in players" class="match-lobby__player flex flex-col items-center gap-2 rounded-card border border-border p-3 data-[empty=true]:border-dashed data-[ready=true]:border-success" data-empty="{{ player.empty }}" data-ready="{{ player.ready }}">
      <span data-if="!player.empty" class="relative flex size-12 items-center justify-center rounded-full bg-surface-raised font-heading uppercase text-on-surface" role="img" aria-label="{{ player.name }}">
        {{ player.initials }}
        <span data-if="player.host" class="absolute -right-1 -top-1 flex size-5 items-center justify-center rounded-full bg-warning text-[10px] text-warning-contrast" aria-label="Host">★</span>
      </span>
      <span data-if="player.empty" class="flex size-12 items-center justify-center rounded-full border-2 border-dashed border-border text-on-surface-muted" aria-hidden="true">
        <svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 5v10M5 10h10"/></svg>
      </span>
      <span class="match-lobby__name w-full truncate text-center text-xs font-medium text-on-surface data-[empty=true]:text-on-surface-muted" data-empty="{{ player.empty }}">{{ player.name }}</span>
      <span data-if="!player.empty" class="match-lobby__ready rounded-pill px-2 py-0.5 text-[10px] font-semibold data-[ready=true]:bg-success/15 data-[ready=true]:text-success data-[ready=false]:bg-surface-raised data-[ready=false]:text-on-surface-muted" data-ready="{{ player.ready }}">
        <span data-if="player.ready">Ready</span>
        <span data-if="!player.ready">Not ready</span>
      </span>
    </li>
  </ul>
  <button type="button" class="match-lobby__ready-btn mt-4 w-full rounded-button bg-success py-2.5 text-sm font-heading text-success-contrast transition-opacity duration-(--duration-token) hover:opacity-90">{{ ready_label }}</button>
</section>
