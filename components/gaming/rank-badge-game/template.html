<span class="rank-badge-game inline-flex items-center gap-2">
  <span class="rank-badge-game__emblem relative flex size-9 shrink-0 items-center justify-center rounded-card text-white shadow-card" style="background-image: {{ gradient }}" role="img" aria-label="{{ label }}">
    <svg class="size-5 drop-shadow" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1l2.4 5 5.6.5-4.2 3.7 1.3 5.5L10 13.9 4.9 15.7l1.3-5.5L2 6.5 7.6 6z"/></svg>
  </span>
  <span class="rank-badge-game__text">
    <span class="rank-badge-game__label block text-sm font-heading text-on-surface">{{ label }}</span>
    <span data-if="points" class="rank-badge-game__points block text-xs text-on-surface-muted tabular-nums">{{ points }}</span>
  </span>
</span>
