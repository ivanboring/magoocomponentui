name: "Party Invite"
short_description: A squad invite prompt with accept/decline actions.
long_visual_description: >
  A card with the inviter's avatar, an invite message, the game and slot info, and
  accept/decline actions.

use_cases:
  - Squad/party invite.
  - Group invite prompt.
  - Lobby invitation.
  - Join-request notice.
  - Team invite.

recommended_for:
  - A party/squad invite with accept/decline.
avoid_for:
  - A friend request (make a distinct card).

markets:
  - Global

example_usage: >
  Show who invited and the game/slots; accept/decline respond to the invite.

props:
  inviter: The inviter name.
  inviter_initials: The inviter avatar fallback.
  message: The invite message.
  game: The game/mode.
  slots: The slot fill info.

example_prompts:
  - "Add a squad party invite with accept/decline."
  - "Add a game lobby invitation."

lifecycle: experimental
content_model: A squad invite with accept/decline.

theming:
  tokens_used:
    - --color-surface
    - --color-surface-raised
    - --color-on-surface
    - --color-on-surface-muted
    - --color-success
    - --color-success-contrast
    - --color-danger
    - --color-border
    - --radius-card
    - --shadow-card
    - --font-heading
    - --space-card
    - --duration-token

editorial_guidance: >
  Show the game and slots so the invitee can decide; accept is the primary action.

categorization:
  category: Gaming
  subcategory: Multiplayer
  atomic_type: molecule
  usage_type: [banner]
  maturity: ai-generated
  wcag:
    level: AA
    notes: role="alert" announces it; accept/decline have accessible labels; the avatar carries the inviter name.
  keyboard_support: Accept and decline are focusable and activate on Enter/Space.
  seo_score: 20
  text_direction: both
