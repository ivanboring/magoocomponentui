name: status-indicator
props:
  status:
    type: enum
    values: [online, away, busy, offline]
    default: online
    title: Status
  label:
    type: string
    title: Label
    description: Optional visible text after the dot.
    example: "Online"
variants:
  status:
    online: "bg-success"
    away: "bg-warning"
    busy: "bg-danger"
    offline: "bg-on-surface-muted"
