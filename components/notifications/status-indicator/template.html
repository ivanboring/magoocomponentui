<span class="status-indicator inline-flex items-center gap-2" data-status="{{ status }}">
  <span class="status-indicator__dot size-2.5 shrink-0 rounded-full {{ status@class }}" aria-hidden="true"></span>
  <span data-if="label" class="status-indicator__label text-sm text-on-surface">{{ label }}</span>
</span>
