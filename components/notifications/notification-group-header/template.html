<div class="notification-group-header flex items-center justify-between gap-2 bg-surface px-(--space-card) py-1.5" role="presentation">
  <h3 class="notification-group-header__label text-xs font-semibold uppercase tracking-wide text-on-surface-muted">{{ label }}</h3>
  <span data-if="count" class="notification-group-header__count text-xs text-on-surface-muted">{{ count }}</span>
</div>
