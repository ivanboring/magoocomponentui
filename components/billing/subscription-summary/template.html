<section class="subscription-summary rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="Subscription">
  <div class="subscription-summary__head flex items-start justify-between gap-3">
    <div>
      <p class="subscription-summary__plan font-heading text-lg text-on-surface">{{ plan }}</p>
      <p data-if="price" class="subscription-summary__price text-sm text-on-surface-muted">{{ price }}<span data-if="renewal"> · {{ renewal }}</span></p>
    </div>
    <span class="subscription-summary__status rounded-pill bg-success/15 px-2.5 py-0.5 text-xs font-semibold text-success">{{ status_label }}</span>
  </div>
  <dl data-if="details" class="subscription-summary__details mt-4 grid grid-cols-2 gap-3 border-t border-border pt-4 text-sm">
    <div data-for="detail in details"><dt class="text-xs text-on-surface-muted">{{ detail.label }}</dt><dd class="font-medium text-on-surface">{{ detail.value }}</dd></div>
  </dl>
  <div class="subscription-summary__actions mt-5 flex flex-wrap gap-2">
    <button type="button" class="rounded-button bg-primary px-4 py-2 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">Change plan</button>
    <button type="button" class="rounded-button border border-border px-4 py-2 text-sm font-heading text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised">Manage billing</button>
    <button type="button" class="ml-auto rounded-button px-4 py-2 text-sm font-heading text-danger transition-colors duration-(--duration-token) hover:bg-danger/10">Cancel</button>
  </div>
</section>
