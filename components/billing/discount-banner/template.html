<div class="discount-banner flex flex-wrap items-center gap-x-3 gap-y-2 rounded-card border border-dashed border-primary/50 bg-primary/5 px-(--space-card) py-3">
  <span class="discount-banner__icon flex size-8 shrink-0 items-center justify-center rounded-full bg-primary text-primary-contrast" aria-hidden="true">
    <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 8l7-5 7 5v9H3z"/><path d="M7 12l6-4M8 8.5h.01M12 12h.01"/></svg>
  </span>
  <p class="discount-banner__message min-w-0 flex-1 text-sm text-on-surface"><span class="font-medium">{{ message }}</span><span data-if="detail" class="text-on-surface-muted"> · {{ detail }}</span></p>
  <span data-if="code" class="discount-banner__code rounded-control border border-dashed border-primary/50 bg-surface px-2.5 py-1 font-mono text-xs font-semibold text-primary">{{ code }}</span>
  <button data-if="cta_label" type="button" class="discount-banner__cta shrink-0 rounded-button bg-primary px-3 py-1.5 text-xs font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">{{ cta_label }}</button>
</div>
