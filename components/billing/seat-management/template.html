<section class="seat-management rounded-card border border-border bg-surface shadow-card" aria-label="Seat management">
  <div class="seat-management__head border-b border-border p-(--space-card)">
    <div class="flex items-baseline justify-between gap-2">
      <h3 class="font-heading text-on-surface">Seats</h3>
      <span class="text-sm text-on-surface-muted tabular-nums"><span class="font-medium text-on-surface">{{ used }}</span> of {{ total }} used<span data-if="price_per_seat"> · {{ price_per_seat }}</span></span>
    </div>
    <div class="mt-2 h-2 overflow-hidden rounded-pill bg-surface-raised" role="progressbar" aria-valuenow="{{ pct }}" aria-valuemin="0" aria-valuemax="100" aria-label="Seats used"><div class="h-full rounded-pill bg-primary" style="width: {{ pct }}%"></div></div>
    <div class="mt-3 flex gap-2">
      <button type="button" class="rounded-button bg-primary px-4 py-2 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">Invite member</button>
      <button type="button" class="rounded-button border border-border px-4 py-2 text-sm font-heading text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised">Add seats</button>
    </div>
  </div>
  <ul class="seat-management__members divide-y divide-border">
    <li data-for="member in members" class="seat-management__member flex items-center gap-3 px-(--space-card) py-3">
      <span class="flex size-9 shrink-0 items-center justify-center rounded-full bg-surface-raised text-xs font-heading uppercase text-on-surface" role="img" aria-label="{{ member.name }}">{{ member.initials }}</span>
      <div class="min-w-0 flex-1"><p class="text-sm font-medium text-on-surface">{{ member.name }}</p><p class="truncate text-xs text-on-surface-muted">{{ member.email }}</p></div>
      <span class="shrink-0 rounded-pill bg-surface-raised px-2 py-0.5 text-xs text-on-surface-muted">{{ member.role }}</span>
      <button type="button" class="shrink-0 rounded-control px-2 py-1.5 text-xs font-medium text-danger hover:bg-danger/10">Remove</button>
    </li>
  </ul>
</section>
