<article class="invoice-detail rounded-card border border-border bg-surface p-(--space-section) shadow-card">
  <header class="invoice-detail__head flex flex-wrap items-start justify-between gap-4 border-b border-border pb-5">
    <div>
      <h2 class="invoice-detail__number font-heading text-xl text-on-surface">{{ number }}</h2>
      <p data-if="date" class="text-sm text-on-surface-muted">{{ date }}</p>
    </div>
    <span class="invoice-detail__status rounded-pill bg-success/15 px-3 py-1 text-sm font-semibold text-success">{{ status_label }}</span>
  </header>
  <div class="invoice-detail__parties mt-5 grid grid-cols-2 gap-4 text-sm">
    <div data-if="from"><p class="text-xs uppercase tracking-wide text-on-surface-muted">From</p><p class="text-on-surface">{{ from }}</p></div>
    <div data-if="to"><p class="text-xs uppercase tracking-wide text-on-surface-muted">Billed to</p><p class="text-on-surface">{{ to }}</p></div>
  </div>
  <table class="invoice-detail__lines mt-6 w-full text-sm">
    <thead><tr class="border-b border-border text-xs text-on-surface-muted"><th class="py-2 text-left font-medium" scope="col">Description</th><th class="py-2 text-center font-medium" scope="col">Qty</th><th class="py-2 text-right font-medium" scope="col">Amount</th></tr></thead>
    <tbody>
      <tr data-for="line in lines" class="border-b border-border last:border-0"><td class="py-2.5 text-on-surface">{{ line.description }}</td><td class="py-2.5 text-center text-on-surface-muted tabular-nums">{{ line.qty }}</td><td class="py-2.5 text-right text-on-surface tabular-nums">{{ line.amount }}</td></tr>
    </tbody>
  </table>
  <dl class="invoice-detail__totals mt-4 ml-auto flex max-w-xs flex-col gap-1.5 text-sm">
    <div data-for="total in totals" class="flex items-center justify-between data-[strong=true]:border-t data-[strong=true]:border-border data-[strong=true]:pt-2 data-[strong=true]:font-heading data-[strong=true]:text-base" data-strong="{{ total.strong }}">
      <dt class="text-on-surface-muted data-[strong=true]:text-on-surface" data-strong="{{ total.strong }}">{{ total.label }}</dt>
      <dd class="text-on-surface tabular-nums">{{ total.value }}</dd>
    </div>
  </dl>
</article>
