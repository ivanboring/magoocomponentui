<article class="card-pricing relative flex flex-col rounded-card border border-border bg-surface p-(--space-card) shadow-card data-[featured=true]:border-primary data-[featured=true]:ring-1 data-[featured=true]:ring-ring" data-featured="{{ featured }}">
  <span data-if="featured" class="card-pricing__badge absolute -top-3 left-1/2 -translate-x-1/2 rounded-pill bg-primary px-3 py-0.5 text-xs font-semibold text-primary-contrast">Most popular</span>
  <h3 class="card-pricing__plan font-heading text-lg text-on-surface">{{ plan }}</h3>
  <p data-if="description" class="card-pricing__description mt-1 text-sm text-on-surface-muted">{{ description }}</p>
  <div class="card-pricing__price mt-4 flex items-baseline gap-1">
    <span class="font-heading text-3xl text-on-surface">{{ price }}</span>
    <span class="text-sm text-on-surface-muted">{{ period }}</span>
  </div>
  <ul class="card-pricing__features mt-4 flex flex-1 flex-col gap-2 text-sm">
    <li data-for="feature in features" class="flex items-start gap-2 text-on-surface data-[included=false]:text-on-surface-muted" data-included="{{ feature.included }}">
      <svg data-if="feature.included" class="mt-0.5 size-4 shrink-0 text-success" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
      <svg data-if="!feature.included" class="mt-0.5 size-4 shrink-0 text-on-surface-muted" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 5l10 10M15 5L5 15"/></svg>
      <span>{{ feature.label }}</span>
    </li>
  </ul>
  <a class="card-pricing__cta mt-6 inline-flex items-center justify-center rounded-button px-4 py-2.5 text-sm font-heading transition-colors duration-(--duration-token) data-[featured=true]:bg-primary data-[featured=true]:text-primary-contrast data-[featured=true]:hover:opacity-90 data-[featured=false]:border data-[featured=false]:border-border data-[featured=false]:text-on-surface data-[featured=false]:hover:bg-surface-raised focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring" data-featured="{{ featured }}" href="{{ cta_href }}">{{ cta_label }}</a>
</article>
