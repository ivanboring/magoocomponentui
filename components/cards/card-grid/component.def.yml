name: card-grid
props:
  mobile_cols:
    type: integer
    default: 1
    title: Mobile columns
  tablet_cols:
    type: integer
    default: 2
    title: Tablet columns
  desktop_cols:
    type: integer
    default: 3
    title: Desktop columns
  gap:
    type: enum
    values: [default, none, sm, md, lg, xl]
    default: default
    title: Gap
    description: >
      Space between grid cells, from a fixed set of choices. "default" keeps the component's
      designed spacing; none/sm/md/lg/xl are explicit fixed overrides.
slots:
  items:
    title: Items
    description: The child cards to lay out in the responsive grid.
variants:
  gap:
    default: "gap-(--space-card)"
    none: "gap-0"
    sm: "gap-3"
    md: "gap-6"
    lg: "gap-10"
    xl: "gap-16"
