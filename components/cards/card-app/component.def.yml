name: card-app
props:
  name:
    type: string
    required: true
    title: Name
    example: "Focus Timer"
  developer:
    type: string
    title: Developer
    example: "Northwind Labs"
  category:
    type: string
    title: Category
    example: "Productivity"
  rating_display:
    type: string
    title: Rating
    example: "4.8"
  install_label:
    type: string
    default: "Get"
    title: Install label
  href:
    type: link
    title: Link
  image:
    type: image
    title: Icon image
    description: A raster app-icon image. When set, it replaces the icon slot.
    example: "/stock/cover-workspace.jpg"
slots:
  icon:
    title: App icon
    description: The app's icon/logo. Used as a fallback when no icon image is set.
