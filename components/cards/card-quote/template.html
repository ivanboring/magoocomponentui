<figure class="card-quote relative overflow-hidden rounded-card bg-primary p-(--space-section) text-primary-contrast shadow-card">
  <span class="card-quote__mark pointer-events-none absolute -left-2 -top-6 font-heading text-[8rem] leading-none opacity-20" aria-hidden="true">&ldquo;</span>
  <blockquote class="card-quote__text relative font-heading text-xl leading-snug">{{ quote }}</blockquote>
  <figcaption data-if="attribution" class="card-quote__attribution relative mt-4 text-sm opacity-80">— {{ attribution }}</figcaption>
</figure>
