name: card-download
props:
  filename:
    type: string
    required: true
    title: Filename
    example: "Brand guidelines.pdf"
  filetype:
    type: string
    required: true
    title: File type
    example: "PDF"
  size:
    type: string
    required: true
    title: Size
    example: "3.4 MB"
  href:
    type: link
    title: Download link
  image:
    type: image
    title: Thumbnail
    description: Optional preview thumbnail shown in place of the generic file-type icon.
