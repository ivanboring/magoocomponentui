<article class="card-movie group flex flex-col overflow-hidden rounded-card border border-border bg-surface shadow-card transition-shadow duration-(--duration-token) hover:shadow-raised">
  <a class="card-movie__media relative block aspect-[2/3] overflow-hidden bg-gradient-to-br from-primary to-accent" href="{{ href }}">
    <img data-if="poster" class="size-full object-cover transition-transform duration-(--duration-token) group-hover:scale-105" src="{{ poster }}" alt="{{ title }}">
    <span data-if="!poster" class="absolute inset-0 flex items-center justify-center p-4 text-center font-heading text-lg text-primary-contrast" aria-hidden="true">{{ title }}</span>
    <span data-if="rating_display" class="card-movie__rating absolute right-2 top-2 flex items-center gap-1 rounded-pill bg-black/60 px-2 py-0.5 text-xs font-semibold text-white">
      <svg class="size-3 text-warning" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.5l2.6 5.3 5.9.9-4.3 4.1 1 5.9L10 14.9l-5.2 2.8 1-5.9-4.3-4.1 5.9-.9L10 1.5z"/></svg>
      {{ rating_display }}
    </span>
  </a>
  <div class="card-movie__body flex flex-1 flex-col p-3">
    <h3 class="card-movie__title font-heading text-on-surface">
      <a class="hover:underline" href="{{ href }}">{{ title }}</a>
    </h3>
    <p class="card-movie__meta mt-0.5 text-xs text-on-surface-muted">{{ year }}<span data-if="runtime"> · {{ runtime }}</span></p>
    <div data-if="genres" class="card-movie__genres mt-2 flex flex-wrap gap-1">
      <span data-for="genre in genres" class="rounded-control bg-surface-raised px-1.5 py-0.5 text-[11px] text-on-surface-muted">{{ genre.label }}</span>
    </div>
  </div>
</article>
