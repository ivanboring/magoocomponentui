name: "Grade Table"
short_description: A gradebook table of assignments with weights, scores, and grades.
long_visual_description: >
  A table of assignments with their weight, score, and a colour-coded letter grade, plus an
  overall grade pill in the header.

use_cases:
  - Course gradebook.
  - Assignment grades table.
  - Student grade summary.
  - Grade report.
  - Weighted grades.

recommended_for:
  - A gradebook of assignments with weighted grades.
avoid_for:
  - A single assignment (use assignment-card).

markets:
  - Global

example_usage: >
  List assignments with weight, score, and a letter grade; show the overall grade in the
  header.

props:
  title: The section title.
  rows: The assignment grade rows.
  overall: The overall grade.

example_prompts:
  - "Add a course gradebook table with weighted grades."
  - "Add a student grade summary."

lifecycle: experimental
content_model: A gradebook of assignments with grades.

theming:
  tokens_used:
    - --color-surface
    - --color-on-surface
    - --color-on-surface-muted
    - --color-primary
    - --color-success
    - --color-warning
    - --color-danger
    - --color-border
    - --radius-card
    - --radius-control
    - --radius-pill
    - --shadow-card
    - --font-heading
    - --space-card

editorial_guidance: >
  Show weights so the overall grade is interpretable; the letter grade is text plus colour.

categorization:
  category: Education
  subcategory: Grades
  atomic_type: organism
  usage_type: [table, stat]
  maturity: ai-generated
  wcag:
    level: AA
    notes: Real table with scoped headers; grades are letter text (not colour alone); scores are real text.
  keyboard_support: "none"
  seo_score: 40
  text_direction: both
