name: grade-table
props:
  title:
    type: string
    default: "Grades"
    title: Title
  rows:
    type: array
    items: object
    required: true
    title: Rows
    description: "Each row: { assignment, weight, score, grade, tone } — tone success|warning|danger."
    example:
      - { assignment: "Project 1", weight: "20%", score: "92/100", grade: "A", tone: "success" }
  overall:
    type: string
    title: Overall grade
    example: "A− (91%)"
