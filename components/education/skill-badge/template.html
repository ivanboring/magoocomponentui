<span class="skill-badge inline-flex items-center gap-1.5 rounded-pill border border-border bg-surface-raised px-3 py-1 text-sm text-on-surface">
  <span data-if="icon" aria-hidden="true">{{ icon }}</span>
  <span class="font-medium">{{ label }}</span>
  <span data-if="level" class="skill-badge__level rounded-pill bg-primary/15 px-1.5 py-0.5 text-xs font-medium text-primary">{{ level }}</span>
</span>
