<article class="ballot-measure flex flex-col gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <header class="flex flex-col gap-2">
    <div class="flex flex-wrap items-center gap-2">
      <span data-if="measure_id" class="inline-flex items-center rounded-control bg-surface-raised px-2 py-0.5 font-mono text-xs font-medium text-on-surface-muted">{{ measure_id }}</span>
      <span data-if="status" class="inline-flex items-center rounded-pill bg-primary/10 px-2.5 py-0.5 text-xs font-medium text-primary">{{ status }}</span>
    </div>
    <h3 class="ballot-measure__title font-heading text-xl text-on-surface">{{ title }}</h3>
  </header>
  <p class="ballot-measure__summary text-sm text-on-surface-muted">{{ summary }}</p>
  <div class="grid gap-4 sm:grid-cols-2">
    <section data-if="pro_args" class="ballot-measure__pro rounded-card border border-border bg-success/10 p-4">
      <h4 class="mb-2 flex items-center gap-2 font-heading text-sm font-semibold text-success">
        <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 10l4 4 8-9" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Arguments in favor
      </h4>
      <ul class="flex flex-col gap-2">
        <li data-for="arg in pro_args" class="flex items-start gap-2 text-sm text-on-surface">
          <svg class="mt-0.5 size-4 shrink-0 text-success" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M4 10l4 4 8-9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>{{ arg }}</span>
        </li>
      </ul>
    </section>
    <section data-if="con_args" class="ballot-measure__con rounded-card border border-border bg-danger/10 p-4">
      <h4 class="mb-2 flex items-center gap-2 font-heading text-sm font-semibold text-danger">
        <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 5l10 10M15 5L5 15" stroke-linecap="round"/></svg>
        Arguments against
      </h4>
      <ul class="flex flex-col gap-2">
        <li data-for="arg in con_args" class="flex items-start gap-2 text-sm text-on-surface">
          <svg class="mt-0.5 size-4 shrink-0 text-danger" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M5 5l10 10M15 5L5 15" stroke-linecap="round"/></svg>
          <span>{{ arg }}</span>
        </li>
      </ul>
    </section>
  </div>
</article>
