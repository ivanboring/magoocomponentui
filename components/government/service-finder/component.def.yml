name: service-finder
props:
  heading:
    type: string
    title: Heading
    description: Optional heading shown above the search bar.
    example: "Find a government service"
  placeholder:
    type: string
    default: "Search services…"
    title: Search placeholder
    description: Placeholder text inside the search input.
  categories:
    type: array
    items: object
    required: true
    title: Service categories
    description: >
      The category tiles below the search bar. Each item: { label, icon, count } where
      icon is a raw inline SVG string (stroke, inherits currentColor) and count is an
      optional number of services in that category.
    example:
      - { label: "Taxes & payments", icon: "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" class=\"size-6\"><path d=\"M12 3v18\"/><path d=\"M16 7a3 3 0 0 0-3-2h-2a3 3 0 0 0 0 6h2a3 3 0 0 1 0 6h-2a3 3 0 0 1-3-2\"/></svg>", count: 24 }
  popular:
    type: array
    items: object
    title: Popular searches
    description: "Quick links shown after a 'Popular:' label. Each item: { label }."
    example:
      - { label: "Renew passport" }
