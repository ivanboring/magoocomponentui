name: representative-card
props:
  name:
    type: string
    required: true
    title: Name
    example: "Dana Whitfield"
  title:
    type: string
    required: true
    title: Office / title
    description: The official's role, e.g. "State Senator" or "City Council Member".
    example: "State Senator"
  district:
    type: string
    title: District
    description: Optional district or constituency label.
    example: "District 14"
  party:
    type: string
    title: Party
    description: Optional party or affiliation, shown as a pill.
    example: "Independent"
  avatar:
    type: string
    title: Photo
    description: Optional headshot URL. When omitted, the initials fallback is shown.
    example: "/stock/avatar-man-1.jpg"
  initials:
    type: string
    title: Initials
    description: >
      Precomputed initials shown when no avatar is supplied (the directive language can't derive
      them from the name). Keep to 1-3 uppercase letters, e.g. "DW".
    example: "DW"
  contacts:
    type: array
    items: object
    title: Contact links
    description: >
      A row of contact icon buttons. Each item: { type, value, href }. type is one of
      phone | email | web and selects the icon; value is the accessible label (phone number,
      address or site); href is the tel:/mailto:/https target.
    example:
      - { type: "phone", value: "(555) 014-2200", href: "tel:+15550142200" }
      - { type: "email", value: "dana.whitfield@state.gov", href: "mailto:dana.whitfield@state.gov" }
      - { type: "web", value: "whitfield.state.gov", href: "https://whitfield.state.gov" }
