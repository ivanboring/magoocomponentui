name: conversion-funnel-report
props:
  title:
    type: string
    default: "Conversion funnel"
    title: Title
  animate_on_display:
    type: boolean
    default: false
    title: Animate on display
    description: >
      When true, the funnel bars animate from 0 to their width over 0.5s the first time the
      report scrolls into view (respects prefers-reduced-motion). When false the bars render
      at their final width immediately.
  overall:
    type: string
    title: Overall rate
    example: "3.2% overall conversion"
  stages:
    type: array
    items: object
    required: true
    title: Stages
    description: >
      Each: { label, count, width, rate, drop } where width is 0-100 bar width, rate is the
      cumulative %, drop is the step drop-off text.
    example:
      - { label: "Visited", count: "184,204", width: 100, rate: "100%", drop: "" }
