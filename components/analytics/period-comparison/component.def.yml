name: period-comparison
props:
  label:
    type: string
    required: true
    title: Label
    example: "Revenue"
  current:
    type: string
    required: true
    title: Current
    example: "$84.2k"
  previous:
    type: string
    required: true
    title: Previous
    example: "$74.9k"
  current_label:
    type: string
    default: "This period"
    title: Current label
  previous_label:
    type: string
    default: "Previous"
    title: Previous label
  delta:
    type: string
    title: Delta
    example: "+12.4%"
  direction:
    type: enum
    values: [up, down, flat]
    default: up
    title: Direction
variants:
  direction:
    up: "text-success"
    down: "text-danger"
    flat: "text-on-surface-muted"
