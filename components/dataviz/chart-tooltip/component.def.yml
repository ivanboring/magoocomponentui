name: chart-tooltip
props:
  title:
    type: string
    title: Title
    description: Heading line, typically the hovered x-axis label or category.
    example: "Mar 2026"
  rows:
    type: array
    items: object
    required: true
    title: Rows
    description: >
      One row per series. Each item: { label, value, color_class }. `color_class` is a
      tokenized Tailwind background utility for the swatch (e.g. "bg-primary").
    example:
      - { label: "Revenue", value: "$48,210", color_class: "bg-primary" }
      - { label: "Target", value: "$45,000", color_class: "bg-accent" }
