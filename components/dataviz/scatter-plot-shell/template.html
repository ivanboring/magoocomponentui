<figure class="scatter-plot-shell rounded-card border border-border bg-surface p-4 shadow-card">
  <header class="scatter-plot-shell__header mb-3 flex items-center justify-between gap-3">
    <h3 class="scatter-plot-shell__title font-heading text-on-surface">{{ title }}</h3>
  </header>
  <div class="scatter-plot-shell__body flex gap-2">
    <div class="scatter-plot-shell__y-axis flex h-48 flex-col justify-between py-1 text-right text-[11px] text-on-surface-muted tabular-nums">
      <span data-for="y in y_labels" class="scatter-plot-shell__y-tick">{{ y }}</span>
    </div>
    <div class="scatter-plot-shell__col min-w-0 flex-1">
      <div class="scatter-plot-shell__plot relative h-48 w-full">
        <svg class="scatter-plot-shell__svg h-full w-full" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <line data-for="g in grid_lines" class="scatter-plot-shell__grid stroke-border" x1="0" x2="100" y1="{{ g }}" y2="{{ g }}" vector-effect="non-scaling-stroke"></line>
          <circle data-for="p in points" class="scatter-plot-shell__point fill-primary" cx="{{ p.x_pct }}" cy="{{ p.y_pct }}" r="2.5" vector-effect="non-scaling-stroke"></circle>
        </svg>
      </div>
      <div class="scatter-plot-shell__x-axis mt-2 flex justify-between text-[11px] text-on-surface-muted">
        <span data-for="x in x_labels" class="scatter-plot-shell__x-tick">{{ x }}</span>
      </div>
    </div>
  </div>
</figure>
