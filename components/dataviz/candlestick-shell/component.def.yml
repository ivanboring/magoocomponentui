name: candlestick-shell
props:
  title:
    type: string
    required: true
    title: Title
    example: "ACME - daily"
  candles:
    type: array
    items: object
    required: true
    title: Candles
    description: >
      Each candle: { x_pct, high_pct, low_pct, open_pct, close_pct, up }. All *_pct are
      precomputed 0-100 positions in the plot's cartesian viewBox (y grows downward, so a
      higher price is a smaller number). x_pct is the candle's horizontal centre; the wick
      runs from high_pct to low_pct and the body from open_pct to close_pct. up is a boolean
      (close higher than open) that drives the green/red colour. The body is drawn as a thick
      non-scaling stroke centred on x_pct, so no separate body x/width is needed.
    example:
      - { x_pct: 8, high_pct: 20, low_pct: 60, open_pct: 50, close_pct: 30, up: true }
      - { x_pct: 20, high_pct: 26, low_pct: 66, open_pct: 34, close_pct: 58, up: false }
  y_labels:
    type: array
    items: string
    title: Y-axis labels
    description: Axis price tick labels rendered top to bottom beside the plot.
    example: ["$120", "$100", "$80", "$60", "$40"]
