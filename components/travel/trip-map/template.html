<section class="trip-map overflow-hidden rounded-card border border-border bg-surface shadow-card" aria-label="{{ title }}">
  <div class="trip-map__canvas relative flex aspect-[16/9] items-center justify-center bg-surface-raised" aria-hidden="true">
    <svg class="absolute inset-0 size-full opacity-40 text-on-surface-muted" viewBox="0 0 320 180" fill="none" stroke="currentColor" stroke-width="1"><path d="M20 120c40-20 60 10 100 0s70-40 110-30 60 40 80 30"/><circle cx="20" cy="120" r="3" fill="currentColor"/><circle cx="160" cy="95" r="3" fill="currentColor"/><circle cx="300" cy="90" r="3" fill="currentColor"/></svg>
    <span class="relative rounded-pill bg-surface px-3 py-1 text-xs text-on-surface-muted">Map preview</span>
  </div>
  <ol class="trip-map__stops relative flex flex-col gap-3 p-(--space-card) before:absolute before:inset-y-6 before:left-[calc(var(--space-card)+5px)] before:w-px before:bg-border">
    <li data-for="stop in stops" class="trip-map__stop flex items-start gap-3">
      <span class="relative z-10 mt-1 size-3 shrink-0 rounded-full bg-primary ring-4 ring-surface" aria-hidden="true"></span>
      <div>
        <p class="trip-map__label font-medium text-on-surface">{{ stop.label }}</p>
        <p data-if="stop.detail" class="trip-map__detail text-sm text-on-surface-muted">{{ stop.detail }}</p>
      </div>
    </li>
  </ol>
</section>
