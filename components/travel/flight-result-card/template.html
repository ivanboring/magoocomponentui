<article class="flight-result-card flex items-center gap-4 rounded-card border border-border bg-surface p-(--space-card) shadow-card transition-shadow duration-(--duration-token) hover:shadow-raised">
  <span class="flight-result-card__airline flex size-10 shrink-0 items-center justify-center rounded-control bg-surface-raised font-heading text-sm text-on-surface" role="img" aria-label="{{ airline }}">{{ airline_code }}</span>
  <div class="flight-result-card__route flex flex-1 items-center gap-4">
    <div class="text-center">
      <p class="font-heading text-lg text-on-surface tabular-nums">{{ depart_time }}</p>
      <p class="text-xs text-on-surface-muted">{{ depart_code }}</p>
    </div>
    <div class="flex flex-1 flex-col items-center">
      <p class="text-xs text-on-surface-muted">{{ duration }}</p>
      <div class="my-1 flex w-full items-center gap-1">
        <span class="size-1.5 rounded-full bg-on-surface-muted"></span>
        <span class="h-px flex-1 bg-border"></span>
        <svg class="size-4 text-on-surface-muted" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M3 12l14-5-5 14-2-6-7-3z"/></svg>
        <span class="h-px flex-1 bg-border"></span>
        <span class="size-1.5 rounded-full bg-on-surface-muted"></span>
      </div>
      <p class="text-xs text-on-surface-muted">{{ stops }}</p>
    </div>
    <div class="text-center">
      <p class="font-heading text-lg text-on-surface tabular-nums">{{ arrive_time }}</p>
      <p class="text-xs text-on-surface-muted">{{ arrive_code }}</p>
    </div>
  </div>
  <div class="flight-result-card__book flex shrink-0 flex-col items-end gap-1">
    <p class="flight-result-card__price font-heading text-xl text-on-surface tabular-nums">{{ price }}</p>
    <a class="rounded-button bg-primary px-4 py-1.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90" href="{{ href }}">Select</a>
  </div>
</article>
