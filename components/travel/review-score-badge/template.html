<span class="review-score-badge inline-flex items-center gap-2">
  <span class="review-score-badge__score flex size-10 items-center justify-center rounded-card rounded-bl-none bg-primary font-heading text-sm text-primary-contrast tabular-nums">{{ score }}</span>
  <span class="review-score-badge__text">
    <span class="review-score-badge__label block text-sm font-medium text-on-surface">{{ label }}</span>
    <span data-if="count" class="review-score-badge__count block text-xs text-on-surface-muted">{{ count }}</span>
  </span>
</span>
