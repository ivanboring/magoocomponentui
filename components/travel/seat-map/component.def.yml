name: seat-map
props:
  max_choices:
    type: integer
    title: Max choices
    description: >
      Maximum number of seats a user can have selected at once. When the limit is reached,
      picking another available seat is blocked until one is deselected. Omit (or 0) for no
      limit. A "N of MAX seats selected" counter is shown when set.
    example: 3
  rows:
    type: array
    items: object
    required: true
    title: Rows
    description: >
      Each row: { number, seats: [{ label, status }] } where status is available |
      selected | taken | aisle (aisle renders a gap).
    example:
      - number: "12"
        seats:
          - { label: "A", status: "available" }
          - { label: "B", status: "taken" }
