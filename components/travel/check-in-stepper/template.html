<div class="check-in-stepper rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <ol class="check-in-stepper__steps flex items-center gap-2">
    <li data-for="step in steps" class="check-in-stepper__step group flex flex-1 items-center gap-2" data-status="{{ step.status }}">
      <span class="check-in-stepper__marker flex size-7 shrink-0 items-center justify-center rounded-full border-2 border-border text-xs font-medium text-on-surface-muted group-data-[status=complete]:border-primary group-data-[status=complete]:bg-primary group-data-[status=complete]:text-primary-contrast group-data-[status=current]:border-primary group-data-[status=current]:text-primary">
        <svg class="hidden size-3.5 group-data-[status=complete]:block" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
        <span class="group-data-[status=complete]:hidden">{{ step.number }}</span>
      </span>
      <span class="check-in-stepper__label hidden whitespace-nowrap text-sm text-on-surface-muted group-data-[status=complete]:text-on-surface group-data-[status=current]:font-medium group-data-[status=current]:text-on-surface sm:inline">{{ step.label }}</span>
      <span class="check-in-stepper__bar h-0.5 flex-1 bg-border group-data-[status=complete]:bg-primary group-last:hidden"></span>
    </li>
  </ol>
  <div class="check-in-stepper__panel mt-6">
    <h3 class="check-in-stepper__title font-heading text-lg text-on-surface">{{ current_title }}</h3>
    <p data-if="current_help" class="check-in-stepper__help mt-1 text-sm text-on-surface-muted">{{ current_help }}</p>
  </div>
</div>
