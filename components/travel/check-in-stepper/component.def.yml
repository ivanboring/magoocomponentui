name: check-in-stepper
props:
  steps:
    type: array
    items: object
    required: true
    title: Steps
    description: "Each step: { label, status } where status is complete | current | upcoming."
    example:
      - { label: "Passengers", status: "complete" }
      - { label: "Seats", status: "current" }
  current_title:
    type: string
    required: true
    title: Current step title
    example: "Choose your seats"
  current_help:
    type: string
    title: Current step help
    example: "Pick a seat for each passenger. Some seats have an extra fee."
