<section class="related-articles" aria-label="{{ title }}">
  <h2 class="related-articles__title mb-4 font-heading text-lg text-on-surface">{{ title }}</h2>
  <div class="related-articles__grid grid grid-cols-1 gap-(--space-card) sm:grid-cols-3">
    <a data-for="item in items" class="related-articles__item group flex flex-col" href="{{ item.href }}">
      <span class="aspect-[3/2] overflow-hidden rounded-card bg-surface-raised">
        <img data-if="item.image" class="size-full object-cover transition-transform duration-(--duration-token) group-hover:scale-105" src="{{ item.image }}" alt="">
      </span>
      <span data-if="item.category" class="mt-2 text-xs font-semibold uppercase tracking-wide text-primary">{{ item.category }}</span>
      <span class="mt-1 line-clamp-2 font-heading text-on-surface group-hover:underline">{{ item.title }}</span>
    </a>
  </div>
</section>
