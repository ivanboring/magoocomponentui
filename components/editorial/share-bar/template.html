<div class="share-bar flex items-center gap-2">
  <span class="share-bar__label text-sm font-medium text-on-surface-muted">{{ label }}</span>
  <a data-for="link in links" class="share-bar__link flex size-9 items-center justify-center rounded-full border border-border text-on-surface-muted transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface" href="{{ link.href }}" data-network="{{ link.network }}" aria-label="Share on {{ link.network }}">
    <svg class="hidden size-4 data-[network=x]:block" data-network="{{ link.network }}" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M12.6 3h2.3l-5 5.7L16 17h-4.5l-3.2-4.3L4.4 17H2l5.4-6.1L2 3h4.6l2.9 3.9L12.6 3zm-.8 12.5h1.3L6.1 4.4H4.7l7.1 11.1z"/></svg>
    <svg class="hidden size-4 data-[network=facebook]:block" data-network="{{ link.network }}" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M11 18v-7h2.2l.4-2.6H11V6.7c0-.7.2-1.2 1.3-1.2h1.4V3.1C13.4 3 12.6 3 11.7 3 9.8 3 8.5 4.2 8.5 6.4v2H6.3V11h2.2v7H11z"/></svg>
    <svg class="hidden size-4 data-[network=linkedin]:block" data-network="{{ link.network }}" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M5 4a1.5 1.5 0 11-.001 3.001A1.5 1.5 0 015 4zM3.6 8.4h2.8V17H3.6V8.4zm4.6 0H11v1.2h.05c.4-.7 1.3-1.4 2.6-1.4 2.8 0 3.3 1.8 3.3 4.1V17h-2.8v-3.8c0-.9 0-2.1-1.3-2.1s-1.5 1-1.5 2v3.9H8.2V8.4z"/></svg>
    <svg class="hidden size-4 data-[network=link]:block" data-network="{{ link.network }}" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M8 11a3 3 0 004.5.4l2-2A3 3 0 0010 5.5l-1 1M12 9a3 3 0 00-4.5-.4l-2 2A3 3 0 0010 14.5l1-1"/></svg>
  </a>
</div>
