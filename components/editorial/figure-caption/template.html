<figure class="figure-caption my-6">
  <img class="figure-caption__image w-full rounded-card object-cover" src="{{ image }}" alt="{{ caption }}">
  <figcaption class="figure-caption__caption mt-2 text-sm text-on-surface-muted">
    {{ caption }}
    <span data-if="credit" class="figure-caption__credit text-on-surface-muted/70"> · {{ credit }}</span>
  </figcaption>
</figure>
