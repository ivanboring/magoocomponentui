<nav class="tag-list flex flex-wrap gap-2" aria-label="{{ label }}">
  <a data-for="tag in tags" class="tag-list__tag rounded-control border border-border px-3 py-1 text-xs text-on-surface-muted transition-colors duration-(--duration-token) hover:bg-surface-raised hover:text-on-surface" href="{{ tag.href }}">{{ tag.label }}</a>
</nav>
