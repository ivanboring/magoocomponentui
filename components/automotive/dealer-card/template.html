<article class="dealer-card rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <div class="dealer-card__head flex items-start justify-between gap-3">
    <div class="min-w-0">
      <h3 class="dealer-card__name font-heading text-on-surface">{{ name }}</h3>
      <p data-if="rating" class="dealer-card__rating mt-0.5 flex items-center gap-1 text-sm text-on-surface"><svg class="size-4 text-warning" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true"><path d="M10 1.5l2.6 5.3 5.9.9-4.3 4.1 1 5.9L10 14.9l-5.2 2.8 1-5.9-4.3-4.1 5.9-.9L10 1.5z"/></svg><span class="font-medium">{{ rating }}</span><span data-if="reviews" class="text-on-surface-muted">· {{ reviews }}</span></p>
    </div>
    <span data-if="open_status" class="dealer-card__open shrink-0 rounded-pill bg-success/15 px-2 py-0.5 text-xs font-medium text-success">{{ open_status }}</span>
  </div>
  <p data-if="address" class="dealer-card__address mt-3 flex items-start gap-2 text-sm text-on-surface-muted"><svg class="mt-0.5 size-4 shrink-0" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M10 18s6-5 6-9a6 6 0 10-12 0c0 4 6 9 6 9z"/><circle cx="10" cy="9" r="2"/></svg>{{ address }}</p>
  <div class="dealer-card__actions mt-4 flex gap-2">
    <a data-if="phone" class="flex flex-1 items-center justify-center gap-2 rounded-button border border-border py-2 text-sm font-heading text-on-surface transition-colors duration-(--duration-token) hover:bg-surface-raised" href="tel:{{ phone }}">
      <svg class="size-4" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true"><path d="M4 4h3l1 4-2 1a8 8 0 004 4l1-2 4 1v3a1 1 0 01-1 1A13 13 0 013 5a1 1 0 011-1z"/></svg>
      Call
    </a>
    <button type="button" class="flex-1 rounded-button bg-primary py-2 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">Directions</button>
  </div>
</article>
