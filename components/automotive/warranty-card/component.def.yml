name: warranty-card
props:
  title:
    type: string
    default: "Warranty coverage"
    title: Title
  items:
    type: array
    items: object
    required: true
    title: Items
    description: "Each: { label, coverage, icon }."
    example:
      - { label: "Basic", coverage: "4 yr / 50,000 mi", icon: "🛡" }
  note:
    type: string
    title: Note
    example: "Transferable to the next owner."
