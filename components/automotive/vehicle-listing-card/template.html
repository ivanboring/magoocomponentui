<article class="vehicle-listing-card group flex flex-col overflow-hidden rounded-card border border-border bg-surface shadow-card transition-shadow duration-(--duration-token) hover:shadow-raised">
  <a data-if="image" class="vehicle-listing-card__media relative block aspect-[16/10] overflow-hidden" href="{{ href }}">
    <img class="size-full object-cover transition-transform duration-(--duration-token) group-hover:scale-105" src="{{ image }}" alt="{{ name }}">
    <span data-if="badge" class="vehicle-listing-card__badge absolute left-3 top-3 rounded-pill bg-primary px-2.5 py-0.5 text-xs font-semibold text-primary-contrast">{{ badge }}</span>
  </a>
  <div class="vehicle-listing-card__body flex flex-1 flex-col p-(--space-card)">
    <div class="flex items-start justify-between gap-3">
      <div class="min-w-0">
        <h3 class="vehicle-listing-card__name font-heading text-on-surface"><a class="hover:underline" href="{{ href }}">{{ name }}</a></h3>
        <p data-if="trim" class="vehicle-listing-card__trim text-sm text-on-surface-muted">{{ trim }}</p>
      </div>
      <span class="vehicle-listing-card__price shrink-0 font-heading text-lg text-on-surface tabular-nums">{{ price }}</span>
    </div>
    <ul class="vehicle-listing-card__specs mt-3 flex flex-wrap gap-x-4 gap-y-1 text-xs text-on-surface-muted">
      <li data-for="spec in specs" class="flex items-center gap-1"><span aria-hidden="true">{{ spec.icon }}</span>{{ spec.label }}</li>
    </ul>
  </div>
</article>
