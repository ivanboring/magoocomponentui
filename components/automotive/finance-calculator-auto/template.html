<form class="finance-calculator-auto rounded-card border border-border bg-surface p-(--space-card) shadow-card" data-rate="{{ rate }}" data-term="{{ term }}">
  <div class="finance-calculator-auto__modes inline-flex rounded-control border border-border p-0.5 text-sm" role="group" aria-label="Payment type">
    <button data-for="mode in modes" type="button" class="finance-calculator-auto__mode rounded-control px-4 py-1.5 font-medium text-on-surface-muted transition-colors duration-(--duration-token) data-[active=true]:bg-primary data-[active=true]:text-primary-contrast" data-active="{{ mode.active }}" aria-pressed="{{ mode.active }}">{{ mode.label }}</button>
  </div>
  <div class="finance-calculator-auto__result mt-4 flex items-baseline justify-between rounded-card bg-surface-raised px-4 py-3">
    <span class="text-sm text-on-surface-muted">Est. monthly</span>
    <span class="finance-calculator-auto__out font-heading text-2xl text-primary tabular-nums">{{ monthly }}<span class="text-sm font-normal text-on-surface-muted">/mo</span></span>
  </div>
  <div class="finance-calculator-auto__fields mt-4 flex flex-col gap-4">
    <label class="block">
      <span class="flex items-center justify-between text-sm text-on-surface"><span>Vehicle price</span><span class="finance-calculator-auto__price-out font-medium tabular-nums">${{ price }}</span></span>
      <input type="range" name="price" class="finance-calculator-auto__price mt-1 w-full accent-primary" min="10000" max="150000" step="500" value="{{ price }}">
    </label>
    <label class="block">
      <span class="flex items-center justify-between text-sm text-on-surface"><span>Down payment</span><span class="finance-calculator-auto__down-out font-medium tabular-nums">${{ down }}</span></span>
      <input type="range" name="down" class="finance-calculator-auto__down mt-1 w-full accent-primary" min="0" max="40000" step="500" value="{{ down }}">
    </label>
    <div class="grid grid-cols-2 gap-3 text-sm">
      <label class="block"><span class="text-on-surface">APR (%)</span><input type="number" class="finance-calculator-auto__rate mt-1 w-full rounded-control border border-border bg-surface px-3 py-2 text-on-surface" step="0.1" value="{{ rate }}"></label>
      <label class="block"><span class="text-on-surface">Term (months)</span><input type="number" class="finance-calculator-auto__term mt-1 w-full rounded-control border border-border bg-surface px-3 py-2 text-on-surface" value="{{ term }}"></label>
    </div>
  </div>
</form>
