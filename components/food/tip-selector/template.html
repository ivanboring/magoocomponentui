<fieldset class="tip-selector">
  <legend class="tip-selector__label text-sm font-medium text-on-surface">{{ label }}</legend>
  <div class="tip-selector__options mt-2 grid grid-cols-4 gap-2" role="radiogroup" aria-label="{{ label }}">
    <button data-for="option in options" type="button" class="tip-selector__option flex flex-col items-center rounded-control border border-border py-2 text-sm transition-colors duration-(--duration-token) data-[active=true]:border-primary data-[active=true]:bg-primary data-[active=true]:text-primary-contrast" data-active="{{ option.active }}" role="radio" aria-checked="{{ option.active }}">
      <span class="font-heading">{{ option.label }}</span>
      <span data-if="option.amount" class="text-xs opacity-80">{{ option.amount }}</span>
    </button>
  </div>
</fieldset>
