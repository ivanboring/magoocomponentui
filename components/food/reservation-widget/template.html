<form class="reservation-widget rounded-card border border-border bg-surface p-(--space-card) shadow-card">
  <h3 class="reservation-widget__title font-heading text-lg text-on-surface">{{ title }}</h3>
  <div class="reservation-widget__field mt-4">
    <span class="text-sm font-medium text-on-surface">Party size</span>
    <div class="mt-1.5 flex flex-wrap gap-2" role="radiogroup" aria-label="Party size">
      <button data-for="party in party_options" type="button" class="reservation-widget__party size-10 rounded-control border border-border text-sm font-medium text-on-surface transition-colors duration-(--duration-token) data-[active=true]:border-primary data-[active=true]:bg-primary data-[active=true]:text-primary-contrast" data-active="{{ party.active }}" role="radio" aria-checked="{{ party.active }}">{{ party.label }}</button>
    </div>
  </div>
  <label class="reservation-widget__field mt-4 block">
    <span class="text-sm font-medium text-on-surface">Date</span>
    <input type="text" class="mt-1.5 w-full rounded-control border border-border bg-surface px-3 py-2 text-sm text-on-surface" value="{{ date_value }}" readonly>
  </label>
  <div class="reservation-widget__field mt-4">
    <span class="text-sm font-medium text-on-surface">Time</span>
    <div class="mt-1.5 flex flex-wrap gap-2" role="radiogroup" aria-label="Time">
      <button data-for="time in time_options" type="button" class="reservation-widget__time rounded-control border border-border px-3 py-1.5 text-sm text-on-surface transition-colors duration-(--duration-token) data-[active=true]:border-primary data-[active=true]:bg-primary data-[active=true]:text-primary-contrast" data-active="{{ time.active }}" role="radio" aria-checked="{{ time.active }}">{{ time.label }}</button>
    </div>
  </div>
  <button type="submit" class="reservation-widget__cta mt-5 w-full rounded-button bg-primary py-2.5 text-sm font-heading text-primary-contrast transition-opacity duration-(--duration-token) hover:opacity-90">{{ cta_label }}</button>
</form>
