<nav class="cuisine-filter flex gap-2 overflow-x-auto pb-1" aria-label="Cuisines">
  <button data-for="cuisine in cuisines" type="button" class="cuisine-filter__chip flex shrink-0 flex-col items-center gap-1 rounded-card border border-border px-4 py-2 text-xs text-on-surface-muted transition-colors duration-(--duration-token) hover:bg-surface-raised data-[active=true]:border-primary data-[active=true]:bg-primary/5 data-[active=true]:text-primary" data-active="{{ cuisine.active }}" aria-pressed="{{ cuisine.active }}">
    <span class="text-xl" aria-hidden="true">{{ cuisine.icon }}</span>
    {{ cuisine.label }}
  </button>
</nav>
