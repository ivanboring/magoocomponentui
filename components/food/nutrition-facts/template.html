<section class="nutrition-facts rounded-card border border-border bg-surface p-(--space-card) shadow-card" aria-label="Nutrition facts">
  <div class="nutrition-facts__calories flex items-baseline justify-between border-b border-border pb-2">
    <span class="font-heading text-on-surface">Calories</span>
    <span class="font-heading text-2xl text-on-surface tabular-nums">{{ calories }}<span data-if="serving" class="ml-1 text-xs font-normal text-on-surface-muted">{{ serving }}</span></span>
  </div>
  <dl class="nutrition-facts__macros mt-3 grid grid-cols-3 gap-2 text-center">
    <div data-for="macro in macros" class="rounded-control bg-surface-raised p-2">
      <dd class="font-heading text-on-surface tabular-nums">{{ macro.value }}</dd>
      <dt class="text-xs text-on-surface-muted">{{ macro.label }}</dt>
    </div>
  </dl>
</section>
