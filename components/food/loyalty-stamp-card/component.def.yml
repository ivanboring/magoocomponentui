name: loyalty-stamp-card
props:
  title:
    type: string
    required: true
    title: Title
    example: "Buy 9, get 1 free"
  reward:
    type: string
    title: Reward
    example: "Free coffee"
  stamps:
    type: array
    items: object
    required: true
    title: Stamps
    description: "Each stamp: { filled }. The last unfilled is the reward slot."
    example:
      - { filled: true }
      - { filled: false }
