<section class="delivery-tracker overflow-hidden rounded-card border border-border bg-surface shadow-card" aria-label="Delivery status">
  <div class="delivery-tracker__map relative flex aspect-[2/1] items-center justify-center bg-surface-raised" aria-hidden="true">
    <svg class="absolute inset-0 size-full opacity-30 text-on-surface-muted" viewBox="0 0 320 160" fill="none" stroke="currentColor" stroke-width="1"><path d="M0 60h320M0 110h320M120 0v160M220 0v160"/><path d="M40 130l60-40 80 20 100-60" stroke-width="2"/></svg>
    <span class="relative flex size-10 items-center justify-center rounded-full bg-primary text-primary-contrast shadow-card"><svg class="size-5" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 13V8l3-3h5l3 4h2l1 4H3z"/><circle cx="7" cy="15" r="1.5"/><circle cx="14" cy="15" r="1.5"/></svg></span>
  </div>
  <div class="delivery-tracker__body p-(--space-card)">
    <p class="delivery-tracker__eta font-heading text-lg text-on-surface">{{ eta }}</p>
    <p data-if="courier" class="delivery-tracker__courier text-sm text-on-surface-muted">{{ courier }}</p>
    <ol class="delivery-tracker__steps mt-4 flex items-center gap-2">
      <li data-for="step in steps" class="delivery-tracker__step group flex flex-1 items-center gap-2" data-status="{{ step.status }}">
        <span class="delivery-tracker__marker flex size-5 shrink-0 items-center justify-center rounded-full border-2 border-border text-[10px] text-on-surface-muted group-data-[status=complete]:border-primary group-data-[status=complete]:bg-primary group-data-[status=complete]:text-primary-contrast group-data-[status=current]:border-primary group-data-[status=current]:text-primary">
          <svg class="hidden size-3 group-data-[status=complete]:block" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="3" aria-hidden="true"><path d="M4 10l4 4 8-8"/></svg>
          <span class="size-1.5 rounded-full bg-current group-data-[status=complete]:hidden"></span>
        </span>
        <span class="delivery-tracker__label whitespace-nowrap text-xs text-on-surface-muted group-data-[status=complete]:text-on-surface group-data-[status=current]:font-medium group-data-[status=current]:text-on-surface">{{ step.label }}</span>
        <span class="h-0.5 flex-1 bg-border group-data-[status=complete]:bg-primary group-last:hidden"></span>
      </li>
    </ol>
  </div>
</section>
